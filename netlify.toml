# NEXO — Netlify config
# Security headers (021 hardening). Hosts na CSP foram inventariados a partir
# do código real: Supabase, GA4/GTM, Google Fonts, jsDelivr/cdnjs (GSAP,
# supabase-js, Chart.js, QRCode), api.qrserver.com (QR), ntfy.sh (chamar
# empregado), lh3.googleusercontent.com (fotos GMB).
# 'unsafe-eval' foi REMOVIDO (2026-07-12): o portal lia /menu/<slug>/config.js
# via new Function() (eval); agora lê /menu/<slug>/config.json via JSON.parse.
# Nenhuma lib servida (supabase-js, Chart.js, GSAP, QRCode) usa eval.
#
# Deploy pipeline: pushes to 'main' → production (nexosolutions.pt)
#                  pushes to 'staging' → staging--nexosolutions.netlify.app
#                  Pull requests → tests only (via GitHub Actions, no deploy)

[build]
  publish = "."
  command = "echo 'Static site — no build step'"

# Auto-deploy is DISABLED for all branches in Netlify dashboard.
# GitHub Actions (deploy.yml) deploys via API after tests pass.
# To disable: Netlify → Site config → Build & deploy → uncheck "Auto publish".

[context.production]
  environment = { NEXO_ENV = "production" }

[context.staging]
  environment = { NEXO_ENV = "staging" }

# ─── Redirects — explicit SPA-style fallback for portal and menu pages ────
# Netlify already serves directory index.html natively, but these rules
# ensure clean URLs without trailing slash also resolve correctly.
[[redirects]]
  from = "/portal/*"
  to = "/portal/:splat/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/menu/*"
  to = "/menu/:splat/index.html"
  status = 200
  force = false

# ─── Redirects legados — assets movidos da raiz para /js e /css ───────────
# HTML de menus fica em cache até 5 min (max-age=300); estes 301 garantem
# que páginas antigas em cache continuam a carregar os scripts partilhados.
[[redirects]]
  from = "/nexo-analytics.js"
  to = "/js/nexo-analytics.js"
  status = 301

[[redirects]]
  from = "/nexo-cookies.js"
  to = "/js/nexo-cookies.js"
  status = 301

[[redirects]]
  from = "/script.js"
  to = "/js/landing.js"
  status = 301

[[redirects]]
  from = "/style.css"
  to = "/css/landing.css"
  status = 301

# ─── Global: todas as páginas ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com https://*.google-analytics.com 'sha256-/sbfbOXf+s3tzsbrLixeAT6Ygflk7E3yQINJCeCbf7g=' 'sha256-/z2DsGLXVoi8VqjnBio0JyfOXgXEOHvBL+iQA/O//QE=' 'sha256-43+0AQ80RxXNL2C6NrS1UY9dB1g8HVZXEW6az7b4OCk=' 'sha256-84FLsEmDbZJ/QVqJUlvqUR10NBZpqJaYsfEf7RBwOAM=' 'sha256-8BzNWJWvcFilnAyNtYD5UkL8jH0Uhw2rmLHRQhQuDBs=' 'sha256-8V/rP7OYLkPobpD/BMOVK/8rNNoZzZDm0zciwSlHcrY=' 'sha256-NO8APkdPdIxViliAL9zoJqQ0tu7TWQ4Pql63FWH54F0=' 'sha256-TqWARPOKXPeT7wjKy+Sxz2Ly6EpdwxzKitQWWsmXA5w=' 'sha256-UQ1ToBZnp0960rv0HBVJ9N4xs9Y0mMtc1v1a9yP613o=' 'sha256-Ug0/9p8eUEDbFs0i+JYGXQ/2Kmq/zuB+VLZfxGWwRPc=' 'sha256-WLWq3IuYQFjRXp2YriSCGWHxV/VB6SJ+gVZeJ5ldrX0=' 'sha256-YlxMtQ7vPtTbyHV8zXt/bCQpYjvVhnwvY2if87eHiNo=' 'sha256-b4htUNwK4DJZPZbsp757m4Wz9dFf0/zC/den2eegq8s=' 'sha256-cKlggY3rXmBdgy70elIjcmuKWKv5SLmvVMYZk9PKnt8=' 'sha256-i9OPeAm3MmUDMG05bxVKtvJ5/tLO3QklVAcTBcnvaYw=' 'sha256-ig+2ig1F/upFflZShROkg7sqlGEoi7TAWxv2SlPiTaA=' 'sha256-lxLSR48xEltayTw0Y5P2R20uaMtbtrae74sADv2BO44=' 'sha256-nqEFzqT7vIFZqZs7MJjXo5N3c8x8bJjbb2gs1cqP0as=' 'sha256-oryE3eIvoB2xxbE8QJL4Zg2hL2EdC4MV5T2ws8A4fO8=' 'sha256-qYlde1mjzc0FlWIev2j52iSrWiN55vZlneI48Dbi16k=' 'sha256-qmsOJ2jE3ME1NPxVKimhXvLPQqlalyrUERnJnL0ngRc=' 'sha256-u27JWo1l0v3aXyu48r/7OdY9XM7xXwqIVatHLfnXuvI=' 'sha256-zEW0qLm99b1ZjQ+pYE1OfzIkHVlRmzf44wVhcd5Tyvc=' 'sha256-ze3g5Rv8GrZYNtTGf3mBXvI4Rv7AkNzQW8ysjjINY3E='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://*.googletagmanager.com https://*.google-analytics.com https://lh3.googleusercontent.com https://api.qrserver.com https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://ntfy.sh; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

# ─── Portal: mais restrito (sem embed; sem cache) ─────────────────────────
[[headers]]
  for = "/portal/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Cache-Control = "no-store, no-cache, must-revalidate"

# ─── Menu: pode ser embebido pelo próprio site do restaurante ─────────────
[[headers]]
  for = "/menu/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "public, max-age=300"

# ─── Assets estáticos ─────────────────────────────────────────────────────
# /js e /css NÃO são fingerprinted — um ano de "immutable" prenderia código
# antigo (incl. patches de segurança em nexo-security/nexo-access/comanda)
# nos browsers dos clientes durante um ano. 1h + revalidação em background.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
