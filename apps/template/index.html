<!DOCTYPE html>
<html lang="pt" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F6F5F0">
  <title>Taberna do Tejo — Menu</title>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://nexosolutions.pt/apps/template/index.html">
  <link rel="icon" href="/img/nexo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/nexo.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Open Graph para partilha Instagram/WhatsApp -->
  <meta property="og:title" content="Taberna do Tejo — Alfama, Lisboa">
  <meta property="og:description" content="Cozinha portuguesa contemporânea.">
  <meta property="og:type" content="restaurant">

  <!-- Fonte Outfit via CDN -->
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/@fontsource/outfit@5.0.8/300.css">
  <link rel="stylesheet" href="https://unpkg.com/@fontsource/outfit@5.0.8/400.css">
  <link rel="stylesheet" href="https://unpkg.com/@fontsource/outfit@5.0.8/600.css">
  <link rel="stylesheet" href="https://unpkg.com/@fontsource/outfit@5.0.8/700.css">
  <link rel="stylesheet" href="https://unpkg.com/@fontsource/outfit@5.0.8/900.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       HERO — foto fullwidth + logo sobreposto
       ═══════════════════════════════════════════════════════════ -->
  <header class="hero" id="hero">
    <div class="hero-image" id="hero-image"></div>
    <div class="hero-overlay"></div>

    <!-- Top bar sobre o hero: mesa + idioma -->
    <div class="hero-top-bar">
      <div class="table-badge" id="table-badge"></div>
      <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language">
        <button data-lang="pt" class="active">PT</button>
        <button data-lang="en">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="fr">FR</button>
      </div>
    </div>

    <!-- Identidade do restaurante -->
    <div class="hero-content">
      <div class="hero-logo" id="hero-logo"></div>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-meta">
        <span class="hero-city" id="hero-city"></span>
        <span class="hero-dot">·</span>
        <span class="hero-hours-today" id="hero-hours-today"></span>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════
       BARRA DE AÇÕES STICKY — sempre visível no topo
       Todas as opções principais aqui. Menu flui logo abaixo.
       ═══════════════════════════════════════════════════════════ -->
  <nav class="action-bar" id="action-bar">
    <button class="action-pill action-pill-review" id="action-review">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8 5.8 21.3l2.4-7.4L2 9.4h7.6z"/>
      </svg>
      <span id="action-review-label">Avaliar</span>
    </button>

    <a class="action-pill" id="action-instagram" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      <span id="action-instagram-label">Instagram</span>
    </a>

    <a class="action-pill" id="action-staff" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
      </svg>
      <span id="action-staff-label">Staff</span>
    </a>

    <a class="action-pill" id="action-book" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span id="action-book-label">Reservar</span>
    </a>


  </nav>

  

  <!-- ═══════════════════════════════════════════════════════════
       BANNER DA SEMANA — destaque do prato/promoção
       ═══════════════════════════════════════════════════════════ -->
  <div class="special-banner" id="special-banner">
    <span class="special-banner-label" id="special-label">Esta semana</span>
    <span class="special-banner-text" id="special-text"></span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       WI-FI — card dashed, copy on tap
       ═══════════════════════════════════════════════════════════ -->
  <div class="wifi-card" id="wifi-card">
    <div class="wifi-icon" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0114 0"/>
        <path d="M1.42 9a16 16 0 0121.16 0"/>
        <path d="M8.53 16.11a6 6 0 016.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <div class="wifi-info">
      <div class="wifi-label" id="wifi-label">Wi-Fi</div>
      <div class="wifi-pass" id="wifi-pass"></div>
      <div class="wifi-hint" id="wifi-hint"></div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════
       TABS DE CATEGORIAS — sticky ao scrollar (estilo LiveMenu)
       ═══════════════════════════════════════════════════════════ -->
  <nav class="category-tabs" id="category-tabs" aria-label="Categorias do menu"></nav>

  <!-- ═══════════════════════════════════════════════════════════
       FILTROS DE DIETA
       ═══════════════════════════════════════════════════════════ -->
  <div class="diet-filter" id="diet-filter" role="group" aria-label="Filtro de dieta"></div>

  <!-- ═══════════════════════════════════════════════════════════
       MENU — secções e itens
       ═══════════════════════════════════════════════════════════ -->
  <main class="menu" id="menu"></main>

  <!-- ═══════════════════════════════════════════════════════════
       CARTA DE VINHOS — link para menu separado
       ═══════════════════════════════════════════════════════════ -->
  <a class="wine-card" id="wine-card">
    <div class="wine-icon" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M8 2h8l-1 11a3 3 0 01-6 0L8 2z"/>
        <line x1="12" y1="13" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </div>
    <div class="wine-info">
      <div class="wine-title" id="wine-title">Carta de vinhos</div>
      <div class="wine-sub" id="wine-sub">Ver lista completa</div>
    </div>
    <span class="wine-arrow" aria-hidden="true">→</span>
  </a>

  <!-- ═══════════════════════════════════════════════════════════
       EVENTOS DA SEMANA
       ═══════════════════════════════════════════════════════════ -->
  <section class="events" id="events-section">
    <h2 class="section-title" id="events-title">Eventos</h2>
    <div class="events-list" id="events-list"></div>
  </section>


  <!-- ═══════════════════════════════════════════════════════════
       LOYALTY OPT-IN — WhatsApp semanal
       ═══════════════════════════════════════════════════════════ -->
  <div class="loyalty-card" id="loyalty-card">
    <div class="loyalty-header">
      <div class="loyalty-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.5 3.5A11.9 11.9 0 0012 0C5.4 0 0 5.4 0 12c0 2.1.6 4.2 1.6 6L0 24l6.2-1.6c1.8 1 3.8 1.5 5.8 1.5 6.6 0 12-5.4 12-12 0-3.2-1.2-6.2-3.5-8.4z"/>
        </svg>
      </div>
      <div class="loyalty-text">
        <div class="loyalty-title" id="loyalty-title"></div>
        <div class="loyalty-sub" id="loyalty-sub"></div>
      </div>
    </div>
    <button class="loyalty-btn" id="loyalty-btn"></button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════ -->
  <footer class="footer">
    <div class="footer-info">
      <div class="footer-row">
        <strong id="footer-addr-label">Morada</strong>
        <span id="footer-address"></span>
      </div>
      <div class="footer-row">
        <strong id="footer-hours-label">Horário</strong>
        <span id="footer-hours"></span>
      </div>
    </div>

    <button class="share-btn" id="share-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="18" cy="5" r="3"/>
        <circle cx="6" cy="12" r="3"/>
        <circle cx="18" cy="19" r="3"/>
        <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/>
        <line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/>
      </svg>
      <span id="share-label"></span>
    </button>

    <div class="nexo-brand">
      powered by <a href="https://nexo.pt" target="_blank" rel="noopener"><strong>NEXO.</strong></a>
    </div>
  </footer>

  <!-- ═══════════════════════════════════════════════════════════
       TOAST + MODAIS
       ═══════════════════════════════════════════════════════════ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Modal: escolher plataforma de avaliação -->
  <div class="modal-overlay" id="review-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="review-modal-title"></h3>
        <button class="modal-close" data-close="review-modal" aria-label="Fechar">✕</button>
      </div>
      <div class="review-options">
        <a class="review-option" id="review-google" target="_blank" rel="noopener">
          <div class="review-icon review-icon-google">G</div>
          <div class="review-option-text">
            <div class="review-option-name">Google</div>
            <div class="review-option-sub" id="review-google-sub"></div>
          </div>
          <span class="review-arrow" aria-hidden="true">→</span>
        </a>
        <a class="review-option" id="review-tripadvisor" target="_blank" rel="noopener">
          <div class="review-icon review-icon-tripadvisor">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="8" cy="12" r="2" fill="#00AF87"/>
              <circle cx="16" cy="12" r="2" fill="#00AF87"/>
            </svg>
          </div>
          <div class="review-option-text">
            <div class="review-option-name">TripAdvisor</div>
            <div class="review-option-sub" id="review-tripadvisor-sub"></div>
          </div>
          <span class="review-arrow" aria-hidden="true">→</span>
        </a>
        <a class="review-option" id="review-facebook" target="_blank" rel="noopener">
          <div class="review-icon review-icon-facebook">f</div>
          <div class="review-option-text">
            <div class="review-option-name">Facebook</div>
            <div class="review-option-sub" id="review-facebook-sub"></div>
          </div>
          <span class="review-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Modal: alergénios completos -->
  <div class="modal-overlay" id="allergen-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="allergen-modal-title">Alergénios</h3>
        <button class="modal-close" data-close="allergen-modal" aria-label="Fechar">✕</button>
      </div>
      <ul class="allergen-list" id="allergen-list"></ul>
      <p class="allergen-note" id="allergen-note"></p>
    </div>
  </div>

  <!-- Modal: detalhe do prato (estilo LiveMenu) -->
  <div class="modal-overlay modal-item" id="item-modal" role="dialog" aria-modal="true">
    <div class="modal modal-item-content">
      <button class="modal-item-close" data-close="item-modal" aria-label="Fechar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="6" y1="18" x2="18" y2="6"/>
        </svg>
      </button>
      <div class="item-modal-photo" id="item-modal-photo"></div>
      <div class="item-modal-body">
        <div class="item-modal-header">
          <h3 id="item-modal-name"></h3>
          <span class="item-modal-price" id="item-modal-price"></span>
        </div>
        <p class="item-modal-desc" id="item-modal-desc"></p>
        <div class="item-modal-tags" id="item-modal-tags"></div>
        <div class="item-modal-allergens" id="item-modal-allergens"></div>
      </div>
    </div>
  </div>

  <!-- CONFIG e lógica em ficheiros separados -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
