
<!DOCTYPE html>
<html lang="pt" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F4EDE0">
  <title>O Nosso Prego — Menu</title>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://nexosolutions.pt/apps/template2/index.html">
  <link rel="icon" href="/img/nexo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/nexo.png">
  <link rel="manifest" href="/site.webmanifest">

  <meta property="og:title" content="O Nosso Prego — Parede">
  <meta property="og:description" content="Cozinha portuguesa. Pregos, mariscos e cataplanas.">
  <meta property="og:type" content="restaurant">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600;1,700&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <header class="hero" id="hero">
    <div class="hero-image" id="hero-image"></div>
    <div class="hero-overlay"></div>

    <div class="hero-top-bar">
      <div class="table-badge" id="table-badge"></div>
      <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language">
        <button data-lang="pt" class="active">PT</button>
        <button data-lang="en">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="fr">FR</button>
      </div>
    </div>

    <div class="hero-content">
      <!-- <div class="hero-stamp" id="hero-stamp"></div> -->
      <div class="hero-logo" id="hero-logo"></div>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-meta">
        <span class="hero-city" id="hero-city"></span>
        <span class="hero-dot">·</span>
        <span class="hero-hours-today" id="hero-hours-today"></span>
      </div>
    </div>
  </header>

  <!-- QUICK NAV -->
  <nav class="quick-nav" id="quick-nav" aria-label="Navegação rápida"></nav>

  <!-- BANNER DINÂMICO (muda consoante a hora: almoço / happy hour / jantar) -->
  <div class="special-banner" id="special-banner" style="display:none">
    <div class="special-banner-time">
      <div class="special-banner-hour" id="special-hour"></div>
      <div class="special-banner-period" id="special-period"></div>
    </div>
    <div class="special-banner-body">
      <div class="special-banner-ghost" id="special-ghost"></div>
      <div class="special-banner-label" id="special-label"></div>
      <div class="special-banner-headline" id="special-headline"></div>
      <div class="special-banner-text" id="special-text"></div>
    </div>
  </div>

  <!-- FAVORITOS — aparece apenas quando há pelo menos 1 favorito -->
  <section class="favorites-section" id="section-favorites" style="display:none">
    <div class="favorites-header">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M5 3h14a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/>
</svg>
      <h2 class="favorites-title" id="favorites-title"></h2>
      <button class="favorites-clear" id="favorites-clear" aria-label="Limpar favoritos">✕</button>
    </div>
    <div class="favorites-list" id="favorites-list"></div>
  </section>

  <!-- MAIS PEDIDOS — ELITE section -->
  <section class="most-ordered" id="section-most-ordered">
    <div class="section-header-elite">
      <div class="elite-badge" id="elite-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm2.7-2h8.6l.9-5.4-3.4 3L12 7l-1.8 4.6-3.4-3 .9 5.4z"/>
        </svg>
        <span id="elite-badge-text"></span>
      </div>
      <h2 class="section-title-elite" id="most-ordered-title"></h2>
      <p class="section-sub-elite" id="most-ordered-sub"></p>
    </div>
    <div class="most-ordered-list" id="most-ordered-list"></div>
  </section>

  <!-- CATEGORY TABS — underline deslizante -->
  <nav class="category-tabs" id="category-tabs" aria-label="Categorias do menu">
    <span class="tab-ink" id="tab-ink" aria-hidden="true"></span>
  </nav>

  <!-- MENU SEARCH -->
  <div class="menu-search-wrap">
    <label class="menu-search" for="menu-search-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
      </svg>
      <input id="menu-search-input" type="search" inputmode="search" autocomplete="off">
      <button class="menu-search-clear" id="menu-search-clear" type="button" aria-label="Limpar pesquisa">✕</button>
    </label>
    <div class="menu-search-meta" id="menu-search-meta" aria-live="polite"></div>
  </div>

  <!-- DIET FILTER -->
  <div class="diet-filter" id="diet-filter" role="group" aria-label="Filtro de dieta"></div>

  <!-- MENU -->
  <main class="menu" id="menu"></main>

  <!-- WINES -->
  <section class="wine-section" id="section-wines">
    <div class="section-header">
      <div>
        <h2 class="section-title" id="wine-section-title"></h2>
        <span class="section-badge" id="wine-section-badge"></span>
      </div>
    </div>

    <div class="wine-filters" id="wine-filters">
      <div class="wine-filter-group">
        <div class="wine-filter-label" id="wine-filter-country-label"></div>
        <div class="wine-filter-chips" id="wine-filter-country"></div>
      </div>
      <div class="wine-filter-group">
        <div class="wine-filter-label" id="wine-filter-type-label"></div>
        <div class="wine-filter-chips" id="wine-filter-type"></div>
      </div>
      <div class="wine-filter-group">
        <div class="wine-filter-label" id="wine-filter-grape-label"></div>
        <div class="wine-filter-chips" id="wine-filter-grape"></div>
      </div>
    </div>

    <div class="wine-list" id="wine-list"></div>
  </section>

  <!-- WI-FI -->
  <div class="wifi-card" id="wifi-card">
    <div class="wifi-icon" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0114 0"/>
        <path d="M1.42 9a16 16 0 0121.16 0"/>
        <path d="M8.53 16.11a6 6 0 016.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <div class="wifi-info">
      <div class="wifi-label" id="wifi-label"></div>
      <div class="wifi-pass" id="wifi-pass"></div>
      <div class="wifi-hint" id="wifi-hint"></div>
    </div>
  </div>

  <!-- LOYALTY / WhatsApp -->
  <div class="loyalty-card" id="loyalty-card">
    <div class="loyalty-header">
      <div class="loyalty-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.5 3.5A11.9 11.9 0 0012 0C5.4 0 0 5.4 0 12c0 2.1.6 4.2 1.6 6L0 24l6.2-1.6c1.8 1 3.8 1.5 5.8 1.5 6.6 0 12-5.4 12-12 0-3.2-1.2-6.2-3.5-8.4z"/>
        </svg>
      </div>
      <div class="loyalty-text">
        <div class="loyalty-title" id="loyalty-title"></div>
        <div class="loyalty-sub" id="loyalty-sub"></div>
      </div>
    </div>
    <button class="loyalty-btn" id="loyalty-btn"></button>
  </div>

  <!-- AÇÕES -->
  <section class="actions" id="section-actions">
    <button class="action-btn btn-review" id="btn-review">
      <div class="btn-review-main">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8 5.8 21.3l2.4-7.4L2 9.4h7.6z"/>
        </svg>
        <span id="btn-review-label"></span>
      </div>
      <div class="btn-review-sub" id="btn-review-sub"></div>
    </button>

    <a class="action-btn btn-secondary" id="btn-instagram" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      <span id="btn-instagram-label"></span>
    </a>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-info">
      <div class="footer-row">
        <strong id="footer-addr-label"></strong>
        <span id="footer-address"></span>
      </div>
      <div class="footer-row">
        <strong id="footer-phone-label"></strong>
        <a id="footer-phone" href=""></a>
      </div>
      <div class="footer-row">
        <strong id="footer-hours-label"></strong>
        <span id="footer-hours"></span>
      </div>
    </div>

    <button class="share-btn" id="share-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="18" cy="5" r="3"/>
        <circle cx="6" cy="12" r="3"/>
        <circle cx="18" cy="19" r="3"/>
        <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/>
        <line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/>
      </svg>
      <span id="share-label"></span>
    </button>

    <div class="nexo-brand">
      powered by <a href="https://nexosolutions.pt" target="_blank" rel="noopener"><strong>NEXO.</strong></a>
    </div>
  </footer>

  <!-- BACK TO TOP — aparece após scroll -->
  <button class="back-to-top" id="back-to-top" aria-label="Voltar ao topo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <line x1="12" y1="19" x2="12" y2="5"/>
      <polyline points="5 12 12 5 19 12"/>
    </svg>
  </button>

  <!-- TOAST + MODAIS -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- REVIEW MODAL — 2-step rating gate -->
  <div class="modal-overlay" id="review-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>

      <!-- Step 1: Star picker -->
      <div id="review-step-1">
        <div class="modal-header">
          <h3 id="review-step1-title"></h3>
          <button class="modal-close" data-close="review-modal" aria-label="Fechar">✕</button>
        </div>
        <p class="review-subtitle" id="review-step1-sub"></p>
        <div class="star-picker" id="star-picker" role="group" aria-label="Rating">
          <button class="star-btn" data-star="1" aria-label="1 estrela">★</button>
          <button class="star-btn" data-star="2" aria-label="2 estrelas">★</button>
          <button class="star-btn" data-star="3" aria-label="3 estrelas">★</button>
          <button class="star-btn" data-star="4" aria-label="4 estrelas">★</button>
          <button class="star-btn" data-star="5" aria-label="5 estrelas">★</button>
        </div>
        <p class="star-label" id="star-label">&#8203;</p>
      </div>

      <!-- Step 2a: Happy (4-5 stars) — redirect to platform -->
      <div id="review-step-2-happy" style="display:none">
        <div class="modal-header">
          <h3 id="review-happy-title"></h3>
          <button class="modal-close" data-close="review-modal" aria-label="Fechar">✕</button>
        </div>
        <p class="review-subtitle" id="review-happy-sub"></p>
        <div class="review-options">
          <a class="review-option" id="review-google" target="_blank" rel="noopener">
            <div class="review-icon review-icon-google">G</div>
            <div class="review-option-text">
              <div class="review-option-name">Google</div>
              <div class="review-option-sub" id="review-google-sub"></div>
            </div>
            <span class="review-arrow" aria-hidden="true">→</span>
          </a>
          <a class="review-option" id="review-thefork" target="_blank" rel="noopener">
            <div class="review-icon review-icon-thefork">

  <path d="M5 3h14a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/>
</svg>
       <span class="bookmark-label" id="bookmark-label"></span>
          </button>
          <button class="item-share-btn" id="item-share-btn" aria-label="Partilhar" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span id="item-share-label"></span>
          </button>
        </div>
        <!-- Hidden canvas for share image generation -->
        <canvas id="share-canvas" style="display:none;position:absolute;left:-9999px" width="1080" height="1080"></canvas>
        <!-- Primary CTA: adicionar ao pedido -->
        <div class="item-modal-order-bar" id="item-modal-order-bar">
          <button class="item-modal-step-btn" id="item-modal-decrement" aria-label="Diminuir quantidade" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button class="item-modal-add" id="item-modal-add" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span id="item-modal-add-label"></span>
          </button>
        </div>
        <!-- Upsell: "Combina com..." — preenchido dinamicamente pelo JS -->
        <div class="item-modal-upsell" id="item-modal-upsell" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- FLOATING CART PILL — fixed bottom -->
  <button class="cart-pill" id="cart-pill" aria-label="Ver pedido">
    <span class="cart-pill-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="15" y2="17"/>
      </svg>
    </span>
    <span class="cart-pill-text" id="cart-pill-text"></span>
    <span class="cart-pill-total" id="cart-pill-total"></span>
  </button>

  <!-- BOTTOM SHEET — cart details -->
  <div class="modal-overlay cart-sheet-overlay" id="cart-sheet" role="dialog" aria-modal="true" aria-labelledby="cart-sheet-title">
    <div class="modal cart-sheet">
      <div class="modal-handle"></div>
      <div class="cart-sheet-header">
        <h3 id="cart-sheet-title"></h3>
        <button class="modal-close" data-close="cart-sheet" aria-label="Fechar">✕</button>
      </div>

      <!-- Tabs: Pedido / Dividir -->
      <div class="cart-tabs" id="cart-tabs">
        <button class="cart-tab active" data-tab="order" id="tab-order">🧾 Pedido</button>
        <button class="cart-tab" data-tab="split" id="tab-split">➗ Dividir</button>
      </div>

      <!-- Panel: Pedido -->
      <div class="cart-panel" id="panel-order">
        <div class="cart-list" id="cart-list"></div>
        <div class="cart-footer">
          <div class="cart-total-row">
            <span class="cart-total-label" id="cart-total-label"></span>
            <span class="cart-total-value" id="cart-total-value"></span>
          </div>
          <button class="cart-show-staff-btn" id="cart-show-staff-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="16" rx="2"/>
              <line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="13" y2="14"/>
            </svg>
            <span id="cart-show-staff-label"></span>
          </button>
          <button class="cart-clear-btn" id="cart-clear-btn"></button>
        </div>
      </div>

      <!-- Panel: Dividir -->
      <div class="cart-panel" id="panel-split" style="display:none">
        <!-- Pessoas stepper -->
        <div class="split-people-row">
          <span class="split-people-label" id="split-people-label"></span>
          <div class="split-stepper">
            <button class="split-step-btn" id="split-minus" aria-label="Menos">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="split-count" id="split-count">2</span>
            <button class="split-step-btn" id="split-plus" aria-label="Mais">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>

        <!-- Modo: Equal split -->
        <div class="split-mode-row">
          <button class="split-mode-btn active" data-mode="equal" id="split-mode-equal"></button>
          <button class="split-mode-btn" data-mode="custom" id="split-mode-custom"></button>
        </div>

        <!-- Equal: mostra valor por pessoa -->
        <div class="split-equal-result" id="split-equal-result"></div>

        <!-- Custom: assign items to people -->
        <div class="split-custom-panel" id="split-custom-panel" style="display:none">
          <div class="split-people-tabs" id="split-people-tabs"></div>
          <div class="split-assign-list" id="split-assign-list"></div>
          <div class="split-person-summary" id="split-person-summary"></div>
          <div class="split-podium" id="split-podium" style="display:none"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- STAFF FULLSCREEN VIEW — high contrast for staff to read -->
  <div class="staff-view" id="staff-view" role="dialog" aria-modal="true">
    <button class="staff-close" id="staff-close" aria-label="Fechar">✕</button>
    <div class="staff-inner">
      <div class="staff-helper" id="staff-helper"></div>
      <div class="staff-table" id="staff-table"></div>
      <div class="staff-order-id" id="staff-order-id"></div>
      <!-- Multi-order history rendered here -->
      <div class="staff-history" id="staff-history"></div>
      <div class="staff-total" id="staff-total"></div>
    </div>
  </div>

  <div class="modal-overlay modal-item" id="wine-modal" role="dialog" aria-modal="true">
    <div class="modal modal-item-content">
      <button class="modal-item-close" data-close="wine-modal" aria-label="Fechar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="6" y1="18" x2="18" y2="6"/>
        </svg>
      </button>
      <div class="wine-modal-photo" id="wine-modal-photo"></div>
      <div class="item-modal-body">
        <div class="item-modal-header">
          <h3 id="wine-modal-name"></h3>
          <span class="item-modal-price" id="wine-modal-price"></span>
        </div>
        <p class="item-modal-desc" id="wine-modal-desc"></p>
        <div class="wine-modal-specs" id="wine-modal-specs"></div>
        <!-- Vivino rating + link -->
        <div class="vivino-modal-block" id="wine-modal-vivino" style="display:none">
          <div class="vivino-modal-left">
            <div class="vivino-modal-stars"></div>
            <!-- <span class="vivino-modal-score"></span> -->
            <span class="vivino-modal-label">Vivino</span>
          </div>
          <a class="vivino-modal-link" href="" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
