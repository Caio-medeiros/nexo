name: NEXO CI/CD

on:
  push:
    branches: [main, staging]

jobs:
  # ── Tests (same suite as PR gate, always runs first) ─────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (nexo-security.js)
        run: node tests/unit/run.mjs

      - name: Config scan (placeholders / phantom slug / secrets)
        run: node tests/scan/scan.mjs

      - name: Upload unit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: tests/test-report.html
          retention-days: 7

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (menu + portal auth)
        env:
          NEXO_TEST_ENV: prod
          NEXO_TEST_SLUG: marisca-petisca
          CI: 'true'
        run: npx playwright test -c tests/e2e/playwright.config.js menu-smoke.spec.js portal-auth.spec.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7

  # ── Deploy to staging (push to 'staging' branch only) ────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging--nexosolutions.netlify.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify (staging)
        uses: nwtgck/actions-netlify@v3.0.0
        with:
          publish-dir: '.'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Staging deploy — ${{ github.sha }}"
          alias: staging
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

  # ── Deploy to production (push to 'main' branch only) ────────────────────
  deploy-production:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nexosolutions.pt
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify (production)
        uses: nwtgck/actions-netlify@v3.0.0
        with:
          publish-dir: '.'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Notify deploy success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "No Telegram token configured — skipping notify."
            exit 0
          fi
          MSG="✅ NEXO deployed to production%0Acommit: ${{ github.sha }}%0Aby: ${{ github.actor }}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" || true
