<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header">
        <div class="nexo-skeleton" style="width:220px;height:28px"></div>
        <div class="nexo-skeleton" style="width:300px;height:14px;margin-top:10px"></div>
      </div>
      <div class="metric-grid">
        <div class="card nexo-skeleton" style="height:130px"></div>
        <div class="card nexo-skeleton" style="height:130px"></div>
        <div class="card nexo-skeleton" style="height:130px"></div>
        <div class="card nexo-skeleton" style="height:130px"></div>
      </div>
      <div class="card nexo-skeleton" style="height:180px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/dashboard/', client);

    const slug = getMenuSlug(client);
    const menuUrl = getMenuUrl(client);
    const menu = client.menus?.[0] || null;
    if (slug) initNotifications(slug);

    const startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0);
    const startOfMonth = new Date(); startOfMonth.setDate(1); startOfMonth.setHours(0, 0, 0, 0);

    // ── metric queries (all best-effort) ──────────────
    async function count(builder) {
      try { const { count } = await builder; return count || 0; } catch (_) { return 0; }
    }
    let viewsToday = 0, reviewsMonth = 0, ordersToday = 0, revenueToday = 0,
        callsToday = 0, recentNotifs = [], lastReport = null;

    if (slug) {
      const [v, r, ordRes, c, nf, wr] = await Promise.all([
        count(db.from('menu_events').select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug).eq('event_name', 'menu_opened')
          .gte('created_at', startOfDay.toISOString())),
        count(db.from('menu_events').select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug).eq('event_name', 'review_google_clicked')
          .gte('created_at', startOfMonth.toISOString())),
        db.from('orders_log').select('total').eq('espaco_slug', slug)
          .gte('created_at', startOfDay.toISOString()).then(r => r).catch(() => ({ data: [] })),
        count(db.from('staff_calls').select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug).gte('created_at', startOfDay.toISOString())),
        db.from('portal_notifications').select('*').eq('espaco_slug', slug)
          .order('created_at', { ascending: false }).limit(5).then(r => r).catch(() => ({ data: [] })),
        db.from('weekly_reports').select('report_text, created_at').eq('espaco_slug', slug)
          .order('week_start', { ascending: false }).limit(1).maybeSingle().then(r => r).catch(() => ({ data: null })),
      ]);
      viewsToday = v; reviewsMonth = r; callsToday = c;
      const orders = ordRes.data || [];
      ordersToday = orders.length;
      revenueToday = orders.reduce((s, o) => s + (Number(o.total) || 0), 0);
      recentNotifs = nf.data || [];
      lastReport = wr.data || null;
    }

    const firstName = (client.owner_name || client.name || '').split(' ')[0];
    const planLabel = client.plan ? client.plan.charAt(0).toUpperCase() + client.plan.slice(1) : '—';
    const now = new Date();
    const todayStr = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    // ════════════════════════════════════════════════
    // FREE FEATURES — Briefing · Previsão
    // ════════════════════════════════════════════════
    let briefingHtml = '', forecastHtml = '';
    if (slug) {
      const ninetyAgo = new Date(Date.now() - 90 * 86400000).toISOString();
      const sevenAgo = new Date(Date.now() - 7 * 86400000).toISOString();

      let opens = [];
      try {
        const o = await db.from('menu_events').select('created_at').eq('espaco_slug', slug)
          .eq('event_name', 'menu_opened').gte('created_at', ninetyAgo).limit(5000);
        opens = (o.data || []).map(e => new Date(e.created_at));
      } catch (_) { opens = []; }

      const [esgotados, pendentes, revWeek] = await Promise.all([
        count(db.from('item_availability').select('item_id', { count: 'exact', head: true }).eq('espaco_slug', slug).eq('available', false)),
        count(db.from('update_requests').select('id', { count: 'exact', head: true }).eq('client_id', client.id).eq('status', 'pending')),
        count(db.from('menu_events').select('id', { count: 'exact', head: true }).eq('espaco_slug', slug).eq('event_name', 'review_google_clicked').gte('created_at', sevenAgo)),
      ]);

      // ── Briefing diário (06:00–16:00, fechável por dia) ──
      const hour = now.getHours();
      const briefKey = `nexo_brief_closed_${slug}_${now.toISOString().slice(0, 10)}`;
      let briefClosed = false;
      try { briefClosed = sessionStorage.getItem(briefKey) === '1'; } catch (_) {}
      if (hour >= 6 && hour < 16 && !briefClosed) {
        const wd = now.getDay();
        const days30 = new Date(Date.now() - 30 * 86400000);
        const recentSameWd = opens.filter(d => d >= days30 && d.getDay() === wd);
        const hrs = Array(24).fill(0); recentSameWd.forEach(d => hrs[d.getHours()]++);
        const peak = Math.max(...hrs) > 0 ? hrs.indexOf(Math.max(...hrs)) : null;
        const days7 = new Date(Date.now() - 7 * 86400000);
        const lastWeekOpens = opens.filter(d => d >= days7).length;
        const greeting = hour < 12 ? '☀️ Bom dia' : '🌤️ Boa tarde';
        const ds = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'short' });
        const dateCap = ds.charAt(0).toUpperCase() + ds.slice(1);

        const att = [];
        if (esgotados > 0) att.push(`<a href="/portal/disponibilidade/">🔴 ${esgotados} ${esgotados === 1 ? 'item esgotado' : 'itens esgotados'} — ver disponibilidade →</a>`);
        if (pendentes > 0) att.push(`<a href="/portal/alteracoes/">🟡 ${pendentes} ${pendentes === 1 ? 'pedido pendente' : 'pedidos pendentes'} — ver alterações →</a>`);
        if (revWeek > 0) att.push(`<span style="font-size:13px;color:var(--success)">🟢 ${revWeek} ${revWeek === 1 ? 'review esta semana' : 'reviews esta semana'}</span>`);
        const attHtml = att.length ? `<div class="brief-att">${att.join('')}</div>` : `<div class="brief-allclear">✓ Tudo em ordem para hoje.</div>`;

        const tips = [
          '💡 Domingo é bom dia para rever o que correu bem.',
          '💡 Segunda é bom dia para rever a carta da semana.',
          '💡 Actualize os destaques para o fim de semana.',
          '💡 A meio da semana é ideal para pedir reviews.',
          '💡 Amanhã é quinta — prepare os pratos mais pedidos.',
          '💡 Fim de semana a chegar — verifique a disponibilidade.',
          '💡 Dia de maior movimento. Modo Restaurante activado?',
        ];

        briefingHtml = `<div class="card mb-4" style="padding:0" id="brief-card">
          <div class="brief-head">
            <span class="brief-hello">${greeting}${firstName ? ', ' + escapeHtml(firstName) : ''}</span>
            <span class="brief-date">${dateCap}</span>
          </div>
          <div class="brief-body">
            <div>
              <div class="brief-row"><span class="br-ico">👁️</span><span class="br-lbl">Visitas hoje</span><span class="br-val">${viewsToday || '—'}</span></div>
              <div class="brief-row"><span class="br-ico">⏰</span><span class="br-lbl">Hora de pico prevista</span><span class="br-val">${peak != null ? peak + 'h' : '—'}</span></div>
              <div class="brief-row"><span class="br-ico">📊</span><span class="br-lbl">Última semana</span><span class="br-val">${lastWeekOpens} <span class="text-muted">visitas</span></span></div>
            </div>
            <div>${attHtml}</div>
          </div>
          <div class="brief-foot">
            <span class="brief-tip">${tips[wd]}</span>
            <button class="brief-close" id="brief-close" data-key="${briefKey}">Fechar briefing</button>
          </div>
        </div>`;
      }

      // ── Previsão de receita (próximos 7 dias) ──
      const byWd = Array(7).fill(0);
      opens.forEach(d => byWd[d.getDay()]++);
      const weeks = Math.ceil(90 / 7);
      const avgByWd = byWd.map(t => Math.round(t / weeks));
      const recent14 = opens.filter(d => d >= new Date(Date.now() - 14 * 86400000));
      const recentByWd = Array(7).fill(0); recent14.forEach(d => recentByWd[d.getDay()]++);
      const recentAvgByWd = recentByWd.map(c => Math.round(c / 2));

      const fc = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() + i);
        const wd = d.getDay();
        const avg = avgByWd[wd];
        const recentAvg = recentAvgByWd[wd];
        const trendFactor = (recentAvg > 0 && avg > 0) ? recentAvg / avg : 1;
        const predicted = Math.round(avg * trendFactor);
        fc.push({ d, predicted, level: avg === 0 ? 'no-data' : predicted > 50 ? 'high' : predicted > 25 ? 'medium' : 'low' });
      }
      const maxPred = Math.max(1, ...fc.map(f => f.predicted));
      const earliest = opens.length ? Math.min(...opens.map(d => d.getTime())) : Date.now();
      const daysCovered = (Date.now() - earliest) / 86400000;
      const fcColor = { high: 'var(--success)', medium: 'var(--warning)', low: 'var(--info)', 'no-data': 'var(--text-muted)' };
      const fcBadge = { high: '<span class="fc-lvl fc-lvl--high">Pico 🔥</span>', medium: '<span class="fc-lvl fc-lvl--medium">Normal</span>', low: '<span class="fc-lvl fc-lvl--low">Calmo</span>', 'no-data': '' };
      const WDN = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      const fcLabel = (d, i) => i === 0 ? 'Hoje' : i === 1 ? 'Amanhã' : `${WDN[d.getDay()]} ${d.getDate()}`;

      if (opens.length === 0 || daysCovered < 14) {
        forecastHtml = `<div class="card mb-4">
          <div class="flex-between" style="margin-bottom:8px"><div class="card-title" style="margin:0">Previsão da semana</div><span class="text-muted text-xs">Com base nos últimos 90 dias</span></div>
          ${fc.map(() => `<div class="fc-row"><span class="fc-day nexo-skeleton" style="height:12px;border-radius:4px"></span><span class="fc-track nexo-skeleton"></span></div>`).join('')}
          <p class="text-muted text-xs" style="margin-top:10px;font-style:italic">Previsão disponível após 2 semanas de dados.</p>
        </div>`;
      } else {
        forecastHtml = `<div class="card mb-4">
          <div class="flex-between" style="margin-bottom:12px"><div class="card-title" style="margin:0">Previsão da semana</div><span class="text-muted text-xs">Com base nos últimos 90 dias</span></div>
          ${fc.map((f, i) => `<div class="fc-row">
            <span class="fc-day">${fcLabel(f.d, i)}</span>
            <span class="fc-track"><span class="fc-fill" style="width:${Math.round(f.predicted / maxPred * 100)}%;background:${fcColor[f.level]}"></span></span>
            <span class="fc-val">${f.level === 'no-data' ? '—' : f.predicted + ' visitas'}</span>
            ${fcBadge[f.level]}
          </div>`).join('')}
          <p class="text-muted text-xs" style="margin-top:12px;font-style:italic">Baseado em médias históricas dos últimos 90 dias. Actualize a carta antes dos dias de pico.</p>
        </div>`;
      }
    }

    function clientStatusBadge() {
      const map = {
        active: ['badge--success', 'Activo'], lead: ['badge--info', 'Lead'],
        demo_scheduled: ['badge--info', 'Demo'], proposal_sent: ['badge--warning', 'Proposta'],
        churned: ['badge--muted', 'Inactivo'],
      };
      const [cls, label] = map[client.status] || ['badge--muted', client.status || '—'];
      return `<span class="badge ${cls}">${label}</span>`;
    }

    const NOTIF_ICONS = { order_new: '🍽️', staff_call: '🙋', waitlist_new: '⏳',
      review_positive: '⭐', review_negative: '💬', update_done: '✅', menu_viewed: '👁️', menu_change: '✏️' };

    function activityRow(n) {
      return `<div class="activity-row" data-id="${n.id}">
        <span class="activity-icon">${NOTIF_ICONS[n.type] ?? '🔔'}</span>
        <div class="activity-content">
          <div class="activity-title">${escapeHtml(n.title.replace(/^[^\p{L}\p{N}]+/u, ''))}</div>
          ${n.body ? `<div class="activity-desc">${escapeHtml(n.body)}</div>` : ''}
        </div>
        <span class="activity-time">${timeAgo(n.created_at)}</span>
      </div>`;
    }

    const activityHtml = recentNotifs.length
      ? recentNotifs.map(activityRow).join('')
      : `<div class="empty-state">${getIcon('activity', 32)}<p class="empty-title">Sem actividade ainda hoje</p></div>`;

    // ── onboarding ────────────────────────────────────
    const ob = Array.isArray(client.onboarding) ? client.onboarding[0] : client.onboarding;
    // Mesmos 11 passos do NEXO OS — para a % bater certo entre os dois.
    const obSteps = [
      ['received_menu_content', 'Conteúdo do menu recebido'], ['received_logo', 'Logótipo recebido'],
      ['received_colors', 'Cores da marca recebidas'], ['menu_configured', 'Menu configurado'],
      ['deployed_to_netlify', 'Menu publicado'], ['nfc_programmed', 'NFC programado'],
      ['client_approved', 'Aprovação do cliente'], ['hardware_delivered', 'Hardware entregue'],
      ['team_briefed', 'Equipa formada'], ['photo_taken', 'Foto do espaço'],
      ['testimonial_received', 'Testemunho recebido'],
    ];
    let onboardingHtml = '';
    if (ob) {
      const total = obSteps.length;
      const done = obSteps.filter(([k]) => ob[k]).length;
      const pct = Math.round((done / total) * 100);
      if (pct < 100) {
        const pendingSteps = obSteps.filter(([k]) => !ob[k]);
        onboardingHtml = `
          <div class="card mb-4">
            <div class="card-title">Configuração do espaço — ${done}/${total} passos (${pct}%)</div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <p class="text-secondary text-sm" style="margin:8px 0 4px">A NEXO trata destes passos. Em falta:</p>
            ${pendingSteps.map(([, label]) => `<div class="onboarding-step"><span class="step-circle"></span>${label}</div>`).join('')}
          </div>`;
      }
    }

    let reportHtml = '';
    if (lastReport && lastReport.report_text) {
      const sentences = lastReport.report_text.split(/(?<=[.!?])\s+/).slice(0, 2).join(' ');
      reportHtml = `
        <div class="card mb-4">
          <div class="card-title">Relatório semanal</div>
          <p class="text-secondary text-sm" style="line-height:1.6">${escapeHtml(sentences)}…</p>
          <a class="btn btn-secondary btn-sm mt-4" style="display:inline-flex" href="/portal/estatisticas/">Ver relatório completo →</a>
        </div>`;
    }

    const dRenew = (typeof daysToRenewal === 'function') ? daysToRenewal(client) : null;
    const renewalText = dRenew == null ? '—'
      : dRenew < 0 ? '<span class="text-danger">em atraso</span>'
      : dRenew === 0 ? '<span class="text-warning">hoje</span>'
      : `${dRenew} ${dRenew === 1 ? 'dia' : 'dias'}`;

    document.getElementById('page-content').innerHTML = `
      <div class="page-header">
        <p class="text-muted text-xs" style="text-transform:uppercase;letter-spacing:.18em;margin-bottom:6px">Hoje · ${todayStr}</p>
        <h1 class="page-title">Olá, ${escapeHtml(firstName)} 👋</h1>
        <p class="page-sub">${escapeHtml(client.name)} ·
          <span class="badge badge--muted">NEXO ${planLabel}</span> ${clientStatusBadge()}
        </p>
      </div>

      ${renewalBannerHtml(client)}

      <div class="kpi-row">
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Visitas ao menu</span><span class="kpi-ico">${getIcon('eye')}</span></div>
          <div class="kpi-num ${viewsToday > 50 ? 'text-info' : ''}">${viewsToday}<span class="u">hoje</span></div>
          <div class="kpi-foot"><span class="s">aberturas de menu</span><a class="kpi-link" href="/portal/estatisticas/">Ver →</a></div>
        </div>
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Reviews Google</span><span class="kpi-ico">${getIcon('star')}</span></div>
          <div class="kpi-num ${reviewsMonth > 0 ? 'text-success' : ''}">${reviewsMonth}<span class="u">mês</span></div>
          <div class="kpi-foot"><span class="s">cliques para o Google</span><a class="kpi-link" href="/portal/estatisticas/">Funil →</a></div>
        </div>
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Pedidos</span><span class="kpi-ico">${getIcon('grid')}</span></div>
          <div class="kpi-num">${ordersToday}<span class="u">hoje</span></div>
          <div class="kpi-foot"><span class="s">${revenueToday > 0 ? formatEUR(revenueToday) + ' registado' : 'sem pedidos ainda'}</span><a class="kpi-link" href="/portal/sala/">Sala →</a></div>
        </div>
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Chamadas</span><span class="kpi-ico">${getIcon('phone')}</span></div>
          <div class="kpi-num">${callsToday}<span class="u">hoje</span></div>
          <div class="kpi-foot"><span class="s">pedidos de assistência</span><a class="kpi-link" href="/portal/sala/">Sala →</a></div>
        </div>
      </div>

      ${briefingHtml}

      <div class="dash-grid">
        <div>
          <div class="card mb-4">
            <div class="flex-between" style="margin-bottom:14px">
              <div class="card-title" style="margin:0">Actividade recente</div>
              <a href="/portal/sala/" class="text-sm text-secondary">Abrir Modo Restaurante →</a>
            </div>
            <div class="live-strip" id="live-strip">${activityHtml}</div>
          </div>
          ${reportHtml}
        </div>

        <aside class="dash-aside">
          <div class="card">
            <p class="dash-section-label">O seu plano</p>
            <div class="status-row"><span class="status-k">Plano</span><span class="status-v">NEXO ${planLabel}</span></div>
            <div class="status-row"><span class="status-k">Estado</span><span class="status-v">${clientStatusBadge()}</span></div>
            <div class="status-row"><span class="status-k">Renovação</span><span class="status-v">${renewalText}</span></div>
            <a class="btn btn-secondary btn-sm btn-full" style="margin-top:14px" href="/portal/renovacao/">Ver valor & plano →</a>
          </div>

          <div class="card">
            <p class="dash-section-label">Acções rápidas</p>
            <div class="qa-list">
              <a class="qa" href="/portal/sala/">${getIcon('activity')} Modo Restaurante <span class="qa-arrow">→</span></a>
              <a class="qa" href="/portal/disponibilidade/">${getIcon('toggle')} Disponibilidade <span class="qa-arrow">→</span></a>
              <a class="qa" href="/portal/menu/">${getIcon('edit')} Editar menu <span class="qa-arrow">→</span></a>
              <a class="qa" href="/portal/estatisticas/">${getIcon('bar-chart')} Estatísticas <span class="qa-arrow">→</span></a>
            </div>
          </div>

          ${onboardingHtml}
        </aside>
      </div>

      <section style="margin-top:8px">
        <p class="dash-section-label" style="margin-bottom:12px">Atalhos operacionais</p>
        <div class="ops-launch-grid">
          <a class="ops-launch" href="/portal/cozinha/"><span class="ops-ico">🍳</span><span class="ops-lbl">Cozinha</span><span class="ops-badge" id="ops-cozinha" style="display:none"></span></a>
          <a class="ops-launch" href="/portal/sala/"><span class="ops-ico">💰</span><span class="ops-lbl">Salão / Caixa</span><span class="ops-badge" id="ops-caixa" style="display:none"></span></a>
          <a class="ops-launch" href="/portal/estatisticas/"><span class="ops-ico">📊</span><span class="ops-lbl">Estatísticas</span></a>
          <a class="ops-launch" href="/portal/configuracoes/"><span class="ops-ico">⚙️</span><span class="ops-lbl">Configurações</span></a>
        </div>
      </section>

      ${forecastHtml}`;

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    // ── Atalhos operacionais — live ticket counts ──
    (async () => {
      if (!slug) return;
      try {
        const [{ count: koz }, { count: cax }] = await Promise.all([
          db.from('comandas').select('id', { count: 'exact', head: true })
            .eq('espaco_slug', slug).in('status', ['submitted', 'preparing']),
          db.from('comandas').select('id', { count: 'exact', head: true })
            .eq('espaco_slug', slug).in('status', ['open', 'submitted', 'preparing', 'ready']),
        ]);
        const setBadge = (id, n, cls) => {
          const el = document.getElementById(id);
          if (!el || !n) return;
          el.textContent = `● ${n} pedido${n === 1 ? '' : 's'}`;
          el.className = 'ops-badge ' + cls;
          el.style.display = 'inline-flex';
        };
        setBadge('ops-cozinha', koz, koz > 0 ? 'ops-badge--warning' : '');
        setBadge('ops-caixa', cax, 'ops-badge--success');
      } catch (_) {}
    })();

    // briefing — fechar por hoje (sessionStorage, reaparece amanhã)
    const briefCloseBtn = document.getElementById('brief-close');
    if (briefCloseBtn) briefCloseBtn.onclick = () => {
      try { sessionStorage.setItem(briefCloseBtn.dataset.key, '1'); } catch (_) {}
      document.getElementById('brief-card')?.remove();
    };

    // live activity strip — prepend new notifications as they arrive
    window.onNexoNotification = (n) => {
      const strip = document.getElementById('live-strip');
      if (!strip) return;
      const empty = strip.querySelector('.empty-state');
      if (empty) empty.remove();
      strip.insertAdjacentHTML('afterbegin', activityRow(n));
      const rows = strip.querySelectorAll('.activity-row');
      if (rows.length > 5) rows[rows.length - 1].remove();
    };
  })();
  </script>
</body>
</html>
