<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header">
        <div class="nexo-skeleton" style="width:220px;height:28px"></div>
        <div class="nexo-skeleton" style="width:300px;height:14px;margin-top:10px"></div>
      </div>
      <div class="metric-grid">
        <div class="card nexo-skeleton" style="height:130px"></div>
        <div class="card nexo-skeleton" style="height:130px"></div>
        <div class="card nexo-skeleton" style="height:130px"></div>
        <div class="card nexo-skeleton" style="height:130px"></div>
      </div>
      <div class="card nexo-skeleton" style="height:180px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/dashboard/', client);

    const slug = getMenuSlug(client);
    const menuUrl = getMenuUrl(client);
    const menu = client.menus?.[0] || null;
    if (slug) initNotifications(slug);

    const startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0);
    const startOfMonth = new Date(); startOfMonth.setDate(1); startOfMonth.setHours(0, 0, 0, 0);

    // ── metric queries (all best-effort) ──────────────
    async function count(builder) {
      try { const { count } = await builder; return count || 0; } catch (_) { return 0; }
    }
    let viewsToday = 0, reviewsMonth = 0, ordersToday = 0, revenueToday = 0,
        callsToday = 0, recentNotifs = [], lastReport = null;

    if (slug) {
      const [v, r, ordRes, c, nf, wr] = await Promise.all([
        count(db.from('menu_events').select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug).eq('event_name', 'menu_opened')
          .gte('created_at', startOfDay.toISOString())),
        count(db.from('menu_events').select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug).eq('event_name', 'review_google_clicked')
          .gte('created_at', startOfMonth.toISOString())),
        db.from('orders_log').select('total').eq('espaco_slug', slug)
          .gte('created_at', startOfDay.toISOString()).then(r => r).catch(() => ({ data: [] })),
        count(db.from('staff_calls').select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug).gte('created_at', startOfDay.toISOString())),
        db.from('portal_notifications').select('*').eq('espaco_slug', slug)
          .order('created_at', { ascending: false }).limit(5).then(r => r).catch(() => ({ data: [] })),
        db.from('weekly_reports').select('report_text, created_at').eq('espaco_slug', slug)
          .order('week_start', { ascending: false }).limit(1).maybeSingle().then(r => r).catch(() => ({ data: null })),
      ]);
      viewsToday = v; reviewsMonth = r; callsToday = c;
      const orders = ordRes.data || [];
      ordersToday = orders.length;
      revenueToday = orders.reduce((s, o) => s + (Number(o.total) || 0), 0);
      recentNotifs = nf.data || [];
      lastReport = wr.data || null;
    }

    const firstName = (client.owner_name || client.name || '').split(' ')[0];
    const planLabel = client.plan ? client.plan.charAt(0).toUpperCase() + client.plan.slice(1) : '—';
    const now = new Date();
    const todayStr = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    function clientStatusBadge() {
      const map = {
        active: ['badge--success', 'Activo'], lead: ['badge--info', 'Lead'],
        demo_scheduled: ['badge--info', 'Demo'], proposal_sent: ['badge--warning', 'Proposta'],
        churned: ['badge--muted', 'Inactivo'],
      };
      const [cls, label] = map[client.status] || ['badge--muted', client.status || '—'];
      return `<span class="badge ${cls}">${label}</span>`;
    }

    const NOTIF_ICONS = { order_new: '🍽️', staff_call: '🙋', waitlist_new: '⏳',
      review_positive: '⭐', review_negative: '💬', update_done: '✅', menu_viewed: '👁️', menu_change: '✏️' };

    function activityRow(n) {
      return `<div class="activity-row" data-id="${n.id}">
        <span class="activity-icon">${NOTIF_ICONS[n.type] ?? '🔔'}</span>
        <div class="activity-content">
          <div class="activity-title">${escapeHtml(n.title.replace(/^[^\p{L}\p{N}]+/u, ''))}</div>
          ${n.body ? `<div class="activity-desc">${escapeHtml(n.body)}</div>` : ''}
        </div>
        <span class="activity-time">${timeAgo(n.created_at)}</span>
      </div>`;
    }

    const activityHtml = recentNotifs.length
      ? recentNotifs.map(activityRow).join('')
      : `<div class="empty-state">${getIcon('activity', 32)}<p class="empty-title">Sem actividade ainda hoje</p></div>`;

    // ── onboarding ────────────────────────────────────
    const ob = Array.isArray(client.onboarding) ? client.onboarding[0] : client.onboarding;
    // Mesmos 11 passos do NEXO OS — para a % bater certo entre os dois.
    const obSteps = [
      ['received_menu_content', 'Conteúdo do menu recebido'], ['received_logo', 'Logótipo recebido'],
      ['received_colors', 'Cores da marca recebidas'], ['menu_configured', 'Menu configurado'],
      ['deployed_to_netlify', 'Menu publicado'], ['nfc_programmed', 'NFC programado'],
      ['client_approved', 'Aprovação do cliente'], ['hardware_delivered', 'Hardware entregue'],
      ['team_briefed', 'Equipa formada'], ['photo_taken', 'Foto do espaço'],
      ['testimonial_received', 'Testemunho recebido'],
    ];
    let onboardingHtml = '';
    if (ob) {
      const total = obSteps.length;
      const done = obSteps.filter(([k]) => ob[k]).length;
      const pct = Math.round((done / total) * 100);
      if (pct < 100) {
        const pendingSteps = obSteps.filter(([k]) => !ob[k]);
        onboardingHtml = `
          <div class="card mb-4">
            <div class="card-title">Configuração do espaço — ${done}/${total} passos (${pct}%)</div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <p class="text-secondary text-sm" style="margin:8px 0 4px">A NEXO trata destes passos. Em falta:</p>
            ${pendingSteps.map(([, label]) => `<div class="onboarding-step"><span class="step-circle"></span>${label}</div>`).join('')}
          </div>`;
      }
    }

    let reportHtml = '';
    if (lastReport && lastReport.report_text) {
      const sentences = lastReport.report_text.split(/(?<=[.!?])\s+/).slice(0, 2).join(' ');
      reportHtml = `
        <div class="card mb-4">
          <div class="card-title">Relatório semanal</div>
          <p class="text-secondary text-sm" style="line-height:1.6">${escapeHtml(sentences)}…</p>
          <a class="btn btn-secondary btn-sm mt-4" style="display:inline-flex" href="/portal/estatisticas/">Ver relatório completo →</a>
        </div>`;
    }

    const dRenew = (typeof daysToRenewal === 'function') ? daysToRenewal(client) : null;
    const renewalText = dRenew == null ? '—'
      : dRenew < 0 ? '<span class="text-danger">em atraso</span>'
      : dRenew === 0 ? '<span class="text-warning">hoje</span>'
      : `${dRenew} ${dRenew === 1 ? 'dia' : 'dias'}`;

    document.getElementById('page-content').innerHTML = `
      <div class="page-header">
        <p class="text-muted text-xs" style="text-transform:uppercase;letter-spacing:.18em;margin-bottom:6px">Hoje · ${todayStr}</p>
        <h1 class="page-title">Olá, ${escapeHtml(firstName)} 👋</h1>
        <p class="page-sub">${escapeHtml(client.name)} ·
          <span class="badge badge--muted">NEXO ${planLabel}</span> ${clientStatusBadge()}
        </p>
      </div>

      ${renewalBannerHtml(client)}

      <div class="kpi-row">
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Visitas ao menu</span><span class="kpi-ico">${getIcon('eye')}</span></div>
          <div class="kpi-num ${viewsToday > 50 ? 'text-info' : ''}">${viewsToday}<span class="u">hoje</span></div>
          <div class="kpi-foot"><span class="s">aberturas de menu</span><a class="kpi-link" href="/portal/estatisticas/">Ver →</a></div>
        </div>
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Reviews Google</span><span class="kpi-ico">${getIcon('star')}</span></div>
          <div class="kpi-num ${reviewsMonth > 0 ? 'text-success' : ''}">${reviewsMonth}<span class="u">mês</span></div>
          <div class="kpi-foot"><span class="s">cliques para o Google</span><a class="kpi-link" href="/portal/estatisticas/">Funil →</a></div>
        </div>
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Pedidos</span><span class="kpi-ico">${getIcon('grid')}</span></div>
          <div class="kpi-num">${ordersToday}<span class="u">hoje</span></div>
          <div class="kpi-foot"><span class="s">${revenueToday > 0 ? formatEUR(revenueToday) + ' registado' : 'sem pedidos ainda'}</span><a class="kpi-link" href="/portal/sala/">Sala →</a></div>
        </div>
        <div class="card kpi">
          <div class="kpi-top"><span class="kpi-label">Chamadas</span><span class="kpi-ico">${getIcon('phone')}</span></div>
          <div class="kpi-num">${callsToday}<span class="u">hoje</span></div>
          <div class="kpi-foot"><span class="s">pedidos de assistência</span><a class="kpi-link" href="/portal/sala/">Sala →</a></div>
        </div>
      </div>

      <div class="dash-grid">
        <div>
          <div class="card mb-4">
            <div class="flex-between" style="margin-bottom:14px">
              <div class="card-title" style="margin:0">Actividade recente</div>
              <a href="/portal/sala/" class="text-sm text-secondary">Ver sala em directo →</a>
            </div>
            <div class="live-strip" id="live-strip">${activityHtml}</div>
          </div>
          ${reportHtml}
        </div>

        <aside class="dash-aside">
          <div class="card">
            <p class="dash-section-label">O seu plano</p>
            <div class="status-row"><span class="status-k">Plano</span><span class="status-v">NEXO ${planLabel}</span></div>
            <div class="status-row"><span class="status-k">Estado</span><span class="status-v">${clientStatusBadge()}</span></div>
            <div class="status-row"><span class="status-k">Renovação</span><span class="status-v">${renewalText}</span></div>
            <a class="btn btn-secondary btn-sm btn-full" style="margin-top:14px" href="/portal/renovacao/">Ver valor & plano →</a>
          </div>

          <div class="card">
            <p class="dash-section-label">Acções rápidas</p>
            <div class="qa-list">
              <a class="qa" href="/portal/sala/">${getIcon('activity')} Sala em directo <span class="qa-arrow">→</span></a>
              <a class="qa" href="/portal/menu/">${getIcon('edit')} Editar menu <span class="qa-arrow">→</span></a>
              <a class="qa" href="/portal/disponibilidade/">${getIcon('toggle')} Disponibilidade <span class="qa-arrow">→</span></a>
              <a class="qa" href="/portal/estatisticas/">${getIcon('bar-chart')} Estatísticas <span class="qa-arrow">→</span></a>
            </div>
          </div>

          ${onboardingHtml}
        </aside>
      </div>`;

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    // live activity strip — prepend new notifications as they arrive
    window.onNexoNotification = (n) => {
      const strip = document.getElementById('live-strip');
      if (!strip) return;
      const empty = strip.querySelector('.empty-state');
      if (empty) empty.remove();
      strip.insertAdjacentHTML('afterbegin', activityRow(n));
      const rows = strip.querySelectorAll('.activity-row');
      if (rows.length > 5) rows[rows.length - 1].remove();
    };
  })();
  </script>
</body>
</html>
