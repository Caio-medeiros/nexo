<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/portal/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEXO">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="apple-touch-icon" href="/portal/icons/icon-192.png">
  <meta name="robots" content="noindex, nofollow">
  <title>Modo Cozinha — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
  <style>
    .mono { font-family: 'Azeret Mono', ui-monospace, monospace; }

    /* Header */
    .kitchen-header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; padding: 0 20px;
      background: var(--bg-base); border-bottom: 1px solid var(--border);
    }
    .kitchen-id { display: flex; align-items: center; gap: 10px; }
    .kitchen-id .k-logo { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.04em; }
    .kitchen-id .k-mode { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .kitchen-id .k-sep { color: var(--text-muted); }
    .kitchen-id .k-space { font-size: 14px; color: var(--text-secondary); }
    .kitchen-header-right { display: flex; align-items: center; gap: 16px; }
    .k-live { display: inline-flex; align-items: center; gap: 7px; font-family: 'Azeret Mono', monospace; font-size: 11px; color: var(--success); }
    .k-live .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse-dot 1.6s ease infinite; }
    .k-live.reconnecting { color: var(--warning); }
    .k-live.reconnecting .live-dot { background: var(--warning); }
    .k-live.new-order-flash { color: #fff; font-weight: 700; animation: k-neworder 0.7s ease infinite; }
    .k-live.new-order-flash .live-dot { background: #fff; }
    @keyframes k-neworder { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .k-back { font-size: 12px; color: var(--text-muted); text-decoration: none; }
    .k-back:hover { color: var(--text-secondary); }
    .k-fullscreen { background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; min-height: 36px; }
    .k-fullscreen:hover { color: var(--text-secondary); }

    /* ── Voids strip (ANULAÇÕES) — kitchen must see these immediately ── */
    .voids-strip { display: none; position: relative; z-index: 25; padding: 12px 16px 0; gap: 12px; flex-wrap: wrap; }
    .voids-strip.has-voids { display: flex; }
    .void-card {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.55);
      border-radius: 14px; padding: 12px 14px; min-width: 240px; flex: 0 1 280px;
      animation: voidArrive 320ms cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes voidArrive { from { transform: translateY(-10px) scale(0.97); opacity: 0; } }
    .void-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .void-label { font-size: 11px; font-weight: 800; letter-spacing: 0.06em; color: var(--danger); }
    .void-table { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .void-item { display: flex; align-items: baseline; gap: 8px; }
    .void-qty { font-family: 'Azeret Mono', monospace; font-size: 14px; font-weight: 700; color: var(--danger); }
    .void-name { font-size: 15px; font-weight: 600; color: var(--text-primary); text-decoration: line-through; text-decoration-color: rgba(239,68,68,0.6); }
    .void-reason { font-size: 12px; color: var(--text-secondary); margin: 4px 0 10px; }
    .btn-void-ack { width: 100%; background: var(--danger); color: #fff; border: none; border-radius: 8px; padding: 9px 12px; min-height: 44px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-void-ack:active { opacity: 0.85; transform: scale(0.98); }

    /* Grid */
    .ticket-grid {
      padding: 16px;
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }

    .ticket {
      background: var(--bg-surface);
      border: 1px solid var(--border-md);
      border-radius: 16px; overflow: hidden;
      animation: ticketArrive 400ms cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes ticketArrive { from { transform: translateY(-20px) scale(0.97); opacity: 0; } }
    .ticket[data-status="fired"] {
      border-color: rgba(245,158,11,0.5);
      animation: ticketArrive 400ms cubic-bezier(0.16,1,0.3,1) both, borderPulse 2s ease 400ms 3;
    }
    @keyframes borderPulse { 0%,100% { border-color: rgba(245,158,11,0.5); } 50% { border-color: rgba(245,158,11,1); } }
    .ticket[data-status="acknowledged"] { border-color: rgba(59,130,246,0.3); }
    .ticket[data-status="done"] { border-color: rgba(34,197,94,0.5); }

    .ticket-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
    .ticket-left { display: flex; flex-direction: column; gap: 4px; }
    .ticket-table-row { display: flex; align-items: center; gap: 8px; }
    .ticket-table { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .ticket-round-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-hover); color: var(--text-secondary); border-radius: 100px; padding: 2px 9px; white-space: nowrap; }
    .ticket-round-badge.r-first { background: rgba(245,158,11,0.15); color: var(--warning); }
    .ticket-mode { font-size: 11px; color: var(--text-muted); }
    .ticket-timer { font-family: 'Azeret Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text-primary); display: block; text-align: right; line-height: 1; }
    .ticket-timer.age-medium { color: var(--warning); }
    .ticket-timer.age-high { color: var(--danger); }

    .ticket-items { padding: 8px 0; }
    .ticket-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; flex-wrap: wrap; transition: background 150ms ease; }
    .ticket-item[data-status="ready"], .ticket-item[data-status="served"] { background: rgba(34,197,94,0.04); }
    .ticket-item[data-status="preparing"] { background: rgba(59,130,246,0.04); }
    .item-check { width: 32px; height: 32px; min-width: 48px; min-height: 48px; border-radius: 50%; border: 2px solid var(--border-md); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 200ms cubic-bezier(0.16,1,0.3,1); }
    .item-check:hover { border-color: var(--success); background: rgba(34,197,94,0.1); }
    .ticket-item[data-status="preparing"] .item-check { border-color: var(--info); }
    .ticket-item[data-status="ready"] .item-check, .ticket-item[data-status="served"] .item-check { border-color: var(--success); background: var(--success); }
    .check-icon { font-size: 16px; color: var(--text-muted); }
    .ticket-item[data-status="ready"] .check-icon, .ticket-item[data-status="served"] .check-icon { color: #fff; }
    .item-info { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .item-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .ticket-item[data-status="ready"] .item-name, .ticket-item[data-status="served"] .item-name { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--success); }
    .item-qty { font-family: 'Azeret Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
    .item-course { font-size: 14px; flex-shrink: 0; }
    .staff-added-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; background: var(--bg-hover); color: var(--text-muted); border-radius: 4px; padding: 1px 5px; }
    .item-note { font-size: 12px; color: var(--warning); font-style: italic; width: 100%; padding-left: 60px; margin-top: -2px; }

    .ticket-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
    .btn-ack { background: transparent; color: var(--info); border: 1px solid rgba(59,130,246,0.4); border-radius: 8px; padding: 12px 14px; min-height: 48px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 150ms ease; }
    .btn-ack:hover { background: rgba(59,130,246,0.1); }
    .btn-ack:active { transform: scale(0.96); }
    .btn-all-done { background: var(--success); color: #fff; border: none; border-radius: 8px; padding: 12px 16px; min-height: 48px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 150ms ease, transform 150ms ease; }
    .btn-all-done:active { transform: scale(0.96); opacity: 0.85; }

    .kitchen-empty { position: fixed; inset: 56px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .kitchen-empty-icon { font-size: 48px; }
    .kitchen-empty-title { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
    .kitchen-empty-sub { font-size: 14px; color: var(--text-muted); }

    /* This page takes over fully — hide the standard portal chrome. */
    body.kitchen-takeover .portal-nav,
    body.kitchen-takeover .portal-sidebar { display: none; }
    body.kitchen-takeover .portal-main { margin-left: 0; padding: 0; max-width: none; }

    /* Botão "Hoje" + painel lateral de histórico */
    .k-hist-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-elevated); border: 1px solid var(--border-md); color: var(--text-secondary); font-size: 12px; font-weight: 600; padding: 6px 12px; min-height: 36px; border-radius: 8px; cursor: pointer; }
    .k-hist-btn:hover { color: var(--text-primary); border-color: var(--border-strong); }
    .k-hist-count { font-family: 'Azeret Mono', monospace; font-size: 11px; font-weight: 700; background: var(--bg-hover); color: var(--text-primary); border-radius: 100px; padding: 1px 7px; }
    .hist-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 40; opacity: 0; visibility: hidden; transition: opacity 220ms ease, visibility 220ms; }
    .hist-overlay.visible { opacity: 1; visibility: visible; }
    .hist-panel { position: fixed; top: 0; right: 0; bottom: 0; z-index: 41; width: 360px; max-width: 90vw; background: var(--bg-surface); border-left: 1px solid var(--border-md); transform: translateX(100%); transition: transform 280ms cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; }
    .hist-panel.visible { transform: translateX(0); }
    .hist-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .hist-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .hist-close { width: 34px; height: 34px; border-radius: 8px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 13px; }
    .hist-close:hover { color: var(--text-primary); border-color: var(--border-md); }
    .hist-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .hist-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 40px 16px; }
    .hist-row { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
    .hist-row-main { flex: 1; min-width: 0; }
    .hist-row-top { display: flex; align-items: baseline; gap: 8px; }
    .hist-row-table { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .hist-row-time { font-family: 'Azeret Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .hist-row-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .hist-chip { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 100px; white-space: nowrap; }
    .hist-chip.cozinha { background: rgba(245,158,11,0.15); color: var(--warning); }
    .hist-chip.pronto { background: rgba(34,197,94,0.15); color: var(--success); }
    .hist-repor { background: transparent; border: 1px solid var(--border-md); color: var(--text-secondary); font-size: 11px; font-weight: 700; padding: 7px 10px; min-height: 38px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    .hist-repor:hover { border-color: var(--warning); color: var(--warning); background: rgba(245,158,11,0.08); }
    /* Arquivo (só leitura) */
    .hist-row--archived { opacity: 0.85; }
    .hist-chip.arquivado { background: rgba(120,120,120,0.18); color: var(--text-muted); }
    .hist-row-date { font-family: 'Azeret Mono', monospace; font-size: 10px; color: var(--text-muted); }
    /* Banner de pedidos arquivados automaticamente */
    .kitchen-arch-toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); z-index: 60; background: var(--bg-elevated, #1c2230); color: var(--text-primary, #fff); border: 1px solid var(--border-md, rgba(255,255,255,0.14)); border-radius: 12px; padding: 12px 18px; font-size: 13px; font-weight: 600; box-shadow: 0 12px 32px rgba(0,0,0,0.35); opacity: 0; visibility: hidden; transition: opacity 260ms ease, transform 260ms ease, visibility 260ms; max-width: 88vw; }
    .kitchen-arch-toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body class="kitchen-takeover">

  <nav class="portal-nav" id="portal-nav" style="display:none"></nav>
  <aside class="portal-sidebar" id="portal-sidebar" style="display:none"></aside>

  <main class="portal-main" id="main">
    <header class="kitchen-header">
      <div class="kitchen-id">
        <span class="k-logo">NEXO.</span>
        <span class="k-mode">Cozinha</span>
        <span class="k-sep">·</span>
        <span class="k-space" id="k-space">—</span>
      </div>
      <div class="kitchen-header-right">
        <a class="k-back" href="/portal/dashboard/">← Voltar ao portal</a>
        <span class="k-live" id="live-indicator"><span class="live-dot"></span><span class="live-text">Em directo</span></span>
        <button class="k-hist-btn" id="hist-btn" type="button">📋 Hoje <span class="k-hist-count" id="hist-count">0</span></button>
        <button class="k-hist-btn" id="arch-btn" type="button" title="Pedidos arquivados (últimos 7 dias)">🗄 Arquivo</button>
        <button class="k-fullscreen" id="fullscreen-btn">⛶ Ecrã completo</button>
      </div>
    </header>

    <!-- ANULAÇÕES — itens anulados pelo salão. Aparecem aqui de imediato. -->
    <div class="voids-strip" id="voids-strip"></div>

    <div class="ticket-grid" id="ticket-grid"></div>
    <div class="kitchen-empty" id="kitchen-empty" style="display:none">
      <div class="kitchen-empty-icon">👨‍🍳</div>
      <p class="kitchen-empty-title">Cozinha em ordem</p>
      <p class="kitchen-empty-sub">As rondas aparecem aqui quando chegarem</p>
    </div>
  </main>

  <!-- Side tab: rondas de hoje + repor (anular "feito" por engano) -->
  <div class="hist-overlay" id="hist-overlay"></div>
  <aside class="hist-panel" id="hist-panel" aria-hidden="true">
    <div class="hist-head">
      <span class="hist-title">Rondas de hoje</span>
      <button class="hist-close" id="hist-close" type="button" aria-label="Fechar">✕</button>
    </div>
    <div class="hist-list" id="hist-list"></div>
  </aside>

  <!-- Side tab: ARQUIVO — pedidos arquivados (presos > 18h), só leitura -->
  <aside class="hist-panel" id="arch-panel" aria-hidden="true">
    <div class="hist-head">
      <span class="hist-title">Arquivo · últimos 7 dias</span>
      <button class="hist-close" id="arch-close" type="button" aria-label="Fechar">✕</button>
    </div>
    <div class="hist-list" id="arch-list"></div>
  </aside>

  <!-- Banner: aviso de pedidos arquivados automaticamente -->
  <div class="kitchen-arch-toast" id="arch-toast" role="status" aria-live="polite"></div>

  <script src="/portal/_assets/supabase.min.js"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/cozinha/', client);

    const slug = getMenuSlug(client);
    if (!slug) { document.getElementById('ticket-grid').innerHTML =
      '<p class="empty-sub" style="padding:24px">Sem menu configurado.</p>'; return; }
    document.getElementById('k-space').textContent = client.name || slug;
    initNotifications(slug);

    const grid = document.getElementById('ticket-grid');
    const emptyEl = document.getElementById('kitchen-empty');
    // Comandas que ainda contam (a ronda mostra-se enquanto a conta vive).
    const ACTIVE_COMANDA = ['open', 'submitted', 'preparing', 'ready'];
    // Estados de ronda visíveis (inclui 'done' p/ o período de graça de 30s).
    const ROUND_VISIBLE = ['fired', 'acknowledged', 'done'];
    const arrivals = {}; // roundId -> instante em que disparou (um loop p/ todos)
    const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

    // ── audio ──────────────────────────────────────
    let _ac = null;
    function ac() { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); return _ac; }
    function tone(freq, dur, gainV, type) {
      try {
        const c = ac(), osc = c.createOscillator(), g = c.createGain();
        osc.connect(g); g.connect(c.destination); osc.type = type || 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(gainV, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        osc.start(); osc.stop(c.currentTime + dur);
      } catch (_) {}
    }
    function playStatusSound(status) {
      if (status === 'preparing') tone(440, 0.15, 0.1);
      else if (status === 'ready') { tone(520, 0.12, 0.1); setTimeout(() => tone(660, 0.18, 0.1), 100); }
    }
    function playNewOrderSound() { [880, 660, 440].forEach((f, i) => setTimeout(() => tone(f, 0.25, 0.15), i * 80)); }
    function playCompletionSound() { [440, 550, 660, 880].forEach((f, i) => setTimeout(() => tone(f, 0.2, 0.1), i * 60)); }
    // Anulação: som grave e distinto do pedido novo (alerta, não festa).
    function playVoidSound() { tone(200, 0.3, 0.18, 'square'); setTimeout(() => tone(150, 0.4, 0.18, 'square'), 180); }

    // ── data ───────────────────────────────────────
    const state = {}; // roundId -> { round, comanda, items }

    // Período de graça: depois de "Tudo pronto", a ronda fica 30s e sai
    // (vai p/ a side tab "Hoje"). O instante "pronto" sobrevive a recargas.
    const GRACE_MS = 30000;
    const dismissed = new Set();   // rondas já retiradas do ecrã
    const readyAt = {};            // roundId -> timestamp em que ficou pronta
    const RK = (rid) => 'nexo_kReadyR_' + rid;
    function markReady(rid) {
      if (readyAt[rid]) return;
      let t = parseInt(localStorage.getItem(RK(rid)) || '', 10);
      if (isNaN(t)) { t = Date.now(); try { localStorage.setItem(RK(rid), String(t)); } catch (_) {} }
      readyAt[rid] = t;
    }
    function unmarkReady(rid) { delete readyAt[rid]; try { localStorage.removeItem(RK(rid)); } catch (_) {} }
    function sweepReady() {
      let changed = false;
      Object.keys(readyAt).forEach(rid => {
        if (Date.now() - readyAt[rid] >= GRACE_MS) {
          dismissed.add(rid); delete state[rid]; stopTimer(rid); delete readyAt[rid];
          changed = true;
        }
      });
      if (changed) renderAll();
    }

    // True quando todos os itens (não anulados) da ronda estão prontos/servidos.
    function roundIsDone(round) {
      if (round.status === 'done') return true;
      const live = (round.items || []).filter(i => i.status !== 'cancelled');
      return live.length > 0 && live.every(i => i.status === 'ready' || i.status === 'served' || i.status === 'delivered');
    }

    // Constrói a query das rondas. fallback=true omite comandas.archived_at —
    // usado quando a coluna ainda não existe (migração 030 por aplicar): sem
    // isto o Postgres devolve 42703 e a query inteira não traz nada, deixando
    // a COZINHA EM BRANCO mesmo com pedidos. A salvaguarda mantém o ecrã vivo.
    function roundsQuery(fallback) {
      const sel = 'id, comanda_id, round_number, fired_at, status, ' +
        'comandas!inner(table_label, status, mode, session_code' + (fallback ? '' : ', archived_at') + '), ' +
        'comanda_items(id, item_name, quantity, status, notes, course, added_by)';
      let q = db.from('comanda_rounds').select(sel)
        .eq('espaco_slug', slug)
        .in('status', ROUND_VISIBLE)
        .in('comandas.status', ACTIVE_COMANDA);
      if (!fallback) q = q.is('comandas.archived_at', null); // comandas arquivadas saem do ecrã
      return q.order('fired_at', { ascending: true });
    }
    async function selectRoundsResilient() {
      let res = await roundsQuery(false);
      const e = res.error;
      if (e && (e.code === '42703' || /does not exist/i.test(e.message || ''))) {
        console.warn('[cozinha] archived_at em falta (migração 030 por aplicar) — a usar fallback');
        res = await roundsQuery(true);
      }
      return res;
    }

    async function loadAll() {
      const { data: rounds } = await selectRoundsResilient();

      Object.keys(state).forEach(k => delete state[k]);
      (rounds || []).forEach(r => {
        if (dismissed.has(r.id)) return; // já retirada do ecrã
        const entry = {
          round: r, comanda: r.comandas || {},
          items: (r.comanda_items || []).filter(i => i.status !== 'cancelled'),
        };
        // Ronda sem itens visíveis (toda anulada, ou itens ainda a chegar
        // logo após disparar) não ocupa o ecrã.
        if (!entry.items.length) { unmarkReady(r.id); return; }
        if (roundIsDone({ status: r.status, items: entry.items })) markReady(r.id);
        else unmarkReady(r.id);
        state[r.id] = entry;
      });

      // ALERTA FIÁVEL de ronda nova: deteta por DIFF de IDs, por isso toca o
      // som quer o evento tenha chegado por realtime, por poll de segurança ou
      // por reconexão. Nenhuma ronda nova entra em silêncio na cozinha.
      const currentIds = Object.keys(state);
      if (_knownRoundIds !== null) {
        const isNew = currentIds.some(id => !_knownRoundIds.has(id));
        if (isNew) { playNewOrderSound(); flashNewOrder(); }
      }
      _knownRoundIds = new Set(currentIds);

      sweepReady();   // retira rondas prontas já fora do prazo
      renderAll();
    }
    let _knownRoundIds = null; // null = 1ª carga (não alarma no arranque)

    // Realce visual breve no título quando entra ronda nova (reforça o som —
    // útil em cozinha barulhenta / som silenciado).
    function flashNewOrder() {
      try {
        document.title = '🔔 Novo pedido — Cozinha';
        const live = document.querySelector('.k-live');
        if (live) { live.classList.add('new-order-flash'); setTimeout(() => live.classList.remove('new-order-flash'), 4000); }
        setTimeout(() => { document.title = 'Modo Cozinha — NEXO Portal'; }, 4000);
      } catch (_) {}
    }

    // "Cozinha em ordem" só quando não há rondas NEM anulações por ver —
    // senão o ecrã vazio (fixed) tapava a tira de anulações.
    function refreshEmpty() {
      const hasTickets = grid.children.length > 0;
      const hasVoids = voidsStrip.classList.contains('has-voids');
      emptyEl.style.display = (!hasTickets && !hasVoids) ? 'flex' : 'none';
    }

    function renderAll() {
      // Rondas novas à esquerda (mais recente primeiro).
      const list = Object.values(state).sort((a, b) =>
        new Date(b.round.fired_at) - new Date(a.round.fired_at));
      if (!list.length) { grid.innerHTML = '';
        Object.keys(arrivals).forEach(stopTimer); refreshEmpty(); return; }
      grid.innerHTML = list.map(renderTicket).join('');
      refreshEmpty();
      list.forEach(({ round }) => startTimer(round.id, round.fired_at));
      tickAll();
    }

    const COURSE_EMOJI = { entrada: '🥗', principal: '🍽️', sobremesa: '🍮', bebida: '🥤', outro: '•' };
    function roundLabel(n) { return n === 1 ? '1ª ronda' : n + 'ª ronda'; }

    function renderTicket({ round, comanda, items }) {
      const modeLabel = comanda.mode === 'take_away' ? '🥡 Take Away' : '🍽️ Na mesa';
      return `
      <div class="ticket" data-round-id="${round.id}" data-comanda-id="${round.comanda_id}" data-status="${round.status}">
        <div class="ticket-header">
          <div class="ticket-left">
            <div class="ticket-table-row">
              <span class="ticket-table">${escapeHtml(comanda.table_label || 'Mesa')}</span>
              <span class="ticket-round-badge ${round.round_number === 1 ? 'r-first' : ''}">${roundLabel(round.round_number)}</span>
            </div>
            <span class="ticket-mode">${modeLabel}</span>
          </div>
          <div class="ticket-right">
            <span class="ticket-timer mono" id="timer-${round.id}">0:00</span>
          </div>
        </div>
        <div class="ticket-items">
          ${items.map(renderItem).join('') || '<div style="padding:10px 16px;color:var(--text-muted);font-size:13px">Sem itens</div>'}
        </div>
        <div class="ticket-footer">
          ${round.status === 'fired' ? `<button class="btn-ack" data-ack="${round.id}">Recebi ✓</button>` : ''}
          <button class="btn-all-done" data-all-done="${round.id}">Tudo pronto ✅</button>
        </div>
      </div>`;
    }
    const STATUS_LABEL = { sent: 'Novo', preparing: 'A preparar', ready: 'Pronto', served: 'Servido', delivered: 'Servido' };
    function renderItem(i) {
      return `
      <div class="ticket-item" data-item-id="${i.id}" data-status="${i.status}">
        <button class="item-check" data-toggle="${i.id}" aria-label="Mudar estado">
          <span class="check-icon">${(i.status === 'ready' || i.status === 'served') ? '✓' : '○'}</span>
        </button>
        <div class="item-info">
          <span class="item-qty">${i.quantity}×</span>
          <span class="item-name">${escapeHtml(i.item_name)}</span>
          ${i.added_by === 'staff' ? '<span class="staff-added-tag">staff</span>' : ''}
        </div>
        <span class="item-course">${COURSE_EMOJI[i.course] || '•'}</span>
        ${i.notes ? `<span class="item-note">⚠️ ${escapeHtml(i.notes)}</span>` : ''}
      </div>`;
    }

    // ── timers (UM único loop para TODAS as rondas — escala p/ tráfego) ──
    function startTimer(roundId, firedAt) { arrivals[roundId] = new Date(firedAt).getTime(); }
    function stopTimer(roundId) { delete arrivals[roundId]; }
    function tickAll() {
      for (const rid in arrivals) {
        const el = document.getElementById(`timer-${rid}`);
        if (!el) continue;
        const elapsed = Date.now() - arrivals[rid];
        const mins = Math.floor(elapsed / 60000), secs = Math.floor((elapsed % 60000) / 1000);
        el.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        el.className = 'ticket-timer mono' + (mins >= 20 ? ' age-high' : mins >= 10 ? ' age-medium' : '');
      }
    }

    // ── actions ────────────────────────────────────
    grid.addEventListener('click', async (e) => {
      const toggle = e.target.closest('[data-toggle]');
      const allDone = e.target.closest('[data-all-done]');
      const ack = e.target.closest('[data-ack]');
      if (toggle) return toggleItem(toggle.dataset.toggle, toggle);
      if (allDone) return markAllDone(allDone.dataset.allDone);
      if (ack) return acknowledgeRound(ack.dataset.ack);
    });

    function findRoundOf(itemId) {
      for (const rid in state) {
        const it = state[rid].items.find(x => x.id === itemId);
        if (it) return { rid, it };
      }
      return null;
    }

    async function toggleItem(itemId, btn) {
      const itemEl = btn.closest('.ticket-item');
      const cur = itemEl.dataset.status;
      // sent → preparing → ready → (volta a) sent
      const next = cur === 'sent' ? 'preparing' : cur === 'preparing' ? 'ready' : 'sent';
      itemEl.dataset.status = next;
      itemEl.querySelector('.check-icon').textContent = next === 'ready' ? '✓' : '○';
      playStatusSound(next);
      const found = findRoundOf(itemId);
      if (found) found.it.status = next;
      try { await db.from('comanda_items').update({ status: next }).eq('id', itemId); } catch (err) { console.error(err); }
      if (found) maybeMarkRoundDone(found.rid);
    }

    async function maybeMarkRoundDone(rid) {
      const st = state[rid]; if (!st) return;
      const live = st.items.filter(i => i.status !== 'cancelled');
      const allReady = live.length > 0 && live.every(i => i.status === 'ready' || i.status === 'served' || i.status === 'delivered');
      const newStatus = allReady ? 'done' : st.round.status === 'fired' ? 'fired' : 'acknowledged';
      if (newStatus !== st.round.status) {
        st.round.status = newStatus;
        const tk = grid.querySelector(`.ticket[data-round-id="${rid}"]`);
        if (tk) tk.dataset.status = newStatus;
        if (allReady) { playCompletionSound(); markReady(rid); }
        else unmarkReady(rid);
        try { await db.from('comanda_rounds').update({ status: newStatus }).eq('id', rid); } catch (_) {}
        if (allReady) syncComandaReady(st.round.comanda_id);
      }
    }

    // Quando a comanda inteira está feita (sem itens por terminar nem por
    // enviar), marca-a 'ready' — é o sinal que o Salão usa p/ "Pronto".
    async function syncComandaReady(comandaId) {
      if (!comandaId) return;
      try {
        const { count } = await db.from('comanda_items')
          .select('*', { count: 'exact', head: true })
          .eq('comanda_id', comandaId)
          .in('status', ['sent', 'preparing', 'pending']);
        if (!count) {
          await db.from('comandas').update({ status: 'ready' })
            .eq('id', comandaId).in('status', ['submitted', 'preparing']);
        }
      } catch (_) {}
    }

    async function acknowledgeRound(rid) {
      const st = state[rid]; if (!st) return;
      st.round.status = 'acknowledged';
      const tk = grid.querySelector(`.ticket[data-round-id="${rid}"]`);
      if (tk) { tk.dataset.status = 'acknowledged'; const b = tk.querySelector('[data-ack]'); if (b) b.remove(); }
      try {
        await db.from('comanda_rounds').update({ status: 'acknowledged' }).eq('id', rid);
        // marca a comanda como "a preparar" (informa Salão/Caixa)
        await db.from('comandas').update({ status: 'preparing' }).eq('id', st.round.comanda_id).eq('status', 'submitted');
      } catch (_) {}
    }

    async function markAllDone(rid) {
      const st = state[rid]; if (!st) return;
      st.items.forEach(i => { if (i.status !== 'cancelled') i.status = 'ready'; });
      st.round.status = 'done';
      markReady(rid);
      renderAll();
      playCompletionSound();
      try {
        await db.from('comanda_items').update({ status: 'ready' }).eq('round_id', rid).neq('status', 'cancelled');
        await db.from('comanda_rounds').update({ status: 'done' }).eq('id', rid);
        await syncComandaReady(st.round.comanda_id);
      } catch (err) { console.error(err); }
    }

    // ════════════════════════════════════════════════
    // ANULAÇÕES (voids)
    // ════════════════════════════════════════════════
    const VOID_REASON = {
      erro_pedido: 'Erro no pedido', cliente_desistiu: 'Cliente mudou de ideia',
      produto_esgotado: 'Produto esgotado', duplicado: 'Pedido duplicado', outro: 'Outro motivo',
    };
    const voidsStrip = document.getElementById('voids-strip');
    async function loadVoids() {
      const { data } = await db.from('comanda_voids')
        .select('id, item_name, quantity, table_label, void_reason')
        .eq('espaco_slug', slug).eq('acknowledged', false)
        .order('created_at', { ascending: false });
      renderVoids(data || []);
    }
    function renderVoids(voids) {
      if (!voids.length) { voidsStrip.classList.remove('has-voids'); voidsStrip.innerHTML = ''; refreshEmpty(); return; }
      voidsStrip.classList.add('has-voids');
      voidsStrip.innerHTML = voids.map(v => `
        <div class="void-card" data-void-id="${v.id}">
          <div class="void-head">
            <span class="void-label">⚠️ ANULAÇÃO</span>
            <span class="void-table">${escapeHtml(v.table_label || 'Mesa')}</span>
          </div>
          <div class="void-item">
            <span class="void-qty">${v.quantity}×</span>
            <span class="void-name">${escapeHtml(v.item_name)}</span>
          </div>
          <div class="void-reason">${VOID_REASON[v.void_reason] || v.void_reason}</div>
          <button class="btn-void-ack" data-void-ack="${v.id}">Entendido ✓</button>
        </div>`).join('');
    }
    voidsStrip.addEventListener('click', async (e) => {
      const b = e.target.closest('[data-void-ack]');
      if (!b) return;
      const id = b.dataset.voidAck;
      const card = b.closest('.void-card'); if (card) card.remove();
      if (!voidsStrip.querySelector('.void-card')) { voidsStrip.classList.remove('has-voids'); refreshEmpty(); }
      try { await db.from('comanda_voids').update({ acknowledged: true, acknowledged_at: new Date().toISOString() }).eq('id', id); } catch (_) {}
    });

    // ── realtime (alto tráfego: rajadas são COALESCIDAS) ───────
    // O som de "ronda nova" é decidido dentro de loadAll (diff de IDs), por
    // isso vale para realtime, poll e reconexão — sem depender deste evento.
    const scheduleHistory = debounce(loadHistory, 500);
    const scheduleReload = debounce(async () => {
      await loadAll();
      scheduleHistory();
    }, 180);

    const ch = db.channel('cozinha_' + slug);
    // Nova ronda → recarrega (loadAll trata do som)
    ch.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comanda_rounds', filter: `espaco_slug=eq.${slug}` },
      () => scheduleReload());
    ch.on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'comanda_rounds', filter: `espaco_slug=eq.${slug}` },
      () => scheduleReload());
    // Itens mudam de estado (salão adiciona/anula; outro ecrã marca pronto)
    ch.on('postgres_changes', { event: '*', schema: 'public', table: 'comanda_items', filter: `espaco_slug=eq.${slug}` },
      () => scheduleReload());
    // Mesa fechada/paga/cancelada → retira já os bilhetes dessa mesa do ecrã
    // (sem isto, ficavam até ao próximo poll — confuso em serviço movimentado).
    ch.on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'comandas', filter: `espaco_slug=eq.${slug}` },
      () => scheduleReload());
    // Anulações chegam ao instante
    ch.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comanda_voids', filter: `espaco_slug=eq.${slug}` },
      () => { playVoidSound(); loadVoids(); });
    ch.on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'comanda_voids', filter: `espaco_slug=eq.${slug}` },
      () => loadVoids());
    ch.subscribe((status) => {
      setLiveState(status === 'SUBSCRIBED' ? 'connected' : 'reconnecting');
      // Ao (re)ligar, recarrega já para apanhar rondas/itens perdidos enquanto
      // o realtime esteve em baixo — nenhum pedido fica por mostrar.
      if (status === 'SUBSCRIBED') scheduleReload();
    });
    trackChannel(ch);

    // Rede de segurança: recarrega ao voltar online / ficar visível / poll
    // periódico — mesmo que o realtime morra em silêncio, a cozinha actualiza.
    if (window.NexoLiveSync) NexoLiveSync.register(() => loadAll(), { pollMs: 15000 });

    // ── Histórico de hoje (rondas) + repor ("anular feito" por engano) ──
    const STATUS_PT = { fired: 'Na cozinha', acknowledged: 'Na cozinha', done: 'Pronto' };
    const histOverlay = document.getElementById('hist-overlay');
    const histPanel = document.getElementById('hist-panel');
    const histList = document.getElementById('hist-list');
    function startOfTodayISO() { const d = new Date(); d.setHours(0, 0, 0, 0); return d.toISOString(); }

    async function loadHistory() {
      const { data } = await db.from('comanda_rounds')
        .select('id, round_number, fired_at, status, comandas(table_label), comanda_items(id, status)')
        .eq('espaco_slug', slug)
        .gte('fired_at', startOfTodayISO())
        .order('fired_at', { ascending: false });
      const rows = data || [];
      document.getElementById('hist-count').textContent = rows.length;
      if (histPanel.classList.contains('visible')) renderHistory(rows);
    }

    function renderHistory(rows) {
      if (!rows.length) { histList.innerHTML = '<div class="hist-empty">Ainda sem rondas hoje.</div>'; return; }
      histList.innerHTML = rows.map(r => {
        const when = new Date(r.fired_at).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
        const n = (r.comanda_items || []).filter(i => i.status !== 'cancelled').length;
        const chipCls = r.status === 'done' ? 'pronto' : 'cozinha';
        const table = (r.comandas && r.comandas.table_label) || 'Mesa';
        const canRepor = r.status === 'done'; // dada como feita mas pode voltar
        return `<div class="hist-row">
          <div class="hist-row-main">
            <div class="hist-row-top"><span class="hist-row-table">${escapeHtml(table)}</span><span class="hist-row-time">${when}</span></div>
            <div class="hist-row-sub">${roundLabel(r.round_number)} · ${n} ${n === 1 ? 'item' : 'itens'}</div>
          </div>
          <span class="hist-chip ${chipCls}">${STATUS_PT[r.status] || r.status}</span>
          ${canRepor ? `<button class="hist-repor" data-repor="${r.id}">↩ Repor</button>` : ''}
        </div>`;
      }).join('');
      histList.querySelectorAll('[data-repor]').forEach(b => b.addEventListener('click', () => reopenRound(b.dataset.repor)));
    }

    async function reopenRound(rid) {
      // Anula o "feito": a ronda volta para a cozinha (a preparar).
      dismissed.delete(rid); unmarkReady(rid);
      try {
        const { data: r } = await db.from('comanda_rounds').select('comanda_id').eq('id', rid).maybeSingle();
        await db.from('comanda_items').update({ status: 'preparing' }).eq('round_id', rid).eq('status', 'ready');
        await db.from('comanda_rounds').update({ status: 'acknowledged' }).eq('id', rid);
        // a comanda deixa de estar "pronta" (Salão volta a "a preparar").
        if (r && r.comanda_id) await db.from('comandas').update({ status: 'preparing' }).eq('id', r.comanda_id).eq('status', 'ready');
      } catch (e) { console.error(e); }
      await loadAll();
      await loadHistory();
    }

    function openHist() { closeArch(); histOverlay.classList.add('visible'); histPanel.classList.add('visible'); histPanel.setAttribute('aria-hidden', 'false'); loadHistory(); }
    function closeHist() { histPanel.classList.remove('visible'); histPanel.setAttribute('aria-hidden', 'true'); syncOverlay(); }
    document.getElementById('hist-btn').addEventListener('click', openHist);
    document.getElementById('hist-close').addEventListener('click', closeHist);
    histOverlay.addEventListener('click', () => { closeHist(); closeArch(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeHist(); closeArch(); } });

    // ── ARQUIVO — pedidos arquivados (presos > 18h), só leitura ──
    const archPanel = document.getElementById('arch-panel');
    const archList = document.getElementById('arch-list');
    function syncOverlay() {
      const any = histPanel.classList.contains('visible') || archPanel.classList.contains('visible');
      histOverlay.classList.toggle('visible', any);
    }
    async function loadArchive() {
      const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
      const { data } = await db.from('comandas')
        .select('id, table_label, status, created_at, archived_at, total, ' +
                'comanda_items(id, item_name, quantity, status)')
        .eq('espaco_slug', slug)
        .not('archived_at', 'is', null)
        .gte('archived_at', weekAgo)
        .order('archived_at', { ascending: false })
        .limit(100);
      renderArchive(data || []);
    }
    function renderArchive(rows) {
      if (!rows.length) { archList.innerHTML = '<div class="hist-empty">Sem pedidos arquivados nos últimos 7 dias.</div>'; return; }
      archList.innerHTML = rows.map(c => {
        const items = (c.comanda_items || []).filter(i => i.status !== 'cancelled');
        const n = items.reduce((s, i) => s + (i.quantity || 1), 0);
        const when = new Date(c.archived_at).toLocaleString('pt-PT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        const names = items.slice(0, 3).map(i => `${i.quantity || 1}× ${escapeHtml(i.item_name)}`).join(', ');
        const more = items.length > 3 ? ` +${items.length - 3}` : '';
        return `<div class="hist-row hist-row--archived">
          <div class="hist-row-main">
            <div class="hist-row-top"><span class="hist-row-table">${escapeHtml(c.table_label || 'Mesa')}</span><span class="hist-row-date">${when}</span></div>
            <div class="hist-row-sub">${n} ${n === 1 ? 'item' : 'itens'}${names ? ' · ' + names + more : ''}</div>
          </div>
          <span class="hist-chip arquivado">Arquivado</span>
        </div>`;
      }).join('');
    }
    function openArch() { closeHist(); archPanel.classList.add('visible'); archPanel.setAttribute('aria-hidden', 'false'); syncOverlay(); loadArchive(); }
    function closeArch() { archPanel.classList.remove('visible'); archPanel.setAttribute('aria-hidden', 'true'); syncOverlay(); }
    document.getElementById('arch-btn').addEventListener('click', openArch);
    document.getElementById('arch-close').addEventListener('click', closeArch);

    // ── Aviso ao abrir: "X pedidos de ontem foram arquivados" ──
    // Mostra uma vez por dia (comandas arquivadas hoje pelo cron das 05:00 UTC,
    // criadas antes de hoje = pedidos presos de ontem).
    async function checkArchivedNotice() {
      try {
        const todayKey = 'nexo_archNotice_' + slug + '_' + new Date().toISOString().slice(0, 10);
        if (localStorage.getItem(todayKey)) return;
        const { count } = await db.from('comandas')
          .select('id', { count: 'exact', head: true })
          .eq('espaco_slug', slug)
          .not('archived_at', 'is', null)
          .gte('archived_at', startOfTodayISO())
          .lt('created_at', startOfTodayISO());
        localStorage.setItem(todayKey, '1');
        if (count && count > 0) {
          showArchToast(`${count} ${count === 1 ? 'pedido de ontem foi arquivado' : 'pedidos de ontem foram arquivados'} automaticamente.`);
        }
      } catch (_) {}
    }
    let _archToastTimer = null;
    function showArchToast(msg) {
      const el = document.getElementById('arch-toast');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_archToastTimer);
      _archToastTimer = setTimeout(() => el.classList.remove('show'), 7000);
    }

    // ── fullscreen ─────────────────────────────────
    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
      else document.exitFullscreen?.();
    });
    if (new URLSearchParams(location.search).get('fullscreen') === '1') {
      document.documentElement.requestFullscreen?.().catch(() => {});
    }

    // Limpa timestamps "pronto" antigos (>12h) p/ o localStorage não crescer.
    try {
      const cutoff = Date.now() - 12 * 3600 * 1000;
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('nexo_kReadyR_') && parseInt(localStorage.getItem(k) || '0', 10) < cutoff) localStorage.removeItem(k);
      }
    } catch (_) {}

    await loadAll();
    await loadVoids();
    loadHistory(); // contador do botão "Hoje"
    checkArchivedNotice(); // aviso "X pedidos de ontem foram arquivados"
    setInterval(tickAll, 1000);    // UM loop p/ todos os contadores
    setInterval(sweepReady, 5000); // retira rondas prontas passados 30s
  })();
  </script>
</body>
</html>
