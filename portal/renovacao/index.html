<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Renovação & Valor — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
  <style>
    /* ── hero parceria ── */
    .rnv-hero {
      position: relative; overflow: hidden; border-radius: 18px; padding: 30px;
      background:
        radial-gradient(120% 140% at 0% 0%, color-mix(in srgb, var(--brand, #3B82F6) 38%, transparent), transparent 60%),
        radial-gradient(120% 140% at 100% 100%, color-mix(in srgb, var(--brand, #3B82F6) 22%, transparent), transparent 55%),
        var(--bg-elevated);
      border: 1px solid var(--border-md); margin-bottom: 18px;
    }
    .rnv-hero::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(60% 80% at 85% -10%, rgba(255,255,255,.06), transparent 60%);
    }
    .rnv-hero-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .rnv-since { font-size: 13px; color: var(--text-secondary); }
    .rnv-since strong { color: var(--text-primary); }
    .rnv-bigmonths { font-size: 40px; font-weight: 800; letter-spacing: -.03em; line-height: 1.05; margin: 4px 0 2px; }
    .rnv-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    /* ── valor gerado ── */
    .rnv-value-card { text-align: center; padding: 30px 20px; }
    .rnv-value-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-secondary); }
    .rnv-value {
      font-size: clamp(40px, 9vw, 68px); font-weight: 800; letter-spacing: -.04em; line-height: 1;
      margin: 8px 0 6px;
      background: linear-gradient(120deg, var(--text-primary), color-mix(in srgb, var(--brand, #3B82F6) 70%, var(--text-primary)));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .rnv-value-sub { font-size: 13px; color: var(--text-secondary); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    .rnv-value-principle {
      font-size: clamp(22px, 4.5vw, 30px); font-weight: 800; letter-spacing: -.03em; line-height: 1.18; margin: 8px 0 12px;
      background: linear-gradient(120deg, var(--text-primary), color-mix(in srgb, var(--brand, #3B82F6) 70%, var(--text-primary)));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .rnv-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .rnv-stat { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .rnv-stat .n { font-size: 26px; font-weight: 700; letter-spacing: -.02em; }
    .rnv-stat .l { font-size: 12px; color: var(--text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 6px; }

    /* ── contrato + ring ── */
    .rnv-two { display: grid; grid-template-columns: 1.1fr .9fr; gap: 16px; align-items: stretch; }
    @media (max-width: 820px) { .rnv-two { grid-template-columns: 1fr; } }
    .rnv-ring-wrap { display: flex; align-items: center; gap: 20px; }
    .rnv-ring { position: relative; width: 116px; height: 116px; flex-shrink: 0; }
    .rnv-ring svg { transform: rotate(-90deg); }
    .rnv-ring .track { stroke: var(--bg-surface); }
    .rnv-ring .fill { stroke: var(--brand, #3B82F6); stroke-linecap: round; transition: stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); }
    .rnv-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .rnv-ring-center .d { font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
    .rnv-ring-center .u { font-size: 11px; color: var(--text-secondary); }
    .rnv-detail-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .rnv-detail-row:last-child { border-bottom: none; }
    .rnv-detail-row .k { color: var(--text-secondary); }
    .rnv-detail-row .v { font-weight: 600; }

    .rnv-offer {
      border: 1px dashed color-mix(in srgb, var(--brand, #3B82F6) 55%, var(--border-strong));
      border-radius: 14px; padding: 16px; background: color-mix(in srgb, var(--brand, #3B82F6) 8%, transparent);
      margin-top: 4px;
    }
    .rnv-offer .tag { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--brand, #3B82F6); }

    /* ── fidelidade stepper ── */
    .rnv-milestones { display: flex; gap: 0; margin-top: 6px; }
    .rnv-ms { flex: 1; text-align: center; position: relative; padding-top: 26px; }
    .rnv-ms::before { content: ''; position: absolute; top: 9px; left: 0; right: 0; height: 2px; background: var(--border); }
    .rnv-ms:first-child::before { left: 50%; }
    .rnv-ms:last-child::before { right: 50%; }
    .rnv-ms .dot {
      position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 16px; border-radius: 50%; background: var(--bg-surface);
      border: 2px solid var(--border-strong); z-index: 1;
    }
    .rnv-ms.done .dot { background: var(--brand, #3B82F6); border-color: var(--brand, #3B82F6); }
    .rnv-ms.done::before { background: var(--brand, #3B82F6); }
    .rnv-ms .ms-t { font-size: 13px; font-weight: 700; }
    .rnv-ms .ms-s { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .rnv-why { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .rnv-why .w { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--text-secondary); }
    .rnv-why .w b { color: var(--text-primary); }
    .count { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header"><div class="nexo-skeleton" style="width:240px;height:28px"></div></div>
      <div class="card nexo-skeleton" style="height:150px;margin-bottom:16px"></div>
      <div class="card nexo-skeleton" style="height:160px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/renovacao/', client);

    const slug = getMenuSlug(client);
    if (slug) initNotifications(slug);

    const WA = '351918104266';
    const firstName = (client.owner_name || client.name || '').split(' ')[0];
    const planLabel = client.plan ? client.plan.charAt(0).toUpperCase() + client.plan.slice(1) : '—';
    const monthly = Number(client.monthly_value) || 0;

    // ── tempo como cliente ───────────────────────────
    const since = new Date(client.created_at || Date.now());
    const now = new Date();
    const dayMs = 86400000;
    const daysClient = Math.max(0, Math.floor((now - since) / dayMs));
    const monthsClient = Math.max(0, (now.getFullYear() - since.getFullYear()) * 12 + (now.getMonth() - since.getMonth()));
    const sinceStr = since.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });

    // ── renovação ────────────────────────────────────
    const renew = client.plan_renewal_date ? new Date(client.plan_renewal_date + 'T00:00:00') : null;
    const daysLeft = renew ? Math.ceil((renew - now) / dayMs) : null;
    const renewStr = renew ? renew.toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';
    const cycle = 30;
    const ringPct = daysLeft == null ? 1 : Math.max(0, Math.min(1, daysLeft / cycle));

    // ── valor acumulado ──────────────────────────────
    let lt = { visits: 0, sessions: 0, google_clicks: 0, reviews_positive: 0, orders: 0, revenue: 0, value_estimate: 0 };
    try {
      const { data } = await db.rpc('espaco_lifetime', { p_slug: slug });
      if (data) lt = { ...lt, ...data };
    } catch (_) { /* mostra zeros */ }

    // ── milestones de fidelidade ─────────────────────
    const milestones = [
      { m: 0,  t: 'Início',    s: 'bem-vindo' },
      { m: 3,  t: '3 meses',   s: 'a crescer' },
      { m: 6,  t: '6 meses',   s: 'parceria sólida' },
      { m: 12, t: '1 ano',     s: 'cliente NEXO' },
    ];

    const annualPrice = monthly * 10;     // 12 meses, 2 oferta
    const annualSave = monthly * 2;

    const statusMap = {
      active: ['badge--success', 'Contrato activo'], lead: ['badge--info', 'Lead'],
      demo_scheduled: ['badge--info', 'Demo'], proposal_sent: ['badge--warning', 'Proposta'],
      churned: ['badge--muted', 'Inactivo'], suspended: ['badge--muted', 'Suspenso'],
    };
    const [stCls, stLabel] = statusMap[client.status] || ['badge--muted', client.status || '—'];

    const renewMsg = encodeURIComponent(
      `Olá NEXO! Sou ${client.owner_name || client.name} (${client.name}). Quero renovar / falar sobre o meu plano NEXO ${planLabel}.`);

    document.getElementById('page-content').innerHTML = `
      <div class="page-header">
        <h1 class="page-title">A sua parceria com a NEXO</h1>
        <p class="page-sub">Olá ${escapeHtml(firstName)} 👋 Aqui vê o valor que a NEXO já gerou para ${escapeHtml(client.name)} — e como continuar a crescer.</p>
      </div>

      <div class="rnv-hero">
        <div class="rnv-hero-top">
          <div>
            <div class="rnv-since">Cliente NEXO desde <strong>${escapeHtml(sinceStr)}</strong></div>
            <div class="rnv-bigmonths count" data-count="${monthsClient}" data-suffix="${monthsClient === 1 ? ' mês' : ' meses'}">0</div>
            <div class="rnv-since">${monthsClient < 1 ? `há ${daysClient} ${daysClient === 1 ? 'dia' : 'dias'} a digitalizar o serviço` : 'a digitalizar e a crescer connosco'}</div>
            <div class="rnv-chips">
              <span class="badge badge--muted">NEXO ${planLabel}</span>
              <span class="badge ${stCls}">${stLabel}</span>
            </div>
          </div>
          <a class="btn btn-whatsapp" href="https://wa.me/${WA}?text=${renewMsg}" target="_blank" rel="noopener">Renovar / falar com a NEXO →</a>
        </div>
      </div>

      <div class="card rnv-value-card mb-4">
        <div class="rnv-value-label">O valor que a NEXO constrói</div>
        <div class="rnv-value-principle">Não se mede só em euros — compõe-se.</div>
        <p class="rnv-value-sub">
          Uma avaliação no Google, uma visita ao menu ou um cliente que volta não valem
          “X&nbsp;euros” num mês — valem por anos. O princípio da NEXO é simples:
          <strong>cada interação acumula reputação, visibilidade e conhecimento</strong> sobre
          o seu espaço, e isso compõe-se com o tempo. Em baixo, os números reais desde que é
          cliente: a faturação é o que se mede em euros; o resto é a base que torna o seu
          negócio mais forte e mais difícil de igualar.
        </p>
      </div>

      <div class="rnv-stats">
        <div class="rnv-stat"><div class="n count" data-count="${lt.visits}">0</div><div class="l">${getIcon('eye')} visitas ao menu</div></div>
        <div class="rnv-stat"><div class="n count" data-count="${lt.google_clicks}">0</div><div class="l">${getIcon('star')} idas ao Google</div></div>
        <div class="rnv-stat"><div class="n count" data-count="${lt.orders}">0</div><div class="l">${getIcon('grid')} pedidos registados</div></div>
        <div class="rnv-stat"><div class="n count" data-count="${Math.round(lt.revenue)}" data-eur="1">€0</div><div class="l">${getIcon('bar-chart')} faturação registada</div></div>
        <div class="rnv-stat"><div class="n count" data-count="${lt.sessions}">0</div><div class="l">${getIcon('users')} clientes únicos</div></div>
      </div>

      <div class="rnv-two mb-4">
        <div class="card">
          <div class="card-title">O seu contrato</div>
          <div class="rnv-ring-wrap">
            <div class="rnv-ring">
              <svg width="116" height="116" viewBox="0 0 116 116">
                <circle class="track" cx="58" cy="58" r="50" fill="none" stroke-width="9"></circle>
                <circle class="fill" id="renew-ring" cx="58" cy="58" r="50" fill="none" stroke-width="9"
                  stroke-dasharray="${(2 * Math.PI * 50).toFixed(1)}" stroke-dashoffset="${(2 * Math.PI * 50).toFixed(1)}"></circle>
              </svg>
              <div class="rnv-ring-center">
                <div class="d count" data-count="${daysLeft == null ? 0 : Math.max(0, daysLeft)}">0</div>
                <div class="u">${daysLeft != null && daysLeft < 0 ? 'em atraso' : 'dias p/ renovar'}</div>
              </div>
            </div>
            <div style="flex:1">
              <div class="rnv-detail-row"><span class="k">Plano</span><span class="v">NEXO ${planLabel}</span></div>
              <div class="rnv-detail-row"><span class="k">Mensalidade</span><span class="v">${monthly ? formatEUR(monthly) : '—'}</span></div>
              <div class="rnv-detail-row"><span class="k">Próxima renovação</span><span class="v">${renewStr}</span></div>
            </div>
          </div>
          <div class="rnv-offer">
            <div class="tag">★ Incentivo de renovação</div>
            <div style="font-size:14px;font-weight:600;margin:4px 0 2px">Renove 12 meses e ganhe 2 meses de oferta</div>
            <div class="text-secondary text-sm">${monthly ? `Plano anual por ${formatEUR(annualPrice)} — poupa ${formatEUR(annualSave)} face ao mensal.` : 'Fale connosco sobre o plano anual.'} Inclui prioridade no suporte e nas alterações ao menu.</div>
            <a class="btn btn-secondary btn-sm" style="margin-top:10px" href="https://wa.me/${WA}?text=${encodeURIComponent('Olá NEXO! Quero saber mais sobre o plano anual (2 meses de oferta).')}" target="_blank" rel="noopener">Quero o plano anual →</a>
          </div>
        </div>

        <div class="card">
          <div class="card-title">A sua fidelidade</div>
          <div class="rnv-milestones">
            ${milestones.map(ms => `
              <div class="rnv-ms ${monthsClient >= ms.m ? 'done' : ''}">
                <span class="dot"></span>
                <div class="ms-t">${ms.t}</div>
                <div class="ms-s">${ms.s}</div>
              </div>`).join('')}
          </div>
          <p class="text-secondary text-sm" style="margin-top:16px;line-height:1.6">
            ${monthsClient >= 12
              ? 'Já é cliente NEXO há mais de um ano — obrigado pela confiança. A renovação anual mantém tudo a crescer sem interrupções.'
              : `Faltam <strong>${Math.max(0, 3 - monthsClient)}</strong> meses para o próximo marco. Quanto mais tempo connosco, mais dados, reviews e otimizações acumula — e mais difícil é alguém igualar.`}
          </p>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Porque vale a pena continuar com a NEXO</div>
        <div class="rnv-why">
          <div class="w">${getIcon('star')}<span><b>Reputação que se acumula.</b> Cada mês traz mais avaliações no Google — um histórico que não se transfere para outro fornecedor.</span></div>
          <div class="w">${getIcon('bar-chart')}<span><b>Dados do seu negócio.</b> Visitas, pratos mais vistos e horas de pico guardados desde o início, só seus enquanto for cliente.</span></div>
          <div class="w">${getIcon('refresh')}<span><b>Melhorias contínuas.</b> Novas funcionalidades do portal entram sem custo nem reinstalação.</span></div>
          <div class="w">${getIcon('check')}<span><b>Tudo num só sítio.</b> Menu, pedidos, sala em directo e relatórios — integrados e geridos por nós.</span></div>
        </div>
        <a class="btn btn-whatsapp" style="margin-top:16px;display:inline-flex" href="https://wa.me/${WA}?text=${renewMsg}" target="_blank" rel="noopener">Renovar a minha parceria →</a>
      </div>`;

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    // ── animações ─────────────────────────────────────
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function animateCount(el) {
      const target = Number(el.dataset.count) || 0;
      const isEur = el.dataset.eur === '1';
      const suffix = el.dataset.suffix || '';
      const dur = 1100; const t0 = performance.now();
      function frame(t) {
        const p = Math.min(1, (t - t0) / dur);
        const v = target * easeOut(p);
        el.textContent = (isEur ? formatEUR(Math.round(v)) : Math.round(v).toLocaleString('pt-PT')) + (isEur ? '' : suffix);
        if (p < 1) requestAnimationFrame(frame);
        else el.textContent = (isEur ? formatEUR(target) : target.toLocaleString('pt-PT')) + (isEur ? '' : suffix);
      }
      requestAnimationFrame(frame);
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { animateCount(e.target); io.unobserve(e.target); } });
    }, { threshold: 0.4 });
    document.querySelectorAll('.count').forEach(el => io.observe(el));

    // ring fill
    const ring = document.getElementById('renew-ring');
    if (ring) {
      const circ = 2 * Math.PI * 50;
      ring.style.strokeDashoffset = String(circ); // começa vazio
      setTimeout(() => { ring.style.strokeDashoffset = String(circ * (1 - ringPct)); }, 120);
    }
  })();
  </script>
</body>
</html>
