<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0A0A0A">
<title>Sem conexão — NEXO Portal</title>
<style>
  /* Self-contained: no external fonts/CSS — this page must render offline. */
  :root{
    --bg:#0A0A0A; --elev:#161616; --border:rgba(255,255,255,.1);
    --tp:#F0F0F0; --ts:#8a8a8a; --tm:#555; --warn:#F59E0B; --ok:#22C55E;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg); color:var(--tp);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh; min-height:100dvh; display:flex; align-items:center;
    justify-content:center; text-align:center; padding:24px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:380px}
  .logo{font-size:22px; font-weight:800; letter-spacing:-.02em; margin-bottom:28px}
  h2{font-size:1.5rem; font-weight:700; margin-bottom:12px}
  p{color:var(--ts); line-height:1.6; font-size:.95rem; margin-bottom:24px}
  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    height:44px; padding:0 26px; border-radius:10px; font-weight:600; font-size:.9rem;
    background:var(--tp); color:#000; border:none; cursor:pointer; transition:transform .2s;
  }
  .btn:hover{transform:translateY(-2px)}
  .status{
    margin-top:26px; font-size:.8rem; font-family:ui-monospace,'SF Mono',monospace;
    display:inline-flex; align-items:center; gap:8px; color:var(--warn);
  }
  .status.ok{color:var(--ok)}
  .dot{width:8px; height:8px; border-radius:50%; background:currentColor; animation:pulse 1.4s ease infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @media(prefers-reduced-motion:reduce){.dot{animation:none}.btn{transition:none}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">NEXO.</div>
    <h2>Sem conexão</h2>
    <p>O portal precisa de internet para funcionar. Verifique a ligação e tente novamente.</p>
    <button class="btn" id="retryBtn">Tentar novamente</button>
    <div class="status" id="status"><span class="dot"></span><span id="statusText">A verificar conexão…</span></div>
  </div>
  <script>
    var statusEl = document.getElementById('status');
    var textEl = document.getElementById('statusText');
    var checking = false;
    document.getElementById('retryBtn').addEventListener('click', function () {
      window.location.reload();
    });
    setInterval(function () {
      if (checking) return;
      checking = true;
      fetch('/portal/manifest.json', { cache: 'no-store' })
        .then(function () {
          statusEl.classList.add('ok');
          textEl.textContent = 'Ligado! A recarregar…';
          setTimeout(function () { window.location.reload(); }, 600);
        })
        .catch(function () { checking = false; });
    }, 5000);
  </script>
</body>
</html>
