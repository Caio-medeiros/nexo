<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Financeiro — No Manches</title>
  <link rel="stylesheet" href="/portal/no-manches/financeiro/financeiro.css">
  <!-- Supabase self-hosted (mesmo ficheiro do portal — o sw.js documenta um
       incidente em que o CDN falhou nalgumas redes). Chart.js via jsDelivr
       (já permitido na CSP; se falhar, os KPIs continuam a funcionar).
       NÃO carrega portal.js: esta página é standalone — Supabase Auth com a
       conta do DONO e um storageKey próprio (não herda a sessão do portal
       no tablet do staff). A autorização é do servidor: RLS 037 + RPC 038. -->
  <script src="/portal/_assets/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ═══ GATE DE LOGIN (conta do dono) ═══ -->
  <div id="fin-gate">
    <div class="gate-card">
      <div class="gate-lock" id="gate-lock">🔒</div>
      <h1 class="gate-title">Área Financeira</h1>
      <p class="gate-venue">No Manches</p>
      <form id="gate-form" novalidate>
        <input type="email" id="gate-email" class="gate-input"
               placeholder="email do dono" autocomplete="username"
               autocapitalize="none" spellcheck="false" aria-label="Email">
        <input type="password" id="gate-pw" class="gate-input"
               placeholder="••••••••••••••" autocomplete="current-password"
               autocapitalize="none" spellcheck="false" aria-label="Palavra-passe">
        <p class="gate-error" id="gate-error" hidden>Credenciais inválidas</p>
        <button type="submit" class="gate-btn" id="gate-btn">Entrar</button>
      </form>
      <p class="gate-warn">⚠ Acesso restrito ao dono</p>
    </div>
  </div>

  <!-- ═══ DASHBOARD ═══ -->
  <div id="fin-app" hidden>
    <header class="fin-header">
      <div class="fin-header-left">
        <span class="fin-header-title">💰 Financeiro — No Manches</span>
        <span class="fin-live" id="fin-live"><span class="dot"></span><span id="fin-live-txt">A ligar…</span></span>
        <span class="fin-spinner" id="fin-spinner" hidden></span>
      </div>
      <div class="fin-header-right">
        <button type="button" class="fin-refresh" id="fin-refresh" title="Actualizar" hidden>↻ Actualizar</button>
        <button type="button" class="fin-logout" id="nm-logout">Sair 🔒</button>
      </div>
    </header>

    <nav class="fin-views" id="fin-views">
      <button type="button" data-view="faturamento" class="active">💰 Faturamento</button>
      <button type="button" data-view="estatisticas">📊 Estatísticas</button>
    </nav>

    <nav class="fin-periods" id="fin-periods">
      <button type="button" data-period="hoje" class="active">Hoje</button>
      <button type="button" data-period="semana">Semana</button>
      <button type="button" data-period="mes">Mês</button>
      <button type="button" data-period="custom">Período</button>
    </nav>
    <div class="fin-custom-range" id="fin-custom-range" hidden>
      <label>De <input type="date" id="fin-date-start"></label>
      <label>Até <input type="date" id="fin-date-end"></label>
      <button type="button" id="fin-date-apply">Aplicar</button>
    </div>

    <main class="fin-main">
      <section class="kpi-grid" id="kpi-grid"></section>

      <section class="fin-card">
        <h2 class="fin-card-title" id="chart-title">Faturamento</h2>
        <div class="chart-wrap" id="chart-wrap">
          <canvas id="fin-chart"></canvas>
        </div>
      </section>

      <section class="fin-card">
        <h2 class="fin-card-title">Pratos mais vendidos</h2>
        <div id="top-pratos"></div>
      </section>

      <section class="fin-card">
        <h2 class="fin-card-title">Pedidos do período</h2>
        <div id="orders-list"></div>
        <div class="fin-pagination" id="fin-pagination" hidden>
          <button type="button" id="pg-prev">← Anterior</button>
          <span id="pg-info"></span>
          <button type="button" id="pg-next">Próxima →</button>
        </div>
      </section>
    </main>

    <!-- ═══ VISTA ESTATÍSTICAS (antiga página /portal/estatisticas/, agora só do dono) ═══ -->
    <main class="fin-main" id="fin-stats" hidden>
      <nav class="fin-periods" id="stats-ranges">
        <button type="button" data-range="7" class="active">7 dias</button>
        <button type="button" data-range="30">30 dias</button>
        <button type="button" data-range="90">90 dias</button>
        <button type="button" data-range="0">Tudo</button>
      </nav>
      <section class="kpi-grid" id="stats-kpis"></section>
      <section class="fin-card">
        <h2 class="fin-card-title">Actividade por hora</h2>
        <div class="chart-wrap"><canvas id="stats-chart-hours"></canvas></div>
      </section>
      <section class="fin-card">
        <h2 class="fin-card-title">Itens mais vistos</h2>
        <div id="stats-top-items"></div>
      </section>
      <section class="fin-card">
        <h2 class="fin-card-title">Idiomas dos clientes</h2>
        <div id="stats-langs"></div>
      </section>
    </main>
  </div>

  <div id="fin-toasts"></div>
  <div id="fin-modal" hidden></div>

  <script src="/portal/no-manches/financeiro/financeiro.js"></script>
</body>
</html>
