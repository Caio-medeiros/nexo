<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Disponibilidade — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header"><div class="nexo-skeleton" style="width:260px;height:28px"></div></div>
      <div class="card nexo-skeleton" style="height:380px"></div>
    </div>

    <div id="page-content" style="display:none">
      <div class="page-header">
        <h1 class="page-title">Disponibilidade da Carta</h1>
        <div class="status-pill-bar mt-2">
          <span id="status-pill"></span>
        </div>
      </div>

      <div class="card">
        <div id="items-container"></div>
      </div>

      <div class="flex-between mt-4">
        <span class="text-muted text-xs">As alterações aparecem no menu dos clientes em segundos.</span>
        <button class="btn btn-danger" id="reset-all-btn">Repor tudo</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/disponibilidade/', client);

    const slug = getMenuSlug(client);
    const container = document.getElementById('items-container');
    const statusPill = document.getElementById('status-pill');
    const resetBtn = document.getElementById('reset-all-btn');

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    if (!slug) {
      container.innerHTML = '<p class="text-muted text-sm">Sem menu configurado. Contacte a NEXO.</p>';
      resetBtn.style.display = 'none';
      return;
    }

    // ── state ───────────────────────────────────────
    let sections = await loadMenuItems(slug);   // null if not parseable
    let availability = new Map();               // item_id → boolean
    let itemNames = new Map();                  // item_id → name

    async function loadAvailability() {
      const { data, error } = await db.from('item_availability')
        .select('item_id, item_name, available')
        .eq('espaco_slug', slug);
      if (error) {
        showToast('Erro ao carregar disponibilidade.', 'error');
        return;
      }
      availability = new Map((data || []).map(r => [r.item_id, r.available !== false]));
      (data || []).forEach(r => { if (r.item_name) itemNames.set(r.item_id, r.item_name); });
    }
    await loadAvailability();

    if (sections) {
      sections.forEach(s => s.items.forEach(i => itemNames.set(i.id, i.name)));
    }

    // ── render ──────────────────────────────────────
    function offCount() {
      let n = 0;
      availability.forEach(v => { if (!v) n++; });
      return n;
    }

    function renderStatusPill() {
      const off = offCount();
      statusPill.innerHTML = off === 0
        ? '<span class="badge badge--success">Todos disponíveis ✓</span>'
        : `<span class="badge badge--danger"><span class="badge-dot badge-dot--pulse"></span>${off} ${off === 1 ? 'item esgotado' : 'itens esgotados'}</span>`;
    }

    function rowHtml(item) {
      const isOn = availability.get(item.id) !== false;
      return `
        <div class="dispo-row ${isOn ? '' : 'unavailable'}" data-row="${item.id}">
          <div>
            <span class="dispo-name">${escapeHtml(item.name)}</span>
            ${item.price ? `<span class="dispo-price">${escapeHtml(item.price)}</span>` : ''}
          </div>
          <div class="dispo-toggle-wrap">
            <span class="dispo-state-label ${isOn ? 'on' : 'off'}">${isOn ? 'Disponível' : 'Esgotado'}</span>
            <button class="toggle" role="switch" aria-checked="${isOn}"
                    aria-label="${escapeHtml(item.name)} — ${isOn ? 'disponível' : 'esgotado'}"
                    data-toggle="${item.id}" data-name="${escapeHtml(item.name)}"></button>
          </div>
        </div>`;
    }

    function render() {
      renderStatusPill();

      if (sections) {
        container.innerHTML = sections.map(s => `
          <div class="dispo-category">${escapeHtml(s.name)}</div>
          ${s.items.map(rowHtml).join('')}`).join('');
      } else {
        // fallback: config not parseable — manage items already in DB + add by name
        const known = [...availability.keys()].map(id => ({
          id, name: itemNames.get(id) || id, price: '',
        }));
        container.innerHTML = `
          <p class="text-muted text-sm mb-4">Não foi possível carregar a carta automaticamente.
            Pode gerir os itens marcados manualmente.</p>
          ${known.map(rowHtml).join('') || ''}
          <div class="flex gap-2 mt-4">
            <input class="input" id="manual-item-name" placeholder="Nome do item (ex: Polvo à Lagareiro)" style="flex:1">
            <button class="btn btn-secondary" id="manual-add-btn">Marcar esgotado</button>
          </div>`;
        document.getElementById('manual-add-btn')?.addEventListener('click', async () => {
          const input = document.getElementById('manual-item-name');
          const name = input.value.trim();
          if (!name) { input.classList.add('input-error'); return; }
          const id = 'manual:' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
          itemNames.set(id, name);
          await setAvailability(id, false, name);
          input.value = '';
          render();
        });
      }

      container.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.toggle;
          const current = availability.get(id) !== false;
          setAvailability(id, !current, itemNames.get(id) || id);
        });
      });
    }

    // ── mutations (optimistic) ──────────────────────
    async function setAvailability(itemId, available, itemName) {
      const previous = availability.get(itemId);
      availability.set(itemId, available);
      render();

      const { error } = await db.from('item_availability').upsert({
        espaco_slug: slug,
        item_id: itemId,
        item_name: itemName,
        available,
        updated_at: new Date().toISOString(),
        updated_by: 'staff',
      }, { onConflict: 'espaco_slug,item_id' });

      if (error) {
        console.error(error);
        if (previous === undefined) availability.delete(itemId);
        else availability.set(itemId, previous);
        render();
        showToast('Erro. Tente novamente.', 'error');
      }
    }

    resetBtn.addEventListener('click', async () => {
      const off = offCount();
      if (off === 0) { showToast('Todos os itens já estão disponíveis.', 'info'); return; }

      const ok = await confirmModal({
        title: 'Repor disponibilidade',
        body: 'Todos os itens ficarão disponíveis no menu. Confirmar?',
        confirmLabel: 'Repor tudo',
        danger: true,
      });
      if (!ok) return;

      setLoading(resetBtn, true, 'A repor...');
      const { error } = await db.from('item_availability')
        .update({ available: true, updated_at: new Date().toISOString() })
        .eq('espaco_slug', slug)
        .eq('available', false);
      setLoading(resetBtn, false);

      if (error) {
        showToast('Erro. Tente novamente.', 'error');
        return;
      }
      availability.forEach((_, k) => availability.set(k, true));
      render();
      showToast('Todos os itens repostos como disponíveis.', 'success');
    });

    // ── realtime: reflect changes from other devices ─
    function subscribe() {
      const channel = db.channel('dispo-' + slug)
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'item_availability', filter: `espaco_slug=eq.${slug}` },
          (payload) => {
            const row = payload.new;
            if (!row || !row.item_id) return;
            availability.set(row.item_id, row.available !== false);
            if (row.item_name) itemNames.set(row.item_id, row.item_name);
            render();
          })
        .subscribe((status) => {
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
            setTimeout(() => {
              try { db.removeChannel(channel); } catch (_) {}
              subscribe();
              loadAvailability().then(render);
            }, 3000);
          }
        });
      trackChannel(channel);
    }
    subscribe();

    render();
  })();
  </script>
</body>
</html>
