<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/portal/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEXO">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="apple-touch-icon" href="/portal/icons/icon-192.png">
  <meta name="robots" content="noindex, nofollow">
  <title>Guia — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
  <style>
    .guia-feature { display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border); }
    .guia-feature:last-child { border-bottom:none; }
    .guia-ico { font-size:22px; flex-shrink:0; width:34px; text-align:center; }
    .guia-feature h3 { font-size:14px; font-weight:600; margin-bottom:3px; }
    .guia-feature p { font-size:13px; color:var(--text-secondary); line-height:1.55; }
    .guia-feature .where { font-size:12px; color:var(--text-muted); margin-top:4px; }
    .info-check { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .info-check:last-child { border-bottom:none; }
    .info-check .dot { width:7px; height:7px; border-radius:50%; background:var(--warning); flex-shrink:0; margin-top:6px; }
    .info-check strong { color:var(--text-primary); }
    .info-check span { color:var(--text-secondary); }
  </style>
</head>
<body>
  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>
  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header"><div class="nexo-skeleton" style="width:200px;height:28px"></div></div>
      <div class="nexo-skeleton card" style="height:300px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <script src="/portal/_assets/supabase.min.js"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/guia/', client);
    const slug = getMenuSlug(client);
    if (slug) initNotifications(slug);

    const firstName = (client.owner_name || client.name || '').split(' ')[0];

    const features = [
      ['📖', 'O seu menu digital', 'Os clientes abrem o menu no telemóvel com um toque no NFC ou a ler o QR. Em 4 idiomas, com fotos, filtros de dieta e carta de vinhos.', 'Ver Menu (canto superior) · Editar Menu'],
      ['🍽️', 'Pedidos à mesa', 'O cliente monta o pedido no telemóvel e mostra à equipa ou envia por WhatsApp — sem papel e sem erros. Cada pedido aparece-lhe em tempo real.', 'Modo Restaurante · Dashboard'],
      ['🙋', 'Chamar empregado', 'Um toque no menu e a equipa é avisada na hora — sem o cliente ter de acenar.', 'Modo Restaurante'],
      ['⏳', 'Fila de espera', 'Em horas de ponta, os clientes entram na fila pelo telemóvel e são avisados quando a mesa está pronta.', 'Modo Restaurante · Fila de Espera'],
      ['🏠', 'Modo Restaurante', 'O ecrã para o balcão: pedidos, chamadas, fila e actividade — tudo a aparecer ao vivo, com som. Tem modo "ecrã completo" para um tablet.', 'Modo Restaurante'],
      ['🔕', 'Item esgotado', 'Acabou um prato? Desliga-o e ele desaparece do menu na hora. Volta a ligar quando houver.', 'Disponibilidade'],
      ['📊', 'Estatísticas', 'Visitas, pratos mais vistos, idiomas dos clientes, horas de pico e um resumo semanal escrito para si.', 'Estatísticas'],
      ['⭐', 'Mais avaliações Google', 'No momento certo, o menu convida o cliente a avaliar no Google — sem a equipa ter de pedir.', 'Estatísticas (funil de reviews)'],
      ['✏️', 'Alterações ao menu', 'Proponha mudanças a preços, pratos, descrições e fotos em Editar Menu. Cada alteração é revista e aprovada pela NEXO antes de entrar no menu — recebe um aviso quando ficar aprovada.', 'Editar Menu'],
      ['🎁', 'Indique e ganhe', 'Recomende a NEXO a outro espaço e recebe crédito quando ele aderir.', 'Referências'],
      ['⭐', 'Renovação & Valor', 'Veja o valor que a NEXO já gerou para o seu espaço (visitas, reviews, faturação), o estado do contrato e a data de renovação — e renove com um toque.', 'Renovação'],
      ['🔔', 'Notificações', 'O sino no topo avisa-o de tudo o que acontece — pedidos, chamadas, fila — em tempo real.', 'Topo de qualquer página'],
    ];

    const infoNeeded = [
      ['Conteúdo do menu', 'lista de pratos com descrições e preços (texto ou Excel serve).'],
      ['Logótipo', 'em PNG ou SVG, de preferência com fundo transparente.'],
      ['Cores da marca', 'os códigos das cores (ou exemplos do seu material).'],
      ['Link do Google', 'a página do espaço no Google Maps (para as avaliações).'],
      ['WhatsApp do espaço', 'o número que recebe os pedidos dos clientes.'],
      ['Fotos dos pratos', '(opcional) boas fotos aumentam muito os pedidos.'],
    ];

    document.getElementById('page-content').innerHTML = `
      <div class="page-header">
        <h1 class="page-title">Guia — como tirar o máximo da NEXO</h1>
        <p class="page-sub">Olá ${escapeHtml(firstName)} 👋 Aqui explicamos cada funcionalidade em 1 minuto.</p>
      </div>

      <div class="card mb-4">
        <div class="card-title">O que cada funcionalidade faz</div>
        ${features.map(([i,t,d,w]) => `
          <div class="guia-feature">
            <div class="guia-ico">${i}</div>
            <div>
              <h3>${t}</h3>
              <p>${d}</p>
              <div class="where">No portal: ${w}</div>
            </div>
          </div>`).join('')}
      </div>

      <div class="card mb-4">
        <div class="card-title">O que precisamos de si (para activar tudo)</div>
        <p class="text-secondary text-sm" style="margin-bottom:12px">Quanto mais completo, mais rápido o seu espaço fica a 100%. Pode enviar aos poucos.</p>
        ${infoNeeded.map(([t,d]) => `
          <div class="info-check"><span class="dot"></span><span><strong>${t}</strong> — ${d}</span></div>`).join('')}
        <a class="btn btn-whatsapp btn-sm" style="margin-top:16px;display:inline-flex"
           href="https://wa.me/351918104266?text=${encodeURIComponent('Olá NEXO! Quero enviar informação do meu espaço (' + (client.name||'') + ').')}"
           target="_blank" rel="noopener">Enviar por WhatsApp →</a>
        <a class="btn btn-secondary btn-sm" style="margin-top:16px;margin-left:8px;display:inline-flex"
           href="mailto:hello@nexosolutions.pt?subject=${encodeURIComponent('Informação do meu espaço — ' + (client.name||''))}">Enviar por email</a>
      </div>

      <div class="card mb-4">
        <div class="card-title">Resolver sozinho — problemas comuns</div>
        <p class="text-secondary text-sm" style="margin-bottom:8px">A maioria das situações resolve-se aqui no portal, sem esperar por ninguém. Toque numa pergunta.</p>
        <div id="faq"></div>
      </div>

      <div class="card">
        <div class="card-title">Ainda precisa de ajuda?</div>
        <p class="text-secondary text-sm">Se nada acima resolveu, estamos a um WhatsApp de distância.</p>
        <a class="btn btn-whatsapp btn-sm" style="margin-top:12px;display:inline-flex"
           href="https://wa.me/351918104266?text=${encodeURIComponent('Olá NEXO! Preciso de ajuda com o portal (' + (client.name||'') + ').')}"
           target="_blank" rel="noopener">Falar com a NEXO →</a>
      </div>`;

    const faqs = [
      ['Quero mudar um preço, prato, descrição ou foto', 'Vá a <strong>Editar Menu</strong>, faça a alteração e envie. O pedido fica <strong>pendente de aprovação da NEXO</strong> e entra no menu assim que for aprovado — recebe uma notificação. O menu atual mantém-se ao vivo entretanto.'],
      ['Um prato acabou (ou voltou)', 'Vá a <strong>Disponibilidade</strong> e desligue o prato — desaparece do menu na hora. Ligue outra vez quando houver.'],
      ['Alterei algo e o cliente ainda vê o antigo', 'As alterações ao menu só ficam visíveis depois de a NEXO as aprovar. Confirme em <strong>Editar Menu</strong> se o prato ainda está <strong>pendente NEXO</strong>. Já aprovado? O telemóvel do cliente pode ter o menu em cache — peça-lhe para recarregar a página.'],
      ['Esqueci-me da palavra-passe', 'Na página de entrada do portal, toque em <strong>"Esqueceu a palavra-passe?"</strong>, insira o seu email e siga o link que recebe. Não precisamos de intervir.'],
      ['Os pedidos/chamadas não aparecem na Modo Restaurante', 'Mantenha a página <strong>Modo Restaurante</strong> aberta e com internet. Se ficou muito tempo aberta, recarregue (a ligação ao vivo volta a ligar sozinha).'],
      ['O NFC ou o QR não abre o menu', 'Teste com outro telemóvel e com dados móveis ligados. O QR pode estar sujo ou dobrado — limpe/endireite. Se uma tag NFC partiu fisicamente, aí sim fale connosco para substituir.'],
      ['Quero adicionar um prato novo', 'Em <strong>Editar Menu</strong> adicione o prato (nome, preço, descrição, foto) e envie — entra no menu depois de a NEXO aprovar.'],
    ];
    const faqEl = document.getElementById('faq');
    faqEl.innerHTML = faqs.map(([q,a],i) => `
      <details class="faq-item-g" style="border-bottom:1px solid var(--border)">
        <summary style="cursor:pointer;padding:12px 0;font-size:13px;font-weight:500;list-style:none;display:flex;justify-content:space-between;gap:10px">
          <span>${q}</span><span class="text-muted" style="flex-shrink:0">＋</span>
        </summary>
        <p class="text-secondary text-sm" style="padding:0 0 14px;line-height:1.6">${a}</p>
      </details>`).join('');

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';
  })();
  </script>
</body>
</html>
