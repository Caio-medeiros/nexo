<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Reservas — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header"><div class="nexo-skeleton" style="width:200px;height:28px"></div></div>
      <div class="nexo-skeleton card" style="height:300px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/reservas/', client);

    const slug = getMenuSlug(client);
    if (!slug) { renderFatalError('Sem menu configurado para gerir reservas.'); return; }
    initNotifications(slug);

    const RES_URL = `nexosolutions.pt/reservar/${slug}/`;
    const RES_FULL = `https://${RES_URL}`;
    const WEEKDAY = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    const DOW_KEYS = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
    const DOW_PT = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];

    let settings = null;
    let viewDate = new Date(); viewDate.setHours(0, 0, 0, 0);
    let activeTab = 'reservas';
    let statusFilter = 'todas';

    const pad = (n) => String(n).padStart(2, '0');
    const ymd = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

    // load settings (create default row if missing)
    try {
      const { data } = await db.from('reservation_settings').select('*').eq('espaco_slug', slug).maybeSingle();
      settings = data;
    } catch (_) {}
    if (!settings) {
      try {
        const { data } = await db.from('reservation_settings')
          .insert({ espaco_slug: slug, restaurant_name: client.name, enabled: true })
          .select('*').single();
        settings = data;
      } catch (_) { settings = { espaco_slug: slug, enabled: true, opening_hours: {}, blocked_dates: [], total_capacity: 40, max_party_size: 12, slot_duration_minutes: 90, advance_days: 30, min_notice_hours: 2, auto_confirm: false, confirmation_message: '' }; }
    }

    document.getElementById('page-content').innerHTML = `
      <div class="page-header">
        <h1 class="page-title">Reservas</h1>
      </div>
      <div class="tabs-bar">
        <button class="tab-btn active" data-tab="reservas">Reservas</button>
        <button class="tab-btn" data-tab="config">Configurações</button>
      </div>
      <div id="tab-reservas"></div>
      <div id="tab-config" style="display:none"></div>`;
    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    document.querySelector('.tabs-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-tab]'); if (!btn) return;
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('tab-reservas').style.display = activeTab === 'reservas' ? 'block' : 'none';
      document.getElementById('tab-config').style.display = activeTab === 'config' ? 'block' : 'none';
      if (activeTab === 'config') renderConfig();
    });

    // ════════ TAB: RESERVAS ════════
    function statusBadge(s) {
      const map = {
        pending: ['badge--warning', 'Pendente'], confirmed: ['badge--success', 'Confirmada'],
        seated: ['badge--info', 'Sentada'], completed: ['badge--muted', 'Concluída'],
        cancelled: ['badge--muted', 'Cancelada'], no_show: ['badge--danger', 'No-show'],
      };
      const [cls, lbl] = map[s] || ['badge--muted', s];
      return `<span class="badge ${cls}">${lbl}</span>`;
    }

    async function loadReservations() {
      const list = document.getElementById('res-list');
      if (list) list.innerHTML = skeleton('100%', '80px');
      let rows = [];
      try {
        const { data } = await db.from('reservations').select('*')
          .eq('espaco_slug', slug).eq('reservation_date', ymd(viewDate))
          .order('reservation_time', { ascending: true });
        rows = data || [];
      } catch (_) {}

      const pendingN = rows.filter(r => r.status === 'pending').length;
      const peopleN = rows.filter(r => !['cancelled', 'no_show'].includes(r.status)).reduce((s, r) => s + r.party_size, 0);
      const statsEl = document.getElementById('res-stats');
      if (statsEl) statsEl.innerHTML =
        `<span class="badge badge--muted">${rows.length} reservas</span>
         <span class="badge badge--warning">${pendingN} pendentes</span>
         <span class="badge badge--info">${peopleN} pessoas</span>`;

      const filtered = statusFilter === 'todas' ? rows : rows.filter(r => r.status === statusFilter);
      if (!list) return;
      list.innerHTML = filtered.length ? filtered.map(resCard).join('')
        : `<div class="empty-state">${getIcon('calendar', 32)}<p class="empty-title">Sem reservas para este dia</p></div>`;
    }

    function resCard(r) {
      const t = String(r.reservation_time).slice(0, 5);
      const actions = [];
      if (r.status === 'pending') actions.push(`<button class="btn btn-success btn-sm" data-act="confirm" data-id="${r.id}">Confirmar</button>`);
      if (['pending', 'confirmed'].includes(r.status)) actions.push(`<button class="btn btn-secondary btn-sm" data-act="seat" data-id="${r.id}">Sentar 🪑</button>`);
      if (['pending', 'confirmed'].includes(r.status)) actions.push(`<button class="btn btn-secondary btn-sm" data-act="noshow" data-id="${r.id}">No-show</button>`);
      if (!['cancelled', 'completed', 'no_show'].includes(r.status)) actions.push(`<button class="btn btn-danger btn-sm" data-act="cancel" data-id="${r.id}">Cancelar</button>`);
      const wa = r.guest_phone ? r.guest_phone.replace(/\D/g, '') : '';
      return `<div class="res-card" data-id="${r.id}">
        <div class="res-head">
          <div><span class="res-name">${escapeHtml(r.guest_name)}</span> <span class="res-ref">${escapeHtml(r.reference)}</span></div>
          ${statusBadge(r.status)}
        </div>
        <div class="res-meta">
          <span>🕐 ${t}</span><span>👥 ${r.party_size}p</span>
          ${wa ? `<a href="https://wa.me/${wa}" target="_blank" rel="noopener" class="text-secondary">📱 ${escapeHtml(r.guest_phone)}</a>` : ''}
          ${r.special_requests ? `<span>💬 ${escapeHtml(r.special_requests)}</span>` : ''}
        </div>
        <div class="res-actions">${actions.join('')}</div>
      </div>`;
    }

    function renderReservas() {
      document.getElementById('tab-reservas').innerHTML = `
        <div class="status-pill-bar" id="res-stats"></div>
        <div class="date-nav">
          <button class="date-nav-btn" id="day-prev">‹</button>
          <span class="date-nav-label" id="day-label"></span>
          <button class="date-nav-btn" id="day-next">›</button>
          <button class="btn btn-secondary btn-sm" id="day-today">Hoje</button>
        </div>
        <div class="filter-tabs" id="res-filters">
          ${['todas', 'pending', 'confirmed', 'no_show', 'cancelled'].map(s => {
            const lbl = { todas: 'Todas', pending: 'Pendente', confirmed: 'Confirmada', no_show: 'No-show', cancelled: 'Cancelada' }[s];
            return `<button class="filter-tab ${s === statusFilter ? 'active' : ''}" data-filter="${s}">${lbl}</button>`;
          }).join('')}
        </div>
        <div id="res-list"></div>`;
      updateDayLabel();

      document.getElementById('day-prev').onclick = () => { viewDate.setDate(viewDate.getDate() - 1); updateDayLabel(); loadReservations(); };
      document.getElementById('day-next').onclick = () => { viewDate.setDate(viewDate.getDate() + 1); updateDayLabel(); loadReservations(); };
      document.getElementById('day-today').onclick = () => { viewDate = new Date(); viewDate.setHours(0, 0, 0, 0); updateDayLabel(); loadReservations(); };
      document.getElementById('res-filters').addEventListener('click', (e) => {
        const b = e.target.closest('[data-filter]'); if (!b) return;
        statusFilter = b.dataset.filter;
        document.querySelectorAll('#res-filters .filter-tab').forEach(x => x.classList.toggle('active', x === b));
        loadReservations();
      });
      document.getElementById('res-list').addEventListener('click', onResAction);
      loadReservations();
    }

    function updateDayLabel() {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const isToday = viewDate.getTime() === today.getTime();
      const lbl = `${WEEKDAY[viewDate.getDay()]}, ${viewDate.getDate()}/${pad(viewDate.getMonth() + 1)}`;
      document.getElementById('day-label').textContent = isToday ? `Hoje · ${lbl}` : lbl;
    }

    async function onResAction(e) {
      const btn = e.target.closest('[data-act]'); if (!btn) return;
      const id = btn.dataset.id, act = btn.dataset.act;
      btn.disabled = true;

      if (act === 'confirm') {
        try {
          await db.from('reservations').update({ status: 'confirmed' }).eq('id', id);
          showToast('Reserva confirmada.', 'success');
          triggerWhatsApp(id, 'confirmation');
        } catch (_) { showToast('Erro ao confirmar.', 'error'); btn.disabled = false; }
        loadReservations();
      } else if (act === 'seat') {
        try { await db.from('reservations').update({ status: 'seated', seated_at: new Date().toISOString() }).eq('id', id); } catch (_) {}
        loadReservations();
      } else if (act === 'noshow') {
        try { await db.from('reservations').update({ status: 'no_show' }).eq('id', id); } catch (_) {}
        loadReservations();
      } else if (act === 'cancel') {
        btn.disabled = false;
        cancelModal(id);
      }
    }

    async function triggerWhatsApp(id, type) {
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/send-reservation-notification`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
          body: JSON.stringify({ reservation_id: id, type }),
        });
        const d = await res.json();
        if (d.guest_url) window.open(d.guest_url, '_blank');
      } catch (_) {}
    }

    function cancelModal(id) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-title">Cancelar reserva</div>
          <div class="modal-body">Indique o motivo (o cliente poderá ser notificado).</div>
          <select class="input" id="cancel-reason" style="margin-bottom:16px">
            <option value="Lotação esgotada">Lotação esgotada</option>
            <option value="Encerramento imprevisto">Encerramento imprevisto</option>
            <option value="A pedido do cliente">A pedido do cliente</option>
            <option value="Outro motivo">Outro motivo</option>
          </select>
          <label class="flex gap-2 text-sm" style="margin-bottom:16px;align-items:center">
            <input type="checkbox" id="cancel-wa" checked> Notificar cliente por WhatsApp
          </label>
          <div class="modal-actions">
            <button class="btn btn-secondary" data-cancel>Voltar</button>
            <button class="btn btn-danger" data-confirm>Cancelar reserva</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('visible'));
      const close = () => { overlay.classList.remove('visible'); setTimeout(() => overlay.remove(), 200); };
      overlay.querySelector('[data-cancel]').onclick = close;
      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
      overlay.querySelector('[data-confirm]').onclick = async () => {
        const reason = overlay.querySelector('#cancel-reason').value;
        const notify = overlay.querySelector('#cancel-wa').checked;
        close();
        try {
          await db.from('reservations').update({ status: 'cancelled', cancelled_reason: reason }).eq('id', id);
          showToast('Reserva cancelada.', 'success');
          if (notify) triggerWhatsApp(id, 'cancellation');
        } catch (_) { showToast('Erro ao cancelar.', 'error'); }
        loadReservations();
      };
    }

    // ════════ TAB: CONFIGURAÇÕES ════════
    function renderConfig() {
      const s = settings;
      const oh = s.opening_hours || {};
      const blocked = s.blocked_dates || [];
      document.getElementById('tab-config').innerHTML = `
        <div class="card mb-4">
          <div class="card-title">Link público de reservas</div>
          <p class="text-secondary text-sm">Partilhe em qualquer canal — Instagram, Google, WhatsApp, QR na porta.</p>
          <div class="link-display">
            <span class="link-text">${RES_URL}</span>
            <button class="btn btn-secondary btn-sm" id="copy-link">${getIcon('copy')} Copiar</button>
            <a class="btn btn-secondary btn-sm" href="${RES_FULL}" target="_blank" rel="noopener">${getIcon('external-link')}</a>
          </div>
          <div class="qr-wrap">
            <canvas id="qr-canvas"></canvas>
            <button class="btn btn-secondary btn-sm" id="qr-download">${getIcon('qr')} Descarregar QR</button>
          </div>
          <div class="flex gap-2" style="flex-wrap:wrap;margin-top:8px">
            <button class="btn btn-secondary btn-sm" id="share-ig">Copiar para Instagram</button>
            <a class="btn btn-whatsapp btn-sm" id="share-wa" target="_blank" rel="noopener"
               href="https://wa.me/?text=${encodeURIComponent('Reserve a sua mesa online: ' + RES_FULL)}">Partilhar no WhatsApp ↗</a>
            <a class="btn btn-secondary btn-sm" href="${RES_FULL}" target="_blank" rel="noopener">Abrir página →</a>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-title">Definições gerais</div>
          <div class="settings-row">
            <div><div class="label">Reservas activas</div><div class="hint">Quando desligado, a página mostra "indisponível".</div></div>
            <button class="toggle" id="set-enabled" role="switch" aria-checked="${s.enabled}"></button>
          </div>
          <div class="settings-row">
            <div class="label">Nome do restaurante</div>
            <input class="input-sm" id="set-name" style="width:180px" value="${escapeHtml(s.restaurant_name || client.name || '')}">
          </div>
          <div class="settings-row">
            <div class="label">Capacidade total do espaço</div>
            <input class="input-sm" id="set-capacity" type="number" min="1" value="${s.total_capacity ?? 40}">
          </div>
          <div class="settings-row">
            <div class="label">Tamanho máximo de grupo</div>
            <input class="input-sm" id="set-maxparty" type="number" min="1" value="${s.max_party_size ?? 12}">
          </div>
          <div class="settings-row">
            <div class="label">Duração média de refeição</div>
            <select class="input-sm" id="set-duration">
              ${[60, 90, 120, 150].map(v => `<option value="${v}" ${s.slot_duration_minutes === v ? 'selected' : ''}>${v} min</option>`).join('')}
            </select>
          </div>
          <div class="settings-row">
            <div class="label">Antecedência máxima</div>
            <select class="input-sm" id="set-advance">
              ${[7, 14, 30, 60].map(v => `<option value="${v}" ${s.advance_days === v ? 'selected' : ''}>${v} dias</option>`).join('')}
            </select>
          </div>
          <div class="settings-row">
            <div class="label">Aviso mínimo</div>
            <select class="input-sm" id="set-notice">
              ${[1, 2, 4, 12, 24].map(v => `<option value="${v}" ${s.min_notice_hours === v ? 'selected' : ''}>${v}h</option>`).join('')}
            </select>
          </div>
          <div class="settings-row">
            <div><div class="label">Confirmação automática</div><div class="hint">Reservas ficam confirmadas sem aprovação manual.</div></div>
            <button class="toggle" id="set-autoconfirm" role="switch" aria-checked="${s.auto_confirm}"></button>
          </div>
          <div class="settings-row">
            <div class="label">WhatsApp para notificações</div>
            <input class="input-sm" id="set-whatsapp" style="width:160px" placeholder="+351…" value="${escapeHtml(s.whatsapp_notify || '')}">
          </div>
          <div style="padding-top:14px">
            <label class="field-label">Mensagem de confirmação</label>
            <textarea class="input" id="set-message" rows="2" maxlength="200">${escapeHtml(s.confirmation_message || '')}</textarea>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-title">Horário de funcionamento</div>
          ${DOW_KEYS.map((k, i) => {
            const d = oh[k] || { open: '12:00', close: '23:00', closed: false };
            return `<div class="hours-row" data-day="${k}">
              <span class="hours-day">${DOW_PT[i]}</span>
              <button class="toggle" data-dayclosed role="switch" aria-checked="${!d.closed}"></button>
              <div class="hours-times">
                <input class="input-sm" type="time" data-open value="${d.open || '12:00'}" ${d.closed ? 'disabled' : ''}>
                <span class="text-muted">–</span>
                <input class="input-sm" type="time" data-close value="${d.close === '24:00' ? '23:59' : (d.close || '23:00')}" ${d.closed ? 'disabled' : ''}>
              </div>
            </div>`;
          }).join('')}
        </div>

        <div class="card mb-4">
          <div class="card-title">Datas bloqueadas</div>
          <div class="flex gap-2" style="margin-bottom:12px">
            <input class="input-sm" type="date" id="block-date">
            <button class="btn btn-secondary btn-sm" id="block-add">Adicionar</button>
          </div>
          <div id="blocked-list">${renderBlocked(blocked)}</div>
        </div>

        <button class="btn btn-primary" id="save-settings">Guardar configurações</button>`;

      // QR
      if (window.QRCode) {
        QRCode.toCanvas(document.getElementById('qr-canvas'), RES_FULL, { width: 200, margin: 1 }, () => {});
      }
      document.getElementById('qr-download').onclick = () => {
        const canvas = document.getElementById('qr-canvas');
        canvas.toBlob((blob) => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `nexo-reservas-${slug}.png`;
          a.click();
          URL.revokeObjectURL(a.href);
        });
      };
      document.getElementById('copy-link').onclick = (e) => copyToClipboard(RES_FULL, e.currentTarget);
      document.getElementById('share-ig').onclick = () => copyToClipboard(RES_FULL);

      // toggles
      bindToggle('set-enabled');
      bindToggle('set-autoconfirm');
      document.querySelectorAll('[data-dayclosed]').forEach(t => {
        t.onclick = () => {
          const on = t.getAttribute('aria-checked') === 'true';
          t.setAttribute('aria-checked', String(!on));
          const row = t.closest('.hours-row');
          row.querySelector('[data-open]').disabled = on;
          row.querySelector('[data-close]').disabled = on;
        };
      });

      // blocked dates
      let blockedDates = [...blocked];
      document.getElementById('block-add').onclick = () => {
        const v = document.getElementById('block-date').value;
        if (v && !blockedDates.includes(v)) { blockedDates.push(v); blockedDates.sort(); document.getElementById('blocked-list').innerHTML = renderBlocked(blockedDates); rebindBlocked(); }
      };
      function rebindBlocked() {
        document.querySelectorAll('[data-rmdate]').forEach(b => {
          b.onclick = () => { blockedDates = blockedDates.filter(d => d !== b.dataset.rmdate); document.getElementById('blocked-list').innerHTML = renderBlocked(blockedDates); rebindBlocked(); };
        });
      }
      rebindBlocked();

      document.getElementById('save-settings').onclick = async (e) => {
        const btn = e.currentTarget;
        setLoading(btn, true, 'A guardar...');
        const hours = {};
        document.querySelectorAll('.hours-row').forEach(row => {
          const k = row.dataset.day;
          const closed = row.querySelector('[data-dayclosed]').getAttribute('aria-checked') !== 'true';
          hours[k] = { open: row.querySelector('[data-open]').value, close: row.querySelector('[data-close]').value, closed };
        });
        const payload = {
          espaco_slug: slug,
          restaurant_name: document.getElementById('set-name').value.trim() || null,
          enabled: document.getElementById('set-enabled').getAttribute('aria-checked') === 'true',
          total_capacity: parseInt(document.getElementById('set-capacity').value) || 40,
          max_party_size: parseInt(document.getElementById('set-maxparty').value) || 12,
          slot_duration_minutes: parseInt(document.getElementById('set-duration').value),
          advance_days: parseInt(document.getElementById('set-advance').value),
          min_notice_hours: parseInt(document.getElementById('set-notice').value),
          auto_confirm: document.getElementById('set-autoconfirm').getAttribute('aria-checked') === 'true',
          whatsapp_notify: document.getElementById('set-whatsapp').value.trim() || null,
          confirmation_message: document.getElementById('set-message').value.trim(),
          opening_hours: hours,
          blocked_dates: blockedDates,
        };
        try {
          const { data } = await db.from('reservation_settings').upsert(payload, { onConflict: 'espaco_slug' }).select('*').single();
          settings = data || { ...settings, ...payload };
          showToast('Configurações guardadas.', 'success');
        } catch (err) { showToast('Erro ao guardar.', 'error'); }
        setLoading(btn, false);
      };
    }

    function renderBlocked(dates) {
      if (!dates.length) return '<p class="text-muted text-sm">Sem datas bloqueadas.</p>';
      return dates.map(d => `<span class="badge badge--muted" style="margin:0 6px 6px 0">${d} <button data-rmdate="${d}" style="background:none;border:none;color:inherit;cursor:pointer;margin-left:4px">×</button></span>`).join('');
    }

    function bindToggle(id) {
      const t = document.getElementById(id);
      if (t) t.onclick = () => t.setAttribute('aria-checked', String(t.getAttribute('aria-checked') !== 'true'));
    }

    // initial render + realtime
    renderReservas();
    const ch = db.channel('reservas_' + slug)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reservations', filter: `espaco_slug=eq.${slug}` },
        ({ new: r }) => {
          showToast(`Nova reserva — ${r.guest_name}`, 'info');
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination); osc.frequency.value = 660;
            g.gain.setValueAtTime(0.12, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
          } catch (_) {}
          if (activeTab === 'reservas' && r.reservation_date === ymd(viewDate)) loadReservations();
        })
      .subscribe();
    trackChannel(ch);
  })();
  </script>
</body>
</html>
