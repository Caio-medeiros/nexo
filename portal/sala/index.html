<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sala em Directo — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>
  <button class="btn btn-secondary btn-sm kiosk-exit" id="kiosk-exit">Sair do ecrã completo ✕</button>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header">
        <div class="nexo-skeleton" style="width:240px;height:28px"></div>
      </div>
      <div class="nexo-skeleton card" style="height:400px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/sala/', client);

    const slug = getMenuSlug(client);
    if (!slug) { renderFatalError('Sem menu configurado para mostrar a sala em directo.'); return; }
    initNotifications(slug);

    const startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0);
    const todayISO = startOfDay.toISOString();

    const CH_LABEL = { whatsapp: 'WhatsApp', staff: 'Staff', shared: 'Grupo' };
    const NOTIF_ICONS = { order_new: '🍽️', staff_call: '🙋', waitlist_new: '⏳',
      review_positive: '⭐', review_negative: '💬', update_done: '✅', menu_viewed: '👁️', menu_change: '✏️' };

    let orders = [], calls = [], waitlist = [], activity = [];
    let stats = { orders: 0, revenue: 0, reviews: 0, calls: 0, views: 0 };

    try {
      const [o, c, w, a, rv, vw] = await Promise.all([
        db.from('orders_log').select('*').eq('espaco_slug', slug)
          .gte('created_at', todayISO).order('created_at', { ascending: false }),
        db.from('staff_calls').select('*').eq('espaco_slug', slug)
          .is('resolved_at', null).order('created_at', { ascending: false }),
        db.from('waitlist_entries').select('*').eq('espaco_slug', slug)
          .in('status', ['waiting', 'notified']).order('created_at', { ascending: true }),
        db.from('portal_notifications').select('*').eq('espaco_slug', slug)
          .order('created_at', { ascending: false }).limit(20),
        db.from('menu_events').select('id', { count: 'exact', head: true }).eq('espaco_slug', slug)
          .eq('event_name', 'review_google_clicked').gte('created_at', todayISO),
        db.from('menu_events').select('id', { count: 'exact', head: true }).eq('espaco_slug', slug)
          .eq('event_name', 'menu_opened').gte('created_at', todayISO),
      ]);
      orders = o.data || []; calls = c.data || []; waitlist = w.data || []; activity = a.data || [];
      stats.orders = orders.length;
      stats.revenue = orders.reduce((s, x) => s + (Number(x.total) || 0), 0);
      stats.calls = calls.length;
      stats.reviews = rv.count || 0;
      stats.views = vw.count || 0;
    } catch (err) { console.error(err); }

    // ── render shell ─────────────────────────────────
    document.getElementById('page-content').innerHTML = `
      <div class="page-header flex-between">
        <div>
          <h1 class="page-title">Sala em Directo</h1>
          <div class="live-indicator" id="live-indicator" style="margin-top:6px">
            <span class="live-dot"></span><span class="live-text">Em directo</span>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" id="kiosk-toggle">${getIcon('expand')} Ecrã Completo</button>
      </div>

      <div class="sala-tabs filter-tabs" id="sala-tabs">
        <button class="filter-tab active" data-tab="pedidos">Pedidos</button>
        <button class="filter-tab" data-tab="chamadas">Chamadas</button>
        <button class="filter-tab" data-tab="actividade">Actividade</button>
      </div>

      <div class="sala-grid">
        <div class="sala-col" data-col="pedidos">
          <div class="sala-col-title">Pedidos <span class="count-badge" id="orders-count">${orders.length}</span></div>
          <div id="orders-list"></div>
        </div>
        <div class="sala-col" data-col="chamadas" hidden>
          <div>
            <div class="sala-col-title">Chamadas <span class="count-badge" id="calls-count">${calls.length}</span></div>
            <div id="calls-list"></div>
          </div>
          <div style="margin-top:18px">
            <div class="sala-col-title">Fila de Espera <span class="count-badge" id="wait-count">${waitlist.length}</span></div>
            <div id="waitlist-list"></div>
          </div>
        </div>
        <div class="sala-col" data-col="actividade" hidden>
          <div class="sala-col-title">Actividade</div>
          <div class="card"><div class="activity-feed" id="activity-feed"></div></div>
        </div>
      </div>

      <div class="sala-stats-bar" id="stats-bar"></div>`;

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    // ── renderers ────────────────────────────────────
    function orderCard(o) {
      const items = Array.isArray(o.items) ? o.items : [];
      const isNew = o.status === 'new';
      return `<div class="order-card ${isNew ? 'is-new' : ''} ${o.status === 'seen' ? 'is-seen' : ''}" data-id="${o.id}">
        <div class="order-head">
          <span class="order-table">${escapeHtml(o.table_label || 'Mesa não especificada')}</span>
          <span class="badge badge--muted">${CH_LABEL[o.channel] || o.channel}</span>
          ${isNew ? '<span class="badge badge--new">NOVO</span>' : ''}
          <span class="call-time" style="margin-left:auto">${timeAgo(o.created_at)}</span>
        </div>
        <ul class="order-items">
          ${items.length ? items.map(it => `<li>• ${escapeHtml(String(it.qty || it.quantity || 1))}× ${escapeHtml(it.name || it.item_name || 'Item')}${it.note ? `<div class="order-note">↳ ${escapeHtml(it.note)}</div>` : ''}</li>`).join('') : '<li class="text-muted">Sem detalhe de itens</li>'}
        </ul>
        <div class="order-foot">
          <span class="order-total">${formatEUR(o.total)}</span>
          ${o.status === 'new'
            ? `<button class="btn btn-secondary btn-sm" data-seen="${o.id}">Visto ✓</button>`
            : '<span class="text-success text-xs">Visto ✓</span>'}
        </div>
      </div>`;
    }
    function callCard(c) {
      return `<div class="call-card" data-id="${c.id}">
        <div><span class="call-table">🙋 ${escapeHtml(c.table_label || 'Mesa')}</span>
          <span class="call-time">${timeAgo(c.created_at)}</span></div>
        <button class="btn btn-success btn-sm" data-resolve="${c.id}">Atendido ✓</button>
      </div>`;
    }
    function waitCard(w) {
      const notified = w.status === 'notified';
      return `<div class="call-card" data-id="${w.id}">
        <div><span class="call-table" style="font-size:15px">${escapeHtml(w.name)}</span>
          <span class="call-time">${w.party_size}p · ${timeAgo(w.created_at)}</span>
          ${notified ? '<div class="text-warning text-xs" style="margin-top:4px">A sua mesa está pronta!</div>' : ''}</div>
        <div class="flex gap-2">
          ${notified ? '' : `<button class="btn btn-secondary btn-sm" data-notify="${w.id}">Avisar</button>`}
          <button class="btn btn-success btn-sm" data-seat="${w.id}">Sentar</button>
        </div>
      </div>`;
    }
    function activityRow(n) {
      return `<div class="activity-row">
        <span class="activity-icon">${NOTIF_ICONS[n.type] ?? '🔔'}</span>
        <div class="activity-content">
          <div class="activity-title">${escapeHtml(n.title)}</div>
          ${n.body ? `<div class="activity-desc">${escapeHtml(n.body)}</div>` : ''}
        </div>
        <span class="activity-time">${timeAgo(n.created_at)}</span>
      </div>`;
    }

    function paintOrders() {
      const el = document.getElementById('orders-list');
      const shown = orders.slice(0, 10);
      el.innerHTML = shown.length
        ? shown.map(orderCard).join('') + (orders.length > 10
            ? `<div class="text-muted text-sm" style="padding:8px 0">${orders.length - 10} pedidos mais antigos</div>` : '')
        : `<div class="empty-state">${getIcon('grid', 32)}<p class="empty-title">Nenhum pedido ainda hoje.</p></div>`;
      document.getElementById('orders-count').textContent = orders.length;
    }
    function paintCalls() {
      const el = document.getElementById('calls-list');
      el.innerHTML = calls.length ? calls.map(callCard).join('')
        : `<div class="empty-state"><p class="empty-title text-success">✓ Nenhuma chamada activa</p></div>`;
      document.getElementById('calls-count').textContent = calls.length;
    }
    function paintWaitlist() {
      const el = document.getElementById('waitlist-list');
      el.innerHTML = waitlist.length ? waitlist.map(waitCard).join('')
        : `<div class="empty-state"><p class="empty-title text-muted">Fila vazia</p></div>`;
      document.getElementById('wait-count').textContent = waitlist.length;
    }
    function paintActivity() {
      const el = document.getElementById('activity-feed');
      el.innerHTML = activity.length ? activity.slice(0, 20).map(activityRow).join('')
        : `<div class="empty-state">${getIcon('activity', 32)}<p class="empty-title">Sem actividade</p></div>`;
    }
    function paintStats() {
      document.getElementById('stats-bar').innerHTML =
        `<span><strong>${stats.orders}</strong> pedidos</span>
         <span><strong>${formatEUR(stats.revenue)}</strong> faturado</span>
         <span><strong>${stats.reviews}</strong> reviews</span>
         <span><strong>${stats.calls}</strong> chamadas</span>
         <span><strong>${stats.views}</strong> visitas</span>`;
    }

    paintOrders(); paintCalls(); paintWaitlist(); paintActivity(); paintStats();

    // ── actions (event delegation) ───────────────────
    document.getElementById('page-content').addEventListener('click', async (e) => {
      const seen = e.target.closest('[data-seen]');
      const resolve = e.target.closest('[data-resolve]');
      const notify = e.target.closest('[data-notify]');
      const seat = e.target.closest('[data-seat]');

      if (seen) {
        const id = seen.dataset.seen;
        seen.disabled = true;
        const o = orders.find(x => x.id === id); if (o) o.status = 'seen';
        paintOrders();
        try { await db.from('orders_log').update({ status: 'seen' }).eq('id', id); } catch (_) {}
      }
      if (resolve) {
        const id = resolve.dataset.resolve;
        const card = resolve.closest('.call-card');
        card?.classList.add('resolving');
        calls = calls.filter(x => x.id !== id);
        setTimeout(paintCalls, 300);
        try { await db.from('staff_calls').update({ resolved_at: new Date().toISOString() }).eq('id', id); } catch (_) {}
      }
      if (notify) {
        const id = notify.dataset.notify;
        const w = waitlist.find(x => x.id === id); if (w) w.status = 'notified';
        paintWaitlist();
        try { await db.from('waitlist_entries').update({ status: 'notified', notified_at: new Date().toISOString() }).eq('id', id); } catch (_) {}
      }
      if (seat) {
        const id = seat.dataset.seat;
        waitlist = waitlist.filter(x => x.id !== id);
        paintWaitlist();
        try { await db.from('waitlist_entries').update({ status: 'seated', seated_at: new Date().toISOString() }).eq('id', id); } catch (_) {}
      }
    });

    // ── mobile tabs ──────────────────────────────────
    document.getElementById('sala-tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-tab]'); if (!btn) return;
      document.querySelectorAll('#sala-tabs .filter-tab').forEach(b => b.classList.toggle('active', b === btn));
      const tab = btn.dataset.tab;
      document.querySelectorAll('.sala-col').forEach(col => {
        col.hidden = window.innerWidth <= 1024 && col.dataset.col !== tab;
      });
    });
    // reset hidden state on resize to desktop
    window.addEventListener('resize', () => {
      if (window.innerWidth > 1024) document.querySelectorAll('.sala-col').forEach(c => c.hidden = false);
    });

    // ── kiosk mode ───────────────────────────────────
    const kioskToggle = document.getElementById('kiosk-toggle');
    const kioskExit = document.getElementById('kiosk-exit');
    function enterKiosk() {
      document.body.classList.add('kiosk-mode');
      if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
    }
    function exitKiosk() {
      document.body.classList.remove('kiosk-mode');
      if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
    }
    kioskToggle.addEventListener('click', enterKiosk);
    kioskExit.addEventListener('click', exitKiosk);
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) document.body.classList.remove('kiosk-mode');
    });

    // ── sound ────────────────────────────────────────
    function beep(freq, ms) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        g.gain.setValueAtTime(0.15, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + ms / 1000);
        osc.start(); osc.stop(ctx.currentTime + ms / 1000);
      } catch (_) {}
    }

    // ── realtime ─────────────────────────────────────
    const ch = db.channel('sala_' + slug);
    ch.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders_log', filter: `espaco_slug=eq.${slug}` },
      ({ new: o }) => { orders.unshift(o); stats.orders++; stats.revenue += Number(o.total) || 0; paintOrders(); paintStats(); });
    ch.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'staff_calls', filter: `espaco_slug=eq.${slug}` },
      ({ new: c }) => {
        calls.unshift(c); stats.calls++; paintCalls(); paintStats();
        beep(880, 300); if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        const card = document.querySelector(`.call-card[data-id="${c.id}"]`);
        card?.classList.add('new-call');
      });
    ch.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'waitlist_entries', filter: `espaco_slug=eq.${slug}` },
      ({ new: w }) => { if (['waiting', 'notified'].includes(w.status)) { waitlist.push(w); paintWaitlist(); } });
    ch.on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'waitlist_entries', filter: `espaco_slug=eq.${slug}` },
      ({ new: w }) => {
        waitlist = waitlist.filter(x => x.id !== w.id);
        if (['waiting', 'notified'].includes(w.status)) waitlist.push(w);
        paintWaitlist();
      });
    ch.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'portal_notifications', filter: `espaco_slug=eq.${slug}` },
      ({ new: n }) => { activity.unshift(n); if (activity.length > 20) activity.pop(); paintActivity(); });
    ch.subscribe((status) => setLiveState(status === 'SUBSCRIBED' ? 'connected' : 'reconnecting'));
    trackChannel(ch);
  })();
  </script>
</body>
</html>
