<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="manifest" href="/portal/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEXO">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="apple-touch-icon" href="/portal/icons/icon-192.png">
  <meta name="robots" content="noindex, nofollow">
  <title>Salão — NEXO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
  <link rel="stylesheet" href="sala.css">
</head>
<body class="sala-body">

  <!-- STAGE: ocupa 100vh — o plano de mesas cabe sempre no 1.º ecrã -->
  <div class="sala-stage">

  <!-- HEADER -->
  <header class="sala-header">
    <div class="sala-header-left">
      <span class="nexo-mark">NEXO.</span>
      <span class="sala-divider">·</span>
      <span class="sala-title">Salão</span>
      <span class="sala-divider">·</span>
      <span class="sala-venue" id="sala-venue-name">—</span>
    </div>
    <div class="sala-header-right">
      <div class="live-indicator" id="live-indicator">
        <span class="live-dot"></span>
        <span class="live-text">Em directo</span>
      </div>
      <button class="sala-action-btn" onclick="toggleFullscreen()" title="Ecrã completo" aria-label="Ecrã completo">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2H14v4.5M6.5 14H2V9.5M14 2L9.5 6.5M2 14l4.5-4.5"/></svg>
      </button>
      <a href="/portal/dashboard/" class="sala-action-btn" title="Dashboard" aria-label="Dashboard">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l6-5 6 5M3.5 6v7.5h9V6"/></svg>
      </a>
    </div>
  </header>

  <!-- TOP STATS BAR -->
  <div class="sala-stats-bar" id="sala-stats-bar">
    <div class="stat-chip"><span class="stat-value" id="stat-open">0</span><span class="stat-label">mesas activas</span></div>
    <div class="stat-chip"><span class="stat-value" id="stat-orders">0</span><span class="stat-label">pedidos hoje</span></div>
    <div class="stat-chip"><span class="stat-value" id="stat-calls">0</span><span class="stat-label">chamadas</span></div>

    <div class="sala-filters">
      <button class="filter-pill active" data-filter="all" onclick="setFilter('all')">Todas</button>
      <button class="filter-pill" data-filter="active" onclick="setFilter('active')">Activas</button>
      <button class="filter-pill" data-filter="calling" onclick="setFilter('calling')">🙋 A chamar</button>
      <button class="filter-pill" data-filter="ready" onclick="setFilter('ready')">✅ Prontas</button>
    </div>

    <div class="sala-mesas-ctl">
      <span class="mesas-ctl-label">Mesas</span>
      <button class="mesas-btn" onclick="removeTable()" aria-label="Remover mesa">−</button>
      <span class="mesas-total" id="mesas-total">0</span>
      <button class="mesas-btn" onclick="addTable()" aria-label="Adicionar mesa">+</button>
    </div>
    <div class="sala-legend" aria-hidden="true">
      <span class="lg lg-open"><i></i>Aberta</span>
      <span class="lg lg-active"><i></i>Ocupada</span>
      <span class="lg lg-new"><i></i>Novo pedido</span>
      <span class="lg lg-ready"><i></i>Pronto</span>
      <span class="lg lg-call"><i></i>A chamar</span>
    </div>
    <div class="sala-mode-links">
      <a href="/portal/cozinha/" class="mode-link cozinha">👨‍🍳 Cozinha</a>
    </div>
  </div>

  <!-- FLOOR PLAN -->
  <main class="floor-plan" id="floor-plan">
    <div class="table-grid" id="table-grid"></div>
  </main>
  </div><!-- /sala-stage -->

  <!-- TABLE DETAIL -->
  <div class="table-detail-overlay" id="table-detail-overlay" onclick="closeTableDetail(event)"></div>
  <div class="table-detail-panel" id="table-detail-panel">
    <div class="tdp-header">
      <div>
        <h2 class="tdp-table-name" id="tdp-title">Mesa —</h2>
        <span class="tdp-code" id="tdp-code"></span>
      </div>
      <div class="tdp-header-actions">
        <button class="tdp-action-btn kitchen" onclick="sendToKitchenFromPanel()">👨‍🍳 Cozinha</button>
        <button class="tdp-action-btn split" onclick="splitTableFromPanel()">✂️ Dividir</button>
        <button class="tdp-action-btn pay" onclick="processPaymentFromPanel()">💰 Cobrar</button>
        <button class="tdp-close" onclick="closeTableDetail()" aria-label="Fechar">✕</button>
      </div>
    </div>
    <div class="tdp-body" id="tdp-body"></div>
  </div>

  <!-- ACTIVITY FEED -->
  <div class="activity-feed-bar" id="activity-feed-bar">
    <button class="feed-toggle" onclick="toggleActivityFeed()" id="feed-toggle">
      <span id="feed-toggle-label">↑ Actividade recente</span>
      <span class="feed-count-badge" id="feed-count-badge" style="display:none">0</span>
    </button>
    <div class="feed-content" id="feed-content">
      <div class="feed-items" id="feed-items">
        <div class="feed-empty">Sem actividade recente.</div>
      </div>
    </div>
  </div>

  <script src="/portal/_assets/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script src="sala.js"></script>
  <script>
  (async function bootstrap() {
    const client = await getClientData();
    if (!client) return; // getClientData redirects to login / shows lock
    const slug = getMenuSlug(client);
    if (!slug) {
      document.getElementById('table-grid').innerHTML =
        '<p style="grid-column:1/-1;color:var(--text-muted);padding:24px">Sem menu configurado para o Salão.</p>';
      return;
    }
    window.ESPACO_SLUG = slug;
    window.ESPACO_NAME = client.name || slug;
    initSala();
  })();
  </script>
</body>
</html>
