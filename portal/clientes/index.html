<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Clientes — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
  <style>
    .mono { font-family: 'Azeret Mono', ui-monospace, monospace; }
    /* 5-metric horizontal scroll row */
    .gp-stats { display: flex; gap: 12px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .gp-stats::-webkit-scrollbar { display: none; }
    .gp-metric { flex: 1 0 150px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
    .gp-metric-top { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .gp-metric-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .gp-metric-value { font-family: 'Azeret Mono', monospace; font-size: 24px; font-weight: 700; color: var(--text-primary); margin-top: 6px; }
    .gp-metric-trend { font-size: 12px; margin-top: 2px; }
    /* Segment pills */
    .gp-segments { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
    .gp-segments::-webkit-scrollbar { display: none; }
    .gp-seg { white-space: nowrap; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 100px; padding: 7px 14px; cursor: pointer; min-height: 40px; transition: all 150ms ease; }
    .gp-seg:hover { color: var(--text-primary); }
    .gp-seg.active { background: rgba(255,255,255,0.1); color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .gp-seg-count { font-family: 'Azeret Mono', monospace; font-size: 11px; opacity: 0.7; margin-left: 4px; }
    /* Bulk action bar */
    .bulk-action-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; background: var(--bg-elevated); border: 1px solid var(--border-md); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; }
    .bulk-count { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .bulk-whatsapp-btn { background: var(--whatsapp, #25D366); color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 700; cursor: pointer; min-height: 44px; }
    /* Risk dot on avatar */
    .gp-avatar-wrap { position: relative; }
    .gp-risk-dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; border-radius: 50%; background: var(--warning); border: 2px solid var(--bg-surface); }
    .gp-stats-old { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 22px; }
    @media (max-width: 600px) { .gp-stats-old { grid-template-columns: 1fr; } }
    .gp-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .gp-search { flex: 1; min-width: 200px; }
    .gp-avatar { width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: var(--bg-elevated); border: 1px solid var(--border-md);
      display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--text-secondary); }
    .gp-row td { vertical-align: middle; }
    .gp-name-cell { display: flex; align-items: center; gap: 11px; }
    .gp-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
      background: color-mix(in srgb, var(--info) 12%, transparent); color: var(--info);
      border: 1px solid color-mix(in srgb, var(--info) 24%, transparent); border-radius: 999px; padding: 2px 9px; }
    .gp-tag.vip { background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning);
      border-color: color-mix(in srgb, var(--warning) 24%, transparent); }
    .gp-tag-rm { cursor: pointer; opacity: .6; } .gp-tag-rm:hover { opacity: 1; }
    /* slide-over */
    .so-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.55);
      opacity: 0; visibility: hidden; transition: opacity 220ms ease, visibility 220ms; }
    .so-overlay.visible { opacity: 1; visibility: visible; }
    .so-panel { position: fixed; top: 0; right: 0; bottom: 0; z-index: 101; width: 480px; max-width: 100vw;
      background: var(--bg-surface); border-left: 1px solid var(--border-md);
      transform: translateX(100%); transition: transform 300ms var(--ease, cubic-bezier(.22,1,.36,1));
      display: flex; flex-direction: column; overflow-y: auto; box-shadow: var(--shadow-lg); }
    .so-panel.visible { transform: translateX(0); }
    @media (max-width: 560px) { .so-panel { width: 100vw; border-left: none; } }
    .so-head { display: flex; align-items: center; gap: 12px; padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-surface); z-index: 2; }
    .so-body { padding: 20px; display: flex; flex-direction: column; gap: 22px; }
    .so-section-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .so-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .so-stat { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
    .so-stat .v { font-size: 18px; font-weight: 700; } .so-stat .k { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .tag-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag-chip { cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text-secondary);
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; transition: border-color 150ms ease, color 150ms ease; }
    .tag-chip:hover { color: var(--text-primary); border-color: var(--border-strong); }
    .saved-flag { font-size: 11px; color: var(--success); opacity: 0; transition: opacity 200ms ease; }
    .saved-flag.show { opacity: 1; }
  </style>
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header"><div class="nexo-skeleton" style="width:200px;height:28px"></div></div>
      <div class="gp-stats">
        <div class="card nexo-skeleton" style="height:78px"></div>
        <div class="card nexo-skeleton" style="height:78px"></div>
        <div class="card nexo-skeleton" style="height:78px"></div>
      </div>
      <div class="card nexo-skeleton" style="height:300px"></div>
    </div>
    <div id="page-content" style="display:none"></div>
  </main>

  <!-- slide-over -->
  <div class="so-overlay" id="so-overlay"></div>
  <aside class="so-panel" id="so-panel" aria-hidden="true"></aside>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/clientes/', client);
    const slug = getMenuSlug(client);
    if (slug) initNotifications(slug);

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    const LANG_FLAG = { pt: '🇵🇹', en: '🇬🇧', es: '🇪🇸', fr: '🇫🇷', de: '🇩🇪', it: '🇮🇹' };
    const TAG_SUGGEST = ['VIP', 'Turista', 'Aniversário', 'Alergia', 'Vegano', 'Familiar', 'Corporativo'];
    function initials(name) { return (name || '?').trim().slice(0, 2).toUpperCase() || '?'; }
    function normalizePhone(raw) {
      const d = (raw || '').replace(/\D/g, '');
      if (!d) return '';
      if (d.length === 9 && d[0] === '9') return '351' + d;
      return d;
    }

    let guests = [];
    let search = '';
    let segment = 'all';
    let current = null; // guest aberto na slide-over

    const content = document.getElementById('page-content');
    const DAY = 86400000;
    function daysSince(d) { return d ? Math.floor((Date.now() - new Date(d).getTime()) / DAY) : null; }
    function isNew(g) { const d = daysSince(g.first_visit); return d != null && d <= 30; }
    function isInactive(g) { const d = daysSince(g.last_visit); return d != null && d > 30; }
    function isRisk(g) { return isInactive(g) && (g.visit_count || 1) > 2; }

    // Segment predicates — single source of truth for pills + filter.
    const SEGMENTS = [
      { id: 'all',       label: 'Todos',        fn: () => true },
      { id: 'vip',       label: 'VIP ⭐',        fn: g => !!g.is_vip },
      { id: 'recurring', label: 'Recorrentes',  fn: g => (g.visit_count || 1) > 1 },
      { id: 'new',       label: 'Novos',        fn: isNew },
      { id: 'inactive',  label: 'Inativos 30d+', fn: isInactive },
      { id: 'tourist',   label: 'Turistas',     fn: g => g.language && g.language !== 'pt' },
    ];
    function segFn(id) { return (SEGMENTS.find(s => s.id === id) || SEGMENTS[0]).fn; }

    function filtered() {
      const q = search.trim().toLowerCase();
      const sf = segFn(segment);
      return guests.filter(g => {
        if (!sf(g)) return false;
        if (!q) return true;
        return (g.name || '').toLowerCase().includes(q) || (g.phone || '').includes(q.replace(/\D/g, ''));
      });
    }

    function renderShell() {
      content.innerHTML = `
        <div class="page-header flex-between" style="align-items:flex-start;flex-wrap:wrap;gap:12px">
          <div>
            <h1 class="page-title">Clientes</h1>
            <p class="page-sub">Perfis criados a partir da fila de espera e adicionados por si.</p>
          </div>
          <button class="btn btn-primary" id="add-guest-btn">+ Adicionar cliente</button>
        </div>

        <div class="gp-stats" id="gp-stats"></div>

        <div class="gp-segments" id="gp-segments"></div>

        <div class="bulk-action-bar" id="bulk-action-bar" style="display:none">
          <span class="bulk-count" id="bulk-count"></span>
          <button class="bulk-whatsapp-btn" id="bulk-whatsapp-btn">💬 Enviar mensagem ao segmento</button>
        </div>

        <div class="gp-toolbar">
          <input class="input gp-search" id="gp-search" placeholder="Nome ou telemóvel..." value="${escapeHtml(search)}">
          <button class="btn btn-secondary" id="import-fila">Importar da fila</button>
        </div>

        <div class="card" style="padding:0;overflow:hidden">
          <div id="gp-list"></div>
        </div>`;

      document.getElementById('add-guest-btn').addEventListener('click', openAddForm);
      document.getElementById('import-fila').addEventListener('click', importFromWaitlist);
      document.getElementById('bulk-whatsapp-btn').addEventListener('click', openBulkWhatsApp);
      const s = document.getElementById('gp-search');
      s.addEventListener('input', () => { search = s.value; renderList(); });
      renderStats(); renderSegments(); renderList();
    }

    function renderSegments() {
      const wrap = document.getElementById('gp-segments');
      wrap.innerHTML = SEGMENTS.map(seg => {
        const n = guests.filter(seg.fn).length;
        return `<button class="gp-seg ${segment === seg.id ? 'active' : ''}" data-seg="${seg.id}">
          ${seg.label}<span class="gp-seg-count">${n}</span></button>`;
      }).join('');
      wrap.querySelectorAll('.gp-seg').forEach(b => b.addEventListener('click', () => {
        segment = b.dataset.seg; renderSegments(); renderList();
      }));
    }

    function renderStats() {
      const total = guests.length;
      const recurring = guests.filter(g => (g.visit_count || 1) > 1).length;
      const novos = guests.filter(isNew).length;
      const vips = guests.filter(g => g.is_vip).length;
      const avg = total ? (guests.reduce((s, g) => s + (g.visit_count || 1), 0) / total) : 0;
      const metric = (icon, label, value, trend) => `
        <div class="gp-metric">
          <div class="gp-metric-top">${getIcon(icon, 14)}<span class="gp-metric-label">${label}</span></div>
          <div class="gp-metric-value">${value}</div>
          ${trend ? `<div class="gp-metric-trend">${trend}</div>` : ''}
        </div>`;
      document.getElementById('gp-stats').innerHTML =
        metric('users', 'Total clientes', total) +
        metric('refresh', 'Recorrentes', recurring, `<span class="text-success">${total ? Math.round(recurring / total * 100) : 0}% do total</span>`) +
        metric('plus', 'Novos este mês', novos) +
        metric('star', 'VIPs', vips) +
        metric('activity', 'Média visitas', avg.toFixed(1));
    }

    function updateBulkBar(rows) {
      const bar = document.getElementById('bulk-action-bar');
      if (!bar) return;
      const withPhone = rows.filter(g => (g.phone || '').replace(/\D/g, '').length >= 9);
      if (segment === 'all' || withPhone.length === 0) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';
      document.getElementById('bulk-count').textContent =
        `${withPhone.length} cliente${withPhone.length === 1 ? '' : 's'} com telemóvel neste segmento`;
    }

    function renderList() {
      const list = document.getElementById('gp-list');
      const rows = filtered();
      updateBulkBar(rows);
      if (guests.length === 0) {
        list.innerHTML = `
          <div class="empty-state" style="padding:44px 20px">
            ${getIcon('users', 32)}
            <p class="empty-title">Ainda sem perfis de clientes</p>
            <p class="empty-sub">Os perfis são criados a partir da fila de espera, ou adicione-os manualmente.</p>
            <button class="btn btn-primary btn-sm" id="empty-add">+ Adicionar cliente</button>
          </div>`;
        document.getElementById('empty-add')?.addEventListener('click', openAddForm);
        return;
      }
      if (rows.length === 0) {
        list.innerHTML = `<div class="empty-state" style="padding:36px"><p class="empty-title">Sem resultados para "${escapeHtml(search)}"</p></div>`;
        return;
      }
      list.innerHTML = `
        <div class="table-wrap"><table class="table">
          <thead><tr>
            <th>Nome</th><th>Visitas</th><th>Última visita</th><th>Língua</th><th>Tags</th><th>Notas</th>
          </tr></thead>
          <tbody>
            ${rows.map(g => {
              const vc = g.visit_count || 1;
              const visitsBadge = vc > 1
                ? `<span class="badge badge--success">${vc} visitas</span>`
                : `<span class="text-muted text-sm">1 visita</span>`;
              const tags = (g.tags || []);
              const tagsHtml = (g.is_vip ? `<span class="gp-tag vip">⭐ VIP</span>` : '')
                + tags.slice(0, g.is_vip ? 1 : 2).map(t => `<span class="gp-tag">${escapeHtml(t)}</span>`).join(' ')
                + (tags.length > (g.is_vip ? 1 : 2) ? `<span class="text-muted text-xs">+${tags.length - (g.is_vip ? 1 : 2)}</span>` : '')
                || '<span class="text-muted">—</span>';
              return `<tr class="gp-row" data-id="${g.id}" style="cursor:pointer">
                <td><div class="gp-name-cell">
                  <span class="gp-avatar-wrap"><span class="gp-avatar">${escapeHtml(initials(g.name))}</span>${isRisk(g) ? `<span class="gp-risk-dot" title="Sem visita há ${daysSince(g.last_visit)} dias"></span>` : ''}</span>
                  <div><div style="font-weight:600">${g.name ? escapeHtml(g.name) : '<span class="text-muted" style="font-style:italic">Sem nome</span>'}</div>
                    <div class="text-muted text-xs">${escapeHtml(g.phone || '')}</div></div>
                </div></td>
                <td>${visitsBadge}</td>
                <td>${g.last_visit ? timeAgo(g.last_visit) : '—'}<div class="text-muted text-xs">desde ${g.first_visit ? formatDate(g.first_visit) : '—'}</div></td>
                <td>${LANG_FLAG[g.language] || '🌐'}</td>
                <td>${tagsHtml}</td>
                <td>${g.notes ? getIcon('edit', 14) : '<span class="text-muted">—</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>`;
      list.querySelectorAll('.gp-row').forEach(r =>
        r.addEventListener('click', () => openDetail(r.dataset.id)));
    }

    function formatDate(d) { try { return new Date(d).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' }); } catch (_) { return '—'; } }

    // ── slide-over ──────────────────────────────────
    const soOverlay = document.getElementById('so-overlay');
    const soPanel = document.getElementById('so-panel');
    function closeSO() { soOverlay.classList.remove('visible'); soPanel.classList.remove('visible'); soPanel.setAttribute('aria-hidden', 'true'); current = null; }
    soOverlay.addEventListener('click', closeSO);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSO(); });
    function openSO() { soOverlay.classList.add('visible'); soPanel.classList.add('visible'); soPanel.setAttribute('aria-hidden', 'false'); }

    async function openDetail(id) {
      current = guests.find(g => g.id === id);
      if (!current) return;
      renderDetail();
      openSO();
      loadVisitHistory(current.phone);
    }

    function renderDetail() {
      const g = current;
      soPanel.innerHTML = `
        <div class="so-head">
          <span class="gp-avatar" style="width:48px;height:48px;font-size:16px">${escapeHtml(initials(g.name))}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:18px;font-weight:700">${g.name ? escapeHtml(g.name) : 'Sem nome'}</div>
            <div class="text-muted text-sm">${escapeHtml(g.phone || '')}</div>
          </div>
          <button class="btn btn-sm ${g.is_vip ? 'btn-warning' : 'btn-secondary'}" id="vip-toggle">${g.is_vip ? '⭐ VIP' : 'Marcar VIP'}</button>
          <button class="portal-icon-btn" id="so-close" aria-label="Fechar">${getIcon('x', 16)}</button>
        </div>
        <div class="so-body">
          <div class="so-stats">
            <div class="so-stat"><div class="v mono">${g.visit_count || 1}</div><div class="k">visitas</div></div>
            <div class="so-stat"><div class="v" style="font-size:13px">${g.last_visit ? formatDate(g.last_visit) : '—'}</div><div class="k">última</div></div>
            <div class="so-stat"><div class="v" style="font-size:13px">${g.first_visit ? formatDate(g.first_visit) : '—'}</div><div class="k">1ª visita</div></div>
          </div>

          ${isRisk(g) ? `<div class="sla-notice" style="border-color:var(--warning);background:color-mix(in srgb,var(--warning) 10%,transparent)">⚠️ Cliente recorrente sem visita há ${daysSince(g.last_visit)} dias — boa altura para reativar.</div>` : ''}

          <div>
            <div class="so-section-label">Análise de consumo</div>
            <div class="so-stats">
              <div class="so-stat"><div class="v mono" style="font-size:15px">${formatEUR(g.total_spent || 0)}</div><div class="k">total gasto</div></div>
              <div class="so-stat"><div class="v mono" style="font-size:15px">${formatEUR((g.total_spent || 0) / (g.visit_count || 1))}</div><div class="k">ticket médio</div></div>
              <div class="so-stat"><div class="v mono" style="font-size:15px">${visitsPerMonth(g)}</div><div class="k">visitas/mês</div></div>
            </div>
          </div>

          <div>
            <div class="flex-between"><span class="so-section-label">Notas internas</span><span class="saved-flag" id="notes-saved">Guardado ✓</span></div>
            <textarea class="textarea" id="g-notes" style="min-height:84px" placeholder="Alergia a frutos secos, prefere mesa junto à janela...">${escapeHtml(g.notes || '')}</textarea>
          </div>

          <div>
            <div class="so-section-label">Tags</div>
            <div id="g-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
            <input class="input" id="tag-input" placeholder="Escreva uma tag e Enter">
            <div class="tag-suggest">${TAG_SUGGEST.map(t => `<span class="tag-chip" data-tag="${t}">${t}</span>`).join('')}</div>
          </div>

          <div>
            <div class="so-section-label">Histórico (fila de espera)</div>
            <div id="g-history"><p class="text-muted text-sm">A carregar...</p></div>
          </div>

          <a class="btn btn-whatsapp btn-full" id="g-wa" href="https://wa.me/${(g.phone || '').replace(/\D/g, '')}" target="_blank" rel="noopener">
            Enviar WhatsApp →
          </a>
        </div>`;

      document.getElementById('so-close').addEventListener('click', closeSO);
      document.getElementById('vip-toggle').addEventListener('click', toggleVip);
      renderTags();

      // notes autosave (debounce 1s)
      const notesEl = document.getElementById('g-notes');
      let t = null;
      notesEl.addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(async () => {
          const val = notesEl.value;
          await updateGuest(g.id, { notes: val });
          g.notes = val;
          const flag = document.getElementById('notes-saved');
          flag.classList.add('show'); setTimeout(() => flag.classList.remove('show'), 1500);
        }, 1000);
      });

      const tagInput = document.getElementById('tag-input');
      tagInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addTag(tagInput.value); tagInput.value = ''; }
      });
      document.querySelectorAll('.tag-chip').forEach(c =>
        c.addEventListener('click', () => addTag(c.dataset.tag)));
    }

    function renderTags() {
      const wrap = document.getElementById('g-tags');
      const tags = current.tags || [];
      wrap.innerHTML = tags.length
        ? tags.map(t => `<span class="gp-tag">${escapeHtml(t)} <span class="gp-tag-rm" data-rm="${escapeHtml(t)}">${getIcon('x', 11)}</span></span>`).join('')
        : '<span class="text-muted text-sm">Sem tags</span>';
      wrap.querySelectorAll('[data-rm]').forEach(b =>
        b.addEventListener('click', () => removeTag(b.dataset.rm)));
    }

    async function addTag(raw) {
      const tag = (raw || '').trim();
      if (!tag) return;
      const tags = current.tags || [];
      if (tags.some(t => t.toLowerCase() === tag.toLowerCase())) return;
      const next = [...tags, tag];
      current.tags = next; renderTags();
      await updateGuest(current.id, { tags: next });
    }
    async function removeTag(tag) {
      const next = (current.tags || []).filter(t => t !== tag);
      current.tags = next; renderTags();
      await updateGuest(current.id, { tags: next });
    }
    async function toggleVip() {
      const next = !current.is_vip;
      current.is_vip = next;
      renderDetail();
      await updateGuest(current.id, { is_vip: next });
      renderList();
    }

    async function updateGuest(id, patch) {
      const { error } = await db.from('guest_profiles').update(patch).eq('id', id);
      if (error) { showToast('Erro ao guardar.', 'error'); return false; }
      const g = guests.find(x => x.id === id); if (g) Object.assign(g, patch);
      return true;
    }

    async function loadVisitHistory(phone) {
      const el = document.getElementById('g-history');
      if (!el) return;
      const digits = (phone || '').replace(/\D/g, '');
      try {
        const { data } = await db.from('waitlist_entries')
          .select('created_at, party_size, status, phone')
          .eq('espaco_slug', slug).order('created_at', { ascending: false }).limit(50);
        const mine = (data || []).filter(w => (w.phone || '').replace(/\D/g, '') === digits).slice(0, 5);
        const ST = { seated: ['badge--success', 'Sentou'], waiting: ['badge--warning', 'Esperou'], notified: ['badge--info', 'Chamado'], cancelled: ['badge--muted', 'Desistiu'], no_show: ['badge--muted', 'Não veio'] };
        el.innerHTML = mine.length
          ? mine.map(w => { const [cls, lb] = ST[w.status] || ['badge--muted', w.status]; return `<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${formatDate(w.created_at)} · ${w.party_size}p</span><span class="badge ${cls}">${lb}</span></div>`; }).join('')
          : '<p class="text-muted text-sm">Sem passagens pela fila ainda.</p>';
      } catch (_) { el.innerHTML = '<p class="text-muted text-sm">—</p>'; }
    }

    // ── adicionar / importar ────────────────────────
    function openAddForm() {
      soPanel.innerHTML = `
        <div class="so-head">
          <div style="flex:1"><div style="font-size:18px;font-weight:700">Adicionar cliente</div></div>
          <button class="portal-icon-btn" id="so-close" aria-label="Fechar">${getIcon('x', 16)}</button>
        </div>
        <div class="so-body">
          <div class="field"><label class="field-label">Telemóvel *</label>
            <input class="input" id="f-phone" type="tel" inputmode="tel" placeholder="912 345 678"></div>
          <div class="field"><label class="field-label">Nome</label><input class="input" id="f-name" maxlength="60"></div>
          <div class="field"><label class="field-label">Notas</label><textarea class="textarea" id="f-notes" style="min-height:70px"></textarea></div>
          <button class="btn btn-primary btn-full" id="f-save">Adicionar cliente</button>
        </div>`;
      document.getElementById('so-close').addEventListener('click', closeSO);
      document.getElementById('f-save').addEventListener('click', addGuest);
      openSO();
      setTimeout(() => document.getElementById('f-phone').focus(), 120);
    }

    async function addGuest() {
      const btn = document.getElementById('f-save');
      const phone = normalizePhone(document.getElementById('f-phone').value);
      const name = document.getElementById('f-name').value.trim();
      const notes = document.getElementById('f-notes').value.trim();
      if (!phone || phone.length < 9) { showToast('Indique um telemóvel válido.', 'error'); return; }
      setLoading(btn, true, 'A adicionar...');
      const { error } = await db.from('guest_profiles').upsert({
        espaco_slug: slug, phone, name: name || null, notes: notes || null,
      }, { onConflict: 'espaco_slug,phone' });
      setLoading(btn, false);
      if (error) { showToast('Erro ao adicionar.', 'error'); return; }
      showToast('Cliente adicionado.', 'success');
      closeSO();
      await loadGuests();
    }

    async function importFromWaitlist() {
      const btn = document.getElementById('import-fila');
      setLoading(btn, true, 'A importar...');
      try {
        const { data } = await db.from('waitlist_entries')
          .select('name, phone, created_at').eq('espaco_slug', slug).not('phone', 'is', null);
        const byPhone = {};
        (data || []).forEach(w => {
          const p = normalizePhone(w.phone); if (!p) return;
          if (!byPhone[p]) byPhone[p] = { espaco_slug: slug, phone: p, name: w.name || null, visit_count: 0, first_visit: w.created_at, last_visit: w.created_at };
          byPhone[p].visit_count++;
          if (w.created_at < byPhone[p].first_visit) byPhone[p].first_visit = w.created_at;
          if (w.created_at > byPhone[p].last_visit) byPhone[p].last_visit = w.created_at;
        });
        const rows = Object.values(byPhone).map(r => ({ ...r, first_visit: r.first_visit.slice(0, 10), last_visit: r.last_visit.slice(0, 10) }));
        if (rows.length === 0) { showToast('Sem telemóveis na fila para importar.', 'info'); setLoading(btn, false); return; }
        const { error } = await db.from('guest_profiles').upsert(rows, { onConflict: 'espaco_slug,phone', ignoreDuplicates: true });
        if (error) throw error;
        showToast(`${rows.length} cliente(s) importado(s) da fila.`, 'success');
        await loadGuests();
      } catch (_) { showToast('Erro ao importar da fila.', 'error'); }
      setLoading(btn, false);
    }

    function visitsPerMonth(g) {
      const vc = g.visit_count || 1;
      const months = g.first_visit ? Math.max(1, daysSince(g.first_visit) / 30) : 1;
      return (vc / months).toFixed(1);
    }

    // ── bulk WhatsApp ───────────────────────────────
    const BULK_TEMPLATES = [
      { id: 'comeback', label: 'Reativar (sentimos a sua falta)', text: 'Olá {nome}! Sentimos a sua falta cá no {restaurante}. Temos novidades no menu — passe por cá esta semana 🙂' },
      { id: 'promo', label: 'Promoção / novidade', text: 'Olá {nome}! Esta semana temos uma sugestão especial no {restaurante}. Reserve a sua mesa 🍽️' },
      { id: 'vip', label: 'Agradecimento VIP', text: 'Olá {nome}! Obrigado por ser um cliente especial do {restaurante}. Da próxima vez, a sobremesa é por nossa conta 🎁' },
    ];
    function openBulkWhatsApp() {
      const rows = filtered().filter(g => (g.phone || '').replace(/\D/g, '').length >= 9);
      if (!rows.length) { showToast('Sem clientes com telemóvel neste segmento.', 'info'); return; }
      soPanel.innerHTML = `
        <div class="so-head">
          <div style="flex:1"><div style="font-size:18px;font-weight:700">Mensagem ao segmento</div>
            <div class="text-muted text-sm">${rows.length} cliente(s)</div></div>
          <button class="portal-icon-btn" id="so-close" aria-label="Fechar">${getIcon('x', 16)}</button>
        </div>
        <div class="so-body">
          <div>
            <div class="so-section-label">Modelo de mensagem</div>
            <div id="bulk-templates" style="display:flex;flex-direction:column;gap:8px">
              ${BULK_TEMPLATES.map((t, i) => `<label class="tag-chip" style="text-align:left;padding:10px 12px;display:flex;gap:8px;align-items:flex-start">
                <input type="radio" name="bulk-tpl" value="${i}" ${i === 0 ? 'checked' : ''}>
                <span><strong>${t.label}</strong><br><span class="text-muted text-xs">${escapeHtml(t.text)}</span></span></label>`).join('')}
            </div>
          </div>
          <div>
            <div class="so-section-label">Abrir conversas (5 de cada vez)</div>
            <p class="text-muted text-sm" style="margin-bottom:10px">O WhatsApp abre uma conversa por cliente, já preenchida. Abra em lotes para não bloquear o browser.</p>
            <div id="bulk-links" style="display:flex;flex-direction:column;gap:6px;max-height:240px;overflow:auto"></div>
            <button class="btn btn-whatsapp btn-full" id="bulk-open-5" style="margin-top:12px">Abrir próximos 5 →</button>
          </div>
        </div>`;
      document.getElementById('so-close').addEventListener('click', closeSO);
      openSO();
      let cursor = 0;
      const restaurante = client.name || 'restaurante';
      function tpl() { return BULK_TEMPLATES[parseInt(document.querySelector('input[name=bulk-tpl]:checked').value)]; }
      function renderLinks() {
        document.getElementById('bulk-links').innerHTML = rows.map((g, i) => {
          const phone = (g.phone || '').replace(/\D/g, '');
          const msg = encodeURIComponent(tpl().text.replace('{nome}', (g.name || '').split(' ')[0] || 'olá').replace('{restaurante}', restaurante));
          return `<a class="text-sm" style="color:var(--info);${i < cursor ? 'opacity:.4' : ''}" href="https://wa.me/${phone}?text=${msg}" target="_blank" rel="noopener">${escapeHtml(g.name || phone)} →</a>`;
        }).join('');
      }
      renderLinks();
      document.querySelectorAll('input[name=bulk-tpl]').forEach(r => r.addEventListener('change', renderLinks));
      document.getElementById('bulk-open-5').addEventListener('click', () => {
        const batch = rows.slice(cursor, cursor + 5);
        if (!batch.length) { showToast('Todas as conversas foram abertas.', 'success'); return; }
        batch.forEach(g => {
          const phone = (g.phone || '').replace(/\D/g, '');
          const msg = encodeURIComponent(tpl().text.replace('{nome}', (g.name || '').split(' ')[0] || 'olá').replace('{restaurante}', restaurante));
          window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        });
        cursor += batch.length; renderLinks();
      });
    }

    // ── load ────────────────────────────────────────
    async function loadGuests() {
      const { data, error } = await db.from('guest_profiles')
        .select('*').eq('espaco_slug', slug).order('last_visit', { ascending: false });
      if (error) {
        content.innerHTML = `<div class="empty-state card" style="margin-top:30px">${getIcon('alert-triangle', 32)}<p class="empty-title">Não foi possível carregar</p><p class="empty-sub">${escapeHtml(error.message || '')}</p></div>`;
        return;
      }
      guests = data || [];
      renderShell();
    }
    await loadGuests();
  })();
  </script>
</body>
