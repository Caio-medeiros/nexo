<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Modo Staff — NEXO Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal/_assets/portal.css">
</head>
<body>

  <nav class="portal-nav" id="portal-nav"></nav>
  <aside class="portal-sidebar" id="portal-sidebar"></aside>
  <button class="btn btn-secondary btn-sm kiosk-exit" id="kiosk-exit">Sair do ecrã completo ✕</button>

  <main class="portal-main" id="main">
    <div id="page-skeleton">
      <div class="page-header"><div class="nexo-skeleton" style="width:180px;height:28px"></div></div>
      <div class="card nexo-skeleton" style="height:120px;margin-bottom:14px"></div>
      <div class="card nexo-skeleton" style="height:120px;margin-bottom:14px"></div>
      <div class="card nexo-skeleton" style="height:120px"></div>
    </div>

    <div id="page-content" style="display:none">
      <div class="page-header flex-between">
        <div>
          <h1 class="page-title">Modo Staff</h1>
          <p class="page-sub">Chamadas, disponibilidade e pedidos em tempo real.</p>
        </div>
        <div class="flex gap-3" style="align-items:center">
          <span class="live-indicator" id="live-indicator">
            <span class="live-dot"></span><span class="live-text">Em directo</span>
          </span>
          <button class="btn btn-secondary btn-sm" id="kiosk-btn">Ecrã Completo ⛶</button>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-title">Chamadas de Mesa</div>
        <div id="calls-list"></div>
      </div>

      <div class="card mb-4">
        <div class="card-title flex-between">
          <span>Disponibilidade</span>
          <span class="text-xs text-muted" id="dispo-count"></span>
        </div>
        <div id="dispo-condensed"></div>
        <a href="/portal/disponibilidade/" class="metric-action mt-2" style="display:inline-block">Gerir disponibilidade →</a>
      </div>

      <div class="card">
        <div class="card-title">Pedidos Recentes</div>
        <div id="orders-list"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/_assets/icons.js"></script>
  <script src="/portal/_assets/portal.js"></script>
  <script>
  (async function () {
    const client = await getClientData();
    if (!client) return;
    renderLayout('/portal/staff/', client);

    const slug = getMenuSlug(client);
    if (slug) initNotifications(slug);

    document.getElementById('page-skeleton').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    if (!slug) {
      document.getElementById('calls-list').innerHTML =
        '<p class="text-muted text-sm">Sem menu configurado — o Modo Staff fica activo assim que o seu menu estiver publicado.</p>';
      return;
    }

    // ── Kiosk mode ──────────────────────────────────
    const kioskBtn = document.getElementById('kiosk-btn');
    const kioskExit = document.getElementById('kiosk-exit');
    function setKiosk(on) {
      document.body.classList.toggle('kiosk-mode', on);
      if (on && document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else if (!on && document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }
    kioskBtn.addEventListener('click', () => setKiosk(true));
    kioskExit.addEventListener('click', () => setKiosk(false));

    // ── Beep on new call ────────────────────────────
    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } catch (_) {}
    }

    // ════════════════════════════════════════════════
    // SECTION A — Chamadas de mesa
    // ════════════════════════════════════════════════
    const callsList = document.getElementById('calls-list');
    let calls = [];

    function renderCalls() {
      if (calls.length === 0) {
        callsList.innerHTML = `
          <div class="empty-state" style="padding:24px">
            <p class="empty-title text-success">✓ Nenhuma chamada activa</p>
          </div>`;
        return;
      }
      callsList.innerHTML = calls.map(c => `
        <div class="call-card ${c._new ? 'new-call' : ''}" data-call-id="${c.id}">
          <div>
            <span class="call-table">${escapeHtml(c.table_label || 'Mesa —')}</span>
            <span class="call-time">${timeAgo(c.created_at)}</span>
          </div>
          <button class="btn btn-success btn-sm" data-resolve="${c.id}">Atendido ✓</button>
        </div>`).join('');

      callsList.querySelectorAll('[data-resolve]').forEach(btn => {
        btn.addEventListener('click', () => resolveCall(btn.dataset.resolve, btn));
      });
      calls.forEach(c => { c._new = false; });
    }

    async function resolveCall(id, btn) {
      setLoading(btn, true, '...');
      const { error } = await db.from('staff_calls')
        .update({ resolved_at: new Date().toISOString() })
        .eq('id', id);
      if (error) {
        setLoading(btn, false);
        showToast('Erro ao marcar como atendido. Tente novamente.', 'error');
        return;
      }
      const card = callsList.querySelector(`[data-call-id="${id}"]`);
      if (card) card.classList.add('resolving');
      setTimeout(() => {
        calls = calls.filter(c => c.id !== id);
        renderCalls();
      }, 300);
    }

    async function loadCalls() {
      const since = new Date(Date.now() - 4 * 3600 * 1000).toISOString();
      const { data, error } = await db.from('staff_calls')
        .select('*')
        .eq('espaco_slug', slug)
        .gte('created_at', since)
        .is('resolved_at', null)
        .order('created_at', { ascending: false });
      if (error) {
        callsList.innerHTML = '<p class="text-danger text-sm">Erro ao carregar chamadas.</p>';
        return;
      }
      calls = data || [];
      renderCalls();
    }
    await loadCalls();

    // refresh "há X min" labels
    setInterval(renderCalls, 60000);

    // ════════════════════════════════════════════════
    // SECTION B — Disponibilidade (condensada)
    // ════════════════════════════════════════════════
    const dispoEl = document.getElementById('dispo-condensed');
    const dispoCount = document.getElementById('dispo-count');
    let menuItems = null;     // [{id,name,items:[{id,name,price}]}]
    let unavailable = new Map(); // item_id → row

    function renderDispo() {
      const totalItems = menuItems
        ? menuItems.reduce((n, s) => n + s.items.length, 0)
        : null;
      const offCount = unavailable.size;
      const onCount = totalItems !== null ? totalItems - offCount : null;

      dispoCount.textContent = onCount !== null ? `${onCount} itens disponíveis` : '';

      if (offCount === 0) {
        dispoEl.innerHTML = '<p class="text-success text-sm">✓ Todos os itens disponíveis</p>';
        return;
      }
      const nameFor = (row) => {
        if (row.item_name) return row.item_name;
        for (const s of (menuItems || [])) {
          const it = s.items.find(i => i.id === row.item_id);
          if (it) return it.name;
        }
        return row.item_id;
      };
      dispoEl.innerHTML = [...unavailable.values()].map(row => `
        <div class="dispo-row unavailable">
          <span class="dispo-name">${escapeHtml(nameFor(row))}</span>
          <span class="badge badge--danger">Esgotado</span>
        </div>`).join('');
    }

    async function loadDispo() {
      menuItems = await loadMenuItems(slug);
      const { data } = await db.from('item_availability')
        .select('*')
        .eq('espaco_slug', slug)
        .eq('available', false);
      unavailable = new Map((data || []).map(r => [r.item_id, r]));
      renderDispo();
    }
    await loadDispo();

    // ════════════════════════════════════════════════
    // SECTION C — Pedidos recentes
    // ════════════════════════════════════════════════
    const ordersList = document.getElementById('orders-list');
    let orders = [];

    const channelBadge = (ch) => ({
      whatsapp: '<span class="badge badge--success">WhatsApp</span>',
      shared: '<span class="badge badge--info">Mesa partilhada</span>',
      staff: '<span class="badge badge--muted">Staff</span>',
    }[ch] || '');

    function renderOrders() {
      if (orders.length === 0) {
        ordersList.innerHTML = '<p class="text-muted text-sm">Nenhum pedido registado hoje.</p>';
        return;
      }
      ordersList.innerHTML = orders.map(o => {
        const items = Array.isArray(o.items) ? o.items : [];
        return `
        <div class="order-card">
          <div class="order-head">
            <span class="order-table">${escapeHtml(o.table_label || 'Mesa —')}</span>
            ${channelBadge(o.channel)}
            <span class="text-muted text-xs" style="margin-left:auto">${timeAgo(o.created_at)}</span>
          </div>
          <ul class="order-items">
            ${items.map(it => `
              <li>${Number(it.qty || it.quantity || 1)}× ${escapeHtml(it.name || it.item_name || '')}
                ${it.price ? ' — ' + escapeHtml(String(it.price)) : ''}</li>
              ${it.note ? `<li class="order-note">↳ ${escapeHtml(it.note)}</li>` : ''}`).join('')}
          </ul>
          <div class="order-foot">
            <span class="order-total">${formatEUR(o.total)}</span>
            ${(o.member_count || 1) > 1 ? `<span class="text-muted text-xs">${o.member_count} pessoas</span>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    async function loadOrders() {
      const { data } = await db.from('orders_log')
        .select('*')
        .eq('espaco_slug', slug)
        .order('created_at', { ascending: false })
        .limit(8);
      orders = data || [];
      renderOrders();
    }
    await loadOrders();

    // ════════════════════════════════════════════════
    // Realtime subscriptions (with reconnect handling)
    // ════════════════════════════════════════════════
    function subscribe() {
      const channel = db.channel('staff-' + slug)
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'staff_calls', filter: `espaco_slug=eq.${slug}` },
          (payload) => {
            const row = payload.new;
            if (row.resolved_at) return;
            row._new = true;
            calls.unshift(row);
            renderCalls();
            beep();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          })
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'item_availability', filter: `espaco_slug=eq.${slug}` },
          (payload) => {
            const row = payload.new;
            if (!row || !row.item_id) return;
            if (row.available === false) unavailable.set(row.item_id, row);
            else unavailable.delete(row.item_id);
            renderDispo();
          })
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'orders_log', filter: `espaco_slug=eq.${slug}` },
          (payload) => {
            orders.unshift(payload.new);
            orders = orders.slice(0, 8);
            renderOrders();
          })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            setLiveState('connected');
          } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
            setLiveState('reconnecting');
            // resubscribe after a short delay
            setTimeout(() => {
              try { db.removeChannel(channel); } catch (_) {}
              subscribe();
              loadCalls(); loadOrders();
            }, 3000);
          }
        });
      trackChannel(channel);
    }
    subscribe();
  })();
  </script>
</body>
</html>
