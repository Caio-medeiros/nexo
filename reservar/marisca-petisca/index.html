<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <title>Reservar mesa — NEXO</title>
  <meta name="description" content="Reserve a sua mesa online. Rápido, sem comissões.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0A0A; --bg-surface:#141414; --bg-elevated:#1C1C1C; --bg-hover:#212121;
      --border:rgba(255,255,255,0.07); --border-md:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.18);
      --text-primary:#F5F5F5; --text-secondary:#888888; --text-muted:#555555;
      --success:#22C55E; --warning:#F59E0B; --danger:#EF4444; --info:#3B82F6; --whatsapp:#25D366;
      --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { background:var(--bg-base); color:var(--text-primary);
      font-family:'Geist',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    body { min-height:100dvh; padding:24px 0 48px; }
    a { color:inherit; text-decoration:none; }
    button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
    .wrap { max-width:480px; margin:0 auto; padding:0 24px; }

    /* Header */
    .brand { font-size:13px; font-weight:700; letter-spacing:-0.02em; color:var(--text-primary); }
    .head { text-align:center; margin:28px 0 24px; }
    .logo-circle { width:56px; height:56px; border-radius:16px; margin:0 auto 14px;
      display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700;
      background:var(--bg-elevated); border:1px solid var(--border-md); overflow:hidden; }
    .logo-circle img { width:100%; height:100%; object-fit:cover; }
    .rest-name { font-size:20px; font-weight:600; letter-spacing:-0.02em; }
    .rest-sub { color:var(--text-secondary); font-size:13px; margin-top:4px; }

    /* Step indicator */
    .steps { display:flex; align-items:center; justify-content:center; gap:6px; margin:24px 0 28px; }
    .step-dot { display:flex; flex-direction:column; align-items:center; gap:6px; flex:0 0 auto; }
    .step-dot .dot { width:9px; height:9px; border-radius:50%; background:var(--bg-elevated);
      border:1px solid var(--border-md); transition:all .25s ease; }
    .step-dot .lbl { font-size:10px; color:var(--text-muted); transition:color .25s ease; }
    .step-dot.active .dot { background:var(--text-primary); border-color:var(--text-primary); transform:scale(1.15); }
    .step-dot.active .lbl { color:var(--text-primary); }
    .step-dot.done .dot { background:var(--success); border-color:var(--success); }
    .step-line { flex:1; height:1px; background:var(--border); max-width:28px; }

    /* Step container / animation */
    .panel { animation:slideIn .35s cubic-bezier(.22,1,.36,1); }
    .panel.back { animation:slideInBack .35s cubic-bezier(.22,1,.36,1); }
    @keyframes slideIn { from { opacity:0; transform:translateX(28px); } to { opacity:1; transform:none; } }
    @keyframes slideInBack { from { opacity:0; transform:translateX(-28px); } to { opacity:1; transform:none; } }

    .q-title { font-size:18px; font-weight:600; letter-spacing:-0.01em; margin-bottom:4px; }
    .q-sub { font-size:13px; color:var(--text-secondary); margin-bottom:20px; }

    /* Calendar */
    .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .cal-month { font-size:15px; font-weight:600; }
    .cal-nav { width:36px; height:36px; border-radius:10px; border:1px solid var(--border-md);
      display:flex; align-items:center; justify-content:center; color:var(--text-secondary); transition:all .15s; }
    .cal-nav:hover:not(:disabled) { border-color:var(--border-strong); color:var(--text-primary); }
    .cal-nav:disabled { opacity:.25; cursor:not-allowed; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-dow { text-align:center; font-size:10px; color:var(--text-muted); text-transform:uppercase;
      letter-spacing:.04em; padding:6px 0; }
    .cal-cell { aspect-ratio:1; border-radius:12px; display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:500; transition:background .15s, transform .1s; color:var(--text-primary); }
    .cal-cell.empty { visibility:hidden; }
    .cal-cell.disabled { opacity:.2; cursor:default; }
    .cal-cell.closed { opacity:.3; text-decoration:line-through; cursor:not-allowed; }
    .cal-cell.avail { cursor:pointer; }
    .cal-cell.avail:hover { background:var(--bg-elevated); }
    .cal-cell.avail:active { transform:scale(.92); }
    .cal-cell.today { border:1px solid rgba(255,255,255,.2); }
    .cal-cell.selected { background:#fff; color:#000; font-weight:700; }

    /* Party stepper */
    .party { display:flex; align-items:center; justify-content:center; gap:24px; margin:8px 0 28px; }
    .party-btn { width:52px; height:52px; border-radius:50%; border:1px solid var(--border-md);
      display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--text-primary);
      transition:all .15s; }
    .party-btn:hover:not(:disabled) { border-color:var(--border-strong); background:var(--bg-elevated); }
    .party-btn:active:not(:disabled) { transform:scale(.9); }
    .party-btn:disabled { opacity:.3; cursor:not-allowed; }
    .party-num { font-size:32px; font-weight:700; min-width:48px; text-align:center; transition:transform .2s; }
    .party-num.bump { transform:scale(1.2); }

    /* Slots */
    .slot-group-label { font-size:10px; color:var(--text-muted); text-transform:uppercase;
      letter-spacing:.06em; margin:18px 0 10px; }
    .slot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; }
    .slot { height:42px; border-radius:10px; background:var(--bg-elevated); border:1px solid var(--border-md);
      display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:14px;
      font-weight:500; transition:all .15s; line-height:1.1; }
    .slot:hover:not(.taken):not(.selected) { background:var(--bg-hover); }
    .slot.selected { background:#fff; color:#000; border-color:#fff; font-weight:700; }
    .slot.taken { opacity:.3; cursor:not-allowed; color:var(--text-muted); }
    .slot .taken-lbl { font-size:9px; color:var(--text-muted); }

    /* Inputs */
    .field { margin-bottom:16px; }
    .field-label { display:block; font-size:12px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
    .input, textarea.input { width:100%; height:46px; background:var(--bg-elevated); border:1px solid var(--border-md);
      border-radius:11px; padding:0 14px; color:var(--text-primary); font-size:15px; font-family:inherit;
      transition:border-color .15s; }
    textarea.input { height:auto; padding:12px 14px; resize:vertical; line-height:1.5; }
    .input:focus { outline:none; border-color:var(--border-strong); }
    .input.error { border-color:var(--danger); }
    .input::placeholder { color:var(--text-muted); }
    .char-count { text-align:right; font-size:11px; color:var(--text-muted); margin-top:4px; }
    .field-err { color:var(--danger); font-size:12px; margin-top:5px; display:none; }

    /* Summary card */
    .summary { background:var(--bg-elevated); border:1px solid var(--border); border-radius:14px;
      padding:16px; margin-bottom:20px; position:relative; }
    .summary-row { color:var(--text-secondary); font-size:13px; margin:5px 0; display:flex; gap:8px; align-items:center; }
    .summary-edit { position:absolute; top:14px; right:14px; font-size:12px; color:var(--info); }

    /* Buttons */
    .btn { width:100%; height:46px; border-radius:11px; font-size:15px; font-weight:600;
      display:flex; align-items:center; justify-content:center; gap:8px; transition:all .15s; }
    .btn-primary { background:#fff; color:#000; }
    .btn-primary:hover:not(:disabled) { background:#E2E2E2; }
    .btn-primary:active:not(:disabled) { transform:scale(.985); }
    .btn-primary:disabled { opacity:.35; cursor:not-allowed; }
    .btn-secondary { background:transparent; border:1px solid var(--border-md); color:var(--text-secondary); }
    .btn-secondary:hover { border-color:var(--border-strong); color:var(--text-primary); }
    .btn-whatsapp { background:var(--whatsapp); color:#fff; }
    .btn-whatsapp:hover { filter:brightness(1.08); }
    .btn-h12 { height:50px; }

    .spinner { width:16px; height:16px; border:2px solid rgba(0,0,0,.25); border-top-color:#000;
      border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Step 4 */
    .check-circle { stroke-dasharray:214; stroke-dashoffset:214; animation:draw .4s ease forwards; }
    .check-mark { stroke-dasharray:60; stroke-dashoffset:60; animation:draw .4s ease .4s forwards; }
    @keyframes draw { to { stroke-dashoffset:0; } }
    .success-title { font-size:24px; font-weight:700; text-align:center; margin-top:16px; }
    .ref-card { background:var(--bg-elevated); border:1px solid var(--border-strong); border-radius:18px;
      padding:24px; text-align:center; max-width:300px; margin:20px auto; }
    .ref-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.15em; }
    .ref-code { font-size:28px; font-weight:700; font-family:ui-monospace,monospace; letter-spacing:.15em; margin-top:6px; }
    .ref-div { border-top:1px solid var(--border); margin:16px 0; }
    .ref-line { color:var(--text-secondary); font-size:13px; margin:3px 0; }
    .info-note { background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px;
      padding:14px; margin-top:16px; font-size:13px; color:var(--text-secondary); line-height:1.5; }

    /* Unavailable / loading states */
    .center-state { min-height:60dvh; display:flex; flex-direction:column; align-items:center;
      justify-content:center; text-align:center; gap:8px; }
    .center-state h2 { font-size:18px; font-weight:600; }
    .center-state p { color:var(--text-secondary); font-size:14px; max-width:300px; line-height:1.5; }
    .loader-dot { width:34px; height:34px; border:3px solid var(--border-md); border-top-color:var(--text-primary);
      border-radius:50%; animation:spin .8s linear infinite; }
    .hidden { display:none !important; }
    .footer { text-align:center; margin-top:36px; font-size:11px; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="https://nexosolutions.pt" class="brand">NEXO.</a>

    <!-- LOADING -->
    <div id="state-loading" class="center-state">
      <div class="loader-dot"></div>
      <p>A carregar…</p>
    </div>

    <!-- UNAVAILABLE -->
    <div id="state-unavailable" class="center-state hidden">
      <h2>Reservas indisponíveis</h2>
      <p>Este espaço não tem reservas online activas. Contacte directamente o restaurante.</p>
    </div>

    <!-- BOOKING -->
    <div id="state-booking" class="hidden">
      <div class="head">
        <div class="logo-circle" id="logo"></div>
        <div class="rest-name" id="rest-name"></div>
        <div class="rest-sub">Reserve a sua mesa</div>
      </div>

      <div class="steps" id="steps"></div>
      <div id="panel"></div>
    </div>

    <p class="footer">Reservas geridas com NEXO · sem comissões</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function () {
    'use strict';
    const SUPABASE_URL = 'https://kgbrtbpeekhkroibsgqq.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnYnJ0YnBlZWtoa3JvaWJzZ3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDAwMTMsImV4cCI6MjA5NjYxNjAxM30.vFvSLysnS3456WWKa2a659YuIVuOceYHG4NMd79Jerc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const ESPACO_SLUG = window.location.pathname.split('/').filter(Boolean).pop() || '';

    const DOW = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const DOW_PT = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho',
      'Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const WEEKDAY_FULL = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

    let settings = null;
    let restaurantName = '';
    const state = { step:1, date:null, time:null, partySize:2,
      name:'', phone:'', email:'', specialRequests:'', back:false, slotCache:{} };

    // ── helpers ───────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const pad = (n) => String(n).padStart(2,'0');
    const ymd = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    function prettySlug(s) {
      return s.replace(/^rest-/,'').replace(/-/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }
    function dateLabel(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${WEEKDAY_FULL[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]}`;
    }

    // ── init ──────────────────────────────────────
    (async function init() {
      if (!ESPACO_SLUG) return showUnavailable();
      try {
        const { data } = await db.from('reservation_settings').select('*')
          .eq('espaco_slug', ESPACO_SLUG).maybeSingle();
        if (!data || !data.enabled) return showUnavailable();
        settings = data;
        restaurantName = data.restaurant_name || prettySlug(ESPACO_SLUG);
      } catch (_) {
        return showUnavailable();
      }
      showBooking();
    })();

    function showUnavailable() {
      $('state-loading').classList.add('hidden');
      $('state-unavailable').classList.remove('hidden');
    }
    function showBooking() {
      $('state-loading').classList.add('hidden');
      $('state-booking').classList.remove('hidden');
      $('rest-name').textContent = restaurantName;
      $('logo').textContent = (restaurantName[0] || 'N').toUpperCase();
      document.title = `Reservar — ${restaurantName}`;
      state.partySize = Math.min(2, settings.max_party_size || 12);
      renderSteps();
      goToStep(1);
    }

    // ── step indicator ────────────────────────────
    function renderSteps() {
      const labels = ['Data','Hora','Detalhes','Confirmação'];
      $('steps').innerHTML = labels.map((l,i) => {
        const n = i+1;
        const cls = n === state.step ? 'active' : (n < state.step ? 'done' : '');
        const line = i < labels.length-1 ? '<div class="step-line"></div>' : '';
        return `<div class="step-dot ${cls}"><div class="dot"></div><div class="lbl">${l}</div></div>${line}`;
      }).join('');
    }

    function goToStep(n, back=false) {
      state.step = n; state.back = back;
      renderSteps();
      const p = $('panel');
      p.className = back ? 'panel back' : 'panel';
      // force reflow to restart animation
      void p.offsetWidth;
      if (n === 1) renderStep1();
      else if (n === 2) renderStep2();
      else if (n === 3) renderStep3();
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    // ── STEP 1 — date ─────────────────────────────
    let calMonth = new Date(); calMonth.setDate(1);
    function renderStep1() {
      const today = new Date(); today.setHours(0,0,0,0);
      const maxDate = new Date(today); maxDate.setDate(today.getDate() + (settings.advance_days || 30));
      const blocked = new Set(settings.blocked_dates || []);
      const oh = settings.opening_hours || {};

      const y = calMonth.getFullYear(), m = calMonth.getMonth();
      const firstDay = new Date(y, m, 1);
      // JS getDay: 0=Sun. We want Mon-first → offset
      let startOffset = (firstDay.getDay() + 6) % 7;
      const daysInMonth = new Date(y, m+1, 0).getDate();

      const prevDisabled = (y < today.getFullYear() || (y === today.getFullYear() && m <= today.getMonth()));
      const nextDisabled = (new Date(y, m+1, 1) > maxDate);

      let cells = '';
      for (let i=0;i<startOffset;i++) cells += '<div class="cal-cell empty"></div>';
      for (let d=1; d<=daysInMonth; d++) {
        const date = new Date(y, m, d);
        const ds = ymd(date);
        const dow = DOW[(date.getDay()+6)%7];
        const isPast = date < today;
        const isBeyond = date > maxDate;
        const isClosed = oh[dow]?.closed;
        const isBlocked = blocked.has(ds);
        const isToday = date.getTime() === today.getTime();
        const isSel = state.date === ds;
        if (isBeyond) { cells += '<div class="cal-cell empty"></div>'; continue; }
        let cls = 'cal-cell';
        if (isPast) cls += ' disabled';
        else if (isClosed) cls += ' closed';
        else if (isBlocked) cls += ' disabled';
        else cls += ' avail';
        if (isToday) cls += ' today';
        if (isSel) cls += ' selected';
        const clickable = !isPast && !isClosed && !isBlocked;
        cells += `<div class="${cls}" ${clickable?`data-date="${ds}"`:''}>${d}</div>`;
      }

      $('panel').innerHTML = `
        <div class="q-title">Quando pretende vir?</div>
        <div class="q-sub">Escolha o dia da sua reserva.</div>
        <div class="cal-head">
          <button class="cal-nav" id="cal-prev" ${prevDisabled?'disabled':''} aria-label="Mês anterior">‹</button>
          <div class="cal-month">${MONTHS[m]} ${y}</div>
          <button class="cal-nav" id="cal-next" ${nextDisabled?'disabled':''} aria-label="Mês seguinte">›</button>
        </div>
        <div class="cal-grid">
          ${DOW_PT.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${cells}
        </div>`;

      $('cal-prev').onclick = () => { if (!prevDisabled){ calMonth.setMonth(m-1); renderStep1(); } };
      $('cal-next').onclick = () => { if (!nextDisabled){ calMonth.setMonth(m+1); renderStep1(); } };
      $('panel').querySelectorAll('[data-date]').forEach(el => {
        el.onclick = () => { state.date = el.dataset.date; state.time = null; goToStep(2); };
      });
    }

    // ── STEP 2 — time + party ─────────────────────
    function renderStep2() {
      const oh = settings.opening_hours || {};
      const dow = DOW[(new Date(state.date+'T00:00:00').getDay()+6)%7];
      const day = oh[dow];
      const slots = day && !day.closed ? buildSlots(day.open, day.close) : [];

      const lunch = slots.filter(s => s < '16:00');
      const dinner = slots.filter(s => s >= '16:00');

      $('panel').innerHTML = `
        <div class="q-title">A que horas e quantos são?</div>
        <div class="q-sub">${dateLabel(state.date)}</div>

        <div class="party">
          <button class="party-btn" id="p-minus" aria-label="Menos">−</button>
          <div class="party-num" id="p-num">${state.partySize}</div>
          <button class="party-btn" id="p-plus" aria-label="Mais">+</button>
        </div>

        <div class="field-label" style="margin-bottom:0">Horário disponível</div>
        <div id="slots-zone">
          ${slots.length === 0
            ? `<p class="q-sub" style="margin-top:12px">Sem horários disponíveis neste dia.</p>`
            : `${lunch.length?`<div class="slot-group-label">Almoço</div><div class="slot-grid" id="g-lunch">${lunch.map(slotBtn).join('')}</div>`:''}
               ${dinner.length?`<div class="slot-group-label">Jantar</div><div class="slot-grid" id="g-dinner">${dinner.map(slotBtn).join('')}</div>`:''}`}
        </div>

        <button class="btn btn-primary" id="continue" style="margin-top:24px" disabled>Continuar →</button>
        <button class="btn btn-secondary" id="back1" style="margin-top:10px">← Voltar</button>`;

      $('back1').onclick = () => goToStep(1, true);
      bindParty();
      checkContinue();
      loadSlotAvailability(slots);
    }

    function slotBtn(t) {
      const sel = state.time === t ? ' selected' : '';
      return `<button class="slot${sel}" data-slot="${t}">${t}</button>`;
    }

    function buildSlots(open, close) {
      let oc = close === '24:00' ? 1440 : toMin(close);
      const dur = settings.slot_duration_minutes || 90;
      const lastStart = oc - dur;
      const out = [];
      for (let t = toMin(open); t <= lastStart; t += 30) out.push(fromMin(t));
      return out;
    }
    const toMin = (hm) => { const [h,m]=hm.split(':').map(Number); return h*60+m; };
    const fromMin = (m) => `${pad(Math.floor(m/60))}:${pad(m%60)}`;

    function bindParty() {
      const max = settings.max_party_size || 12;
      const num = $('p-num');
      const upd = (delta) => {
        const v = Math.max(1, Math.min(max, state.partySize + delta));
        if (v === state.partySize) return;
        state.partySize = v;
        num.textContent = v;
        num.classList.add('bump');
        setTimeout(()=>num.classList.remove('bump'), 200);
        // capacity may shift availability — re-eval current selection
        revalidateSlots();
        checkContinue();
      };
      $('p-minus').onclick = () => upd(-1);
      $('p-plus').onclick = () => upd(1);
    }

    async function loadSlotAvailability(slots) {
      if (!slots.length) return;
      let taken = [];
      try {
        const { data } = await db.from('reservations')
          .select('reservation_time, party_size')
          .eq('espaco_slug', ESPACO_SLUG)
          .eq('reservation_date', state.date)
          .in('status', ['pending','confirmed','seated']);
        taken = data || [];
      } catch (_) {}
      const byTime = {};
      taken.forEach(r => {
        const t = String(r.reservation_time).slice(0,5);
        byTime[t] = (byTime[t]||0) + r.party_size;
      });
      state.slotCache = byTime;
      applySlotStates();
      bindSlots();
    }

    function applySlotStates() {
      const cap = settings.total_capacity || 40;
      const now = new Date();
      const minNotice = (settings.min_notice_hours || 0) * 3600000;
      document.querySelectorAll('.slot').forEach(btn => {
        const t = btn.dataset.slot;
        const used = state.slotCache[t] || 0;
        const full = used + state.partySize > cap;
        const slotDateTime = new Date(state.date + 'T' + t + ':00');
        const tooSoon = slotDateTime - now < minNotice;
        btn.classList.toggle('taken', full || tooSoon);
        const had = btn.querySelector('.taken-lbl');
        if ((full || tooSoon) && !had) {
          btn.insertAdjacentHTML('beforeend',
            `<span class="taken-lbl">${tooSoon?'Tarde':'Esgotado'}</span>`);
        } else if (!(full || tooSoon) && had) { had.remove(); }
      });
    }

    function revalidateSlots() {
      applySlotStates();
      // if selected slot became taken, clear it
      if (state.time) {
        const sel = document.querySelector(`.slot[data-slot="${state.time}"]`);
        if (sel && sel.classList.contains('taken')) {
          sel.classList.remove('selected'); state.time = null;
        }
      }
    }

    function bindSlots() {
      document.querySelectorAll('.slot').forEach(btn => {
        btn.onclick = () => {
          if (btn.classList.contains('taken')) return;
          document.querySelectorAll('.slot.selected').forEach(s=>s.classList.remove('selected'));
          btn.classList.add('selected');
          state.time = btn.dataset.slot;
          checkContinue();
        };
      });
    }

    function checkContinue() {
      const c = $('continue');
      if (!c) return;
      c.disabled = !(state.time && state.partySize);
      c.onclick = () => goToStep(3);
    }

    // ── STEP 3 — details ──────────────────────────
    function renderStep3() {
      $('panel').innerHTML = `
        <div class="q-title">Os seus dados</div>
        <div class="q-sub">Preenchimento rápido — leva menos de um minuto.</div>

        <div class="summary">
          <button class="summary-edit" id="edit-sel">← Alterar</button>
          <div class="summary-row">📅 ${dateLabel(state.date)}</div>
          <div class="summary-row">🕐 ${state.time}</div>
          <div class="summary-row">👥 ${state.partySize} pessoa(s)</div>
        </div>

        <div class="field">
          <label class="field-label" for="f-name">Nome completo *</label>
          <input class="input" id="f-name" type="text" autocomplete="name" placeholder="Maria Silva" value="${esc(state.name)}">
          <div class="field-err" id="e-name">Indique o seu nome.</div>
        </div>
        <div class="field">
          <label class="field-label" for="f-phone">Telemóvel *</label>
          <input class="input" id="f-phone" type="tel" autocomplete="tel" placeholder="+351 912 345 678" value="${esc(state.phone)}">
          <div class="field-err" id="e-phone">Número inválido (mín. 9 dígitos).</div>
        </div>
        <div class="field">
          <label class="field-label" for="f-email">Email (opcional)</label>
          <input class="input" id="f-email" type="email" autocomplete="email" placeholder="maria@email.com" value="${esc(state.email)}">
        </div>
        <div class="field">
          <label class="field-label" for="f-notes">Pedido especial (opcional)</label>
          <textarea class="input" id="f-notes" rows="3" maxlength="300"
            placeholder="Mesa mais afastada, celebração de aniversário, alergias ou restrições alimentares…">${esc(state.specialRequests)}</textarea>
          <div class="char-count" id="cc">${state.specialRequests.length}/300</div>
        </div>

        <button class="btn btn-primary btn-h12" id="submit">Confirmar Reserva →</button>
        <div class="field-err" id="e-submit" style="text-align:center;margin-top:12px"></div>`;

      $('edit-sel').onclick = () => goToStep(2, true);
      const notes = $('f-notes');
      notes.oninput = () => { $('cc').textContent = `${notes.value.length}/300`; };
      $('submit').onclick = submitBooking;
    }

    async function submitBooking() {
      const name = $('f-name').value.trim();
      const phoneRaw = $('f-phone').value.trim();
      const phoneDigits = phoneRaw.replace(/\D/g,'');
      const email = $('f-email').value.trim();
      const notes = $('f-notes').value.trim();
      let ok = true;
      $('e-name').style.display = 'none'; $('f-name').classList.remove('error');
      $('e-phone').style.display = 'none'; $('f-phone').classList.remove('error');
      if (!name) { $('e-name').style.display='block'; $('f-name').classList.add('error'); ok=false; }
      if (phoneDigits.length < 9) { $('e-phone').style.display='block'; $('f-phone').classList.add('error'); ok=false; }
      if (!ok) return;

      state.name = name; state.phone = phoneRaw; state.email = email; state.specialRequests = notes;

      const btn = $('submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> A processar…';
      $('e-submit').style.display = 'none';

      try {
        // double-check capacity (race condition)
        const { data: taken } = await db.from('reservations')
          .select('party_size')
          .eq('espaco_slug', ESPACO_SLUG)
          .eq('reservation_date', state.date)
          .eq('reservation_time', state.time + ':00')
          .in('status', ['pending','confirmed','seated']);
        const used = (taken||[]).reduce((s,r)=>s+r.party_size,0);
        if (used + state.partySize > (settings.total_capacity || 40)) {
          btn.disabled = false; btn.textContent = 'Confirmar Reserva →';
          alert('Este horário ficou esgotado. Escolha outro horário.');
          goToStep(2, true);
          return;
        }

        const { data: res, error } = await db.from('reservations').insert({
          espaco_slug: ESPACO_SLUG,
          guest_name: state.name,
          guest_phone: state.phone,
          guest_email: state.email || null,
          party_size: state.partySize,
          reservation_date: state.date,
          reservation_time: state.time + ':00',
          special_requests: state.specialRequests || null,
          source: 'direct_link',
          status: settings.auto_confirm ? 'confirmed' : 'pending',
        }).select('reference, id').single();
        if (error) throw error;

        // WhatsApp notifications (best-effort)
        fetch(`${SUPABASE_URL}/functions/v1/send-reservation-notification`, {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${SUPABASE_ANON}` },
          body: JSON.stringify({ reservation_id: res.id, type:'new_booking' }),
        }).then(async r => {
          const d = await r.json();
          if (d.guest_url) setTimeout(()=>window.open(d.guest_url,'_blank'), 1000);
        }).catch(()=>{});

        showStep4(res.reference);
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Confirmar Reserva →';
        $('e-submit').style.display = 'block';
        $('e-submit').textContent = 'Não foi possível concluir. Tente novamente.';
      }
    }

    // ── STEP 4 — confirmation ─────────────────────
    function showStep4(reference) {
      state.step = 4; renderSteps();
      const waText = `Reserva confirmada no ${restaurantName} 🎉\n📅 ${dateLabel(state.date)} às ${state.time} — ${state.partySize} pessoas\nRef: ${reference}`;
      const waUrl = `https://wa.me/?text=${encodeURIComponent(waText)}`;
      const note = settings.auto_confirm
        ? '✅ A sua reserva foi confirmada automaticamente!'
        : 'ℹ️ Receberá uma confirmação quando o restaurante confirmar a sua reserva.';

      const p = $('panel');
      p.className = 'panel';
      void p.offsetWidth;
      p.innerHTML = `
        <div style="text-align:center;margin-top:8px">
          <svg viewBox="0 0 72 72" width="72" height="72">
            <circle cx="36" cy="36" r="34" fill="none" stroke="#22C55E" stroke-width="2" class="check-circle"/>
            <path d="M 20 36 L 30 46 L 52 24" fill="none" stroke="#22C55E" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" class="check-mark"/>
          </svg>
        </div>
        <div class="success-title">Reserva recebida! 🎉</div>

        <div class="ref-card">
          <div class="ref-label">Referência</div>
          <div class="ref-code">${esc(reference)}</div>
          <div class="ref-div"></div>
          <div class="ref-line">${dateLabel(state.date)}</div>
          <div class="ref-line">${state.time} · ${state.partySize} pessoas</div>
        </div>

        <a class="btn btn-whatsapp" href="${waUrl}" target="_blank" rel="noopener" style="margin-bottom:12px">Partilhar por WhatsApp</a>
        <button class="btn btn-secondary" id="restart">← Voltar ao início</button>

        <div class="info-note">${note}</div>`;

      $('restart').onclick = () => {
        state.date=null; state.time=null; state.partySize=Math.min(2,settings.max_party_size||12);
        state.name=''; state.phone=''; state.email=''; state.specialRequests='';
        goToStep(1);
      };
      window.scrollTo({ top:0, behavior:'smooth' });
    }
  })();
  </script>
</body>
</html>
